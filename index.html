<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LM Studio — Sistema de Gestão</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a18;font-size:13px}
.app{display:flex;min-height:100vh}
.sb{width:190px;min-width:190px;background:#efefea;border-right:.5px solid rgba(0,0,0,.12);display:flex;flex-direction:column;padding:12px 0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto}
.mn{flex:1;padding:16px 18px;margin-left:190px}
.brand{padding:0 12px 14px;border-bottom:.5px solid rgba(0,0,0,.12);margin-bottom:6px}
.brand h1{font-size:15px;font-weight:500}
.brand p{font-size:11px;color:#888;margin-top:2px}
.nsep{font-size:10px;font-weight:500;color:#aaa;padding:10px 12px 3px;text-transform:uppercase;letter-spacing:.06em}
.ni{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;cursor:pointer;color:#666;border:none;background:none;width:100%;text-align:left;border-right:2px solid transparent}
.ni:hover{background:#fff;color:#1a1a18}
.ni.act{background:#fff;color:#1a1a18;font-weight:500}
.ni i{font-size:15px;flex-shrink:0}
.ni.pilates.act{border-right-color:#2563eb}
.ni.loja.act{border-right-color:#db2777}
.ni.fisio.act{border-right-color:#059669}

/* métricas */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:16px}
.metrics3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:16px}
.mc{background:#efefea;border-radius:8px;padding:10px 12px}
.mc .lb{font-size:11px;color:#666;margin-bottom:2px}
.mc .vl{font-size:19px;font-weight:500}
.mc .s2{font-size:11px;color:#666;margin-top:2px}

/* cores */
.vg{color:#16a34a}.va{color:#d97706}.vr{color:#dc2626}.vi{color:#2563eb}.vp{color:#db2777}.ve{color:#059669}

/* tipografia */
.pt{font-size:16px;font-weight:500;margin-bottom:3px}
.ps{font-size:12px;color:#666;margin-bottom:14px}

/* tabelas */
.tw{background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:12px;overflow:auto;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:7px 10px;text-align:left;font-size:11px;font-weight:500;color:#666;border-bottom:.5px solid rgba(0,0,0,.1);background:#f8f8f4;white-space:nowrap}
tbody tr{border-bottom:.5px solid rgba(0,0,0,.08)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8f8f4;cursor:pointer}
tbody td{padding:7px 10px;white-space:nowrap}
.sum-row{background:#f8f8f4;font-weight:500}

/* badges */
.bdg{display:inline-block;padding:2px 6px;border-radius:20px;font-size:10px;font-weight:500}
.bg{background:#dcfce7;color:#15803d}
.ba{background:#fef3c7;color:#92400e}
.br{background:#fee2e2;color:#991b1b}
.bb{background:#dbeafe;color:#1d4ed8}
.bp{background:#ede9fe;color:#5b21b6}
.bpk{background:#fce7f3;color:#9d174d}
.bav{background:#d1fae5;color:#065f46}
.bx{background:#f1f0e8;color:#555}
.be{background:#d1fae5;color:#065f46}

/* avatares */
.av{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;margin-right:5px;flex-shrink:0}
.a0{background:#ede9fe;color:#5b21b6}.a1{background:#d1fae5;color:#065f46}.a2{background:#fee2e2;color:#991b1b}.a3{background:#dbeafe;color:#1e40af}.a4{background:#fce7f3;color:#9d174d}

/* botões */
.btn{padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;border:.5px solid rgba(0,0,0,.2);background:#fff;color:#1a1a18}
.btn:hover{background:#f0f0ec}
.btnb{background:#2563eb;color:#fff;border-color:#2563eb}.btnb:hover{opacity:.85}
.btnp{background:#db2777;color:#fff;border-color:#db2777}.btnp:hover{opacity:.85}
.btne{background:#059669;color:#fff;border-color:#059669}.btne:hover{opacity:.85}
.btnd{background:#1a1a18;color:#fff;border-color:#1a1a18}.btnd:hover{opacity:.85}
.btns{padding:3px 7px;font-size:11px}

/* toolbar */
.tb{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.srch{padding:6px 9px;border-radius:8px;border:.5px solid rgba(0,0,0,.2);background:#efefea;color:#1a1a18;font-size:12px;width:200px}
.sel{padding:6px 9px;border-radius:8px;border:.5px solid rgba(0,0,0,.2);background:#efefea;color:#1a1a18;font-size:12px}

/* tabs */
.tabs{display:flex;border-bottom:.5px solid rgba(0,0,0,.1);margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 12px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#666;background:none;border-top:none;border-left:none;border-right:none;margin-bottom:-0.5px}
.tab.act{color:#1a1a18;font-weight:500}
.tab.actb{border-bottom-color:#2563eb}
.tab.actp{border-bottom-color:#db2777}
.tab.acte{border-bottom-color:#059669}

/* grade pilates */
.sg{background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:12px;overflow:auto;margin-bottom:14px}
.sgh{display:grid;grid-template-columns:58px repeat(6,minmax(80px,1fr));border-bottom:.5px solid rgba(0,0,0,.1)}
.sgh>div{padding:6px 4px;font-size:11px;font-weight:500;color:#666;text-align:center;border-right:.5px solid rgba(0,0,0,.08);background:#f8f8f4}
.sgh>div:last-child{border-right:none}
.sgr{display:grid;grid-template-columns:58px repeat(6,minmax(80px,1fr));border-bottom:.5px solid rgba(0,0,0,.08)}
.sgr:last-child{border-bottom:none}
.stl{padding:4px;font-size:10px;color:#666;border-right:.5px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-weight:500;background:#f8f8f4}
.sl{padding:3px 4px;border-right:.5px solid rgba(0,0,0,.08);min-height:44px;cursor:pointer;display:flex;flex-direction:column;gap:1px}
.sl:last-child{border-right:none}
.sl:hover{background:#f0f0ec}
.sfu{background:#d1fae5}.spa{background:#fef3c7}
.sn{font-size:9px;font-weight:500;color:#065f46;line-height:1.3}
.sp{font-size:9px;font-weight:500;color:#92400e}
.sc{font-size:9px;color:#888}
.sf{font-size:9px;color:#ccc}

/* estoque cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.prod-card{background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:12px;padding:12px;cursor:pointer}
.prod-card:hover{background:#fdf2f8}
.prod-card .pn{font-size:12px;font-weight:500;margin-bottom:4px;line-height:1.3}
.prod-card .pm{font-size:11px;color:#666;margin-bottom:6px}
.prod-card .pt2{display:flex;justify-content:space-between;align-items:center}
.s0{border-left:3px solid #dc2626}.slow{border-left:3px solid #d97706}.sok{border-left:3px solid #16a34a}

/* fisio sessões */
.sess-dot{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;margin:2px}
.sess-ok{background:#d1fae5;color:#065f46}
.sess-pend{background:#f1f0e8;color:#888}

/* detail panel */
.dp{background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:12px;padding:14px;margin-bottom:12px}
.dp h3{font-size:13px;font-weight:500;margin-bottom:10px}
.dr{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:.5px solid rgba(0,0,0,.08)}
.dr:last-child{border-bottom:none}
.dl{color:#666}

/* chart */
.chart-bar{height:8px;border-radius:4px;background:#f1f0e8;margin-top:3px}
.chart-fill-p{height:100%;border-radius:4px;background:#2563eb}
.chart-fill-l{height:100%;border-radius:4px;background:#db2777}
.chart-fill-e{height:100%;border-radius:4px;background:#059669}

/* funil */
.funil{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:16px}
.fs{background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:12px;padding:10px;text-align:center}
.fs .fn{font-size:20px;font-weight:500;margin-bottom:2px}
.fs .fl{font-size:11px;color:#666}

/* modal */
.ovlbg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(3px)}
.mdl{background:#fff;border-radius:14px;border:.5px solid rgba(0,0,0,.15);padding:22px;width:460px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;z-index:1000}
.mdt{font-size:15px;font-weight:600;margin-bottom:16px;color:#1a1a18;padding-bottom:12px;border-bottom:.5px solid rgba(0,0,0,.1)}
.mdf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:.5px solid rgba(0,0,0,.1)}
.fl{font-size:12px;color:#444;margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(0,0,0,.2);background:#fff;color:#1a1a18;font-size:13px;margin-bottom:10px;outline:none}
.fi:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select.fi{cursor:pointer}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
</style>
</head>

</div>
<div class="mn" id="mn"></div>
</div>

const DIAS=['Seg','Ter','Qua','Qui','Sex','Sáb'];
const HORAS=['07H','08H','09H','10H','15H','16H','17H','18H','19H'];
const CAP=5;
const SL_STATUS={'A':'Ativo','P':'Prospect','E':'Experimental','AV':'Avulso'};
const SL_BADGE={'A':'bg','P':'bp','E':'bb','AV':'bav'};

function buildGrade(){
  const g={};
  DIAS.forEach(d=>HORAS.forEach(h=>g[d+'-'+h]=[]));
  AL.filter(a=>a.s==='A').forEach(a=>{
    if(!a.h||a.h==='-'||a.h==='—') return;
    a.h.split(',').forEach(p=>{
      const m=p.trim().match(/^(SEG|TER|QUA|QUI|SEX|SAB)\s+(\d+H)/i);
      if(!m) return;
      const dm={SEG:'Seg',TER:'Ter',QUA:'Qua',QUI:'Qui',SEX:'Sex',SAB:'Sáb'};
      const k=dm[m[1].toUpperCase()]+'-'+m[2].toUpperCase();
      if(g[k]) g[k].push(a.n.split(' ').slice(0,2).map((w,i)=>i?w[0]+'.':w).join(' '));
    });
  });
  return g;
}
const GD=buildGrade();

function avcls(id){return 'a'+(id%5);}
function ini(n){return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');}
function sbadge(s){return '<span class="bdg '+(SL_BADGE[s]||'bx')+'">'+(SL_STATUS[s]||s)+'</span>';}
function fR(v){return v!=null?'R$ '+parseFloat(v).toFixed(2).replace('.',','):'—';}
function qtdN(q){if(typeof q==='number')return q;const m=String(q||0).match(/\d+/g);return m?m.reduce((s,n)=>s+parseInt(n),0):0;}
function marcaBdg(m){
  const mp={'Rosa Imperial':'bpk','Camomila':'ba','Mnovo':'bb','Mantig':'bx','ALAD Amanda':'bg','Lm':'bx'};
  const k=Object.keys(mp).find(k=>m&&m.toLowerCase().includes(k.toLowerCase()));
  return k?mp[k]:'bx';
}

// Timeout helper — aborta se demorar mais de 6 segundos
function fetchWithTimeout(url, opts={}, ms=6000){
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, {...opts, signal:ctrl.signal}).finally(()=>clearTimeout(tid));
}

async function sbGet(table, order='id'){
  const r = await fetchWithTimeout(`${SB_URL}/rest/v1/${table}?order=${order}`, {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbInsert(table, data){
  const r = await fetchWithTimeout(`${SB_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

  const a=JSON.parse(json);
  if(!confirm('Converter '+a.n+' para Ativo?')) return;
  try {
    if(a.id && typeof a.id === 'number' && a.id > 1000) {
      await sbUpdate('alunos', a.id, {status:'A'});
    }
    a.s='A';
    const idx=AL.findIndex(x=>x.n===a.n); if(idx>=0) AL[idx].s='A';
    if(window._alunosDB){ const i=window._alunosDB.findIndex(x=>x.n===a.n); if(i>=0) window._alunosDB[i].s='A'; }
    verAlunoDetalhe(JSON.stringify(a));
  } catch(e){ alert('Erro: '+e.message); }
}

function renderLDash(allV, allE, allEnc){
  const totalV=allV.reduce((s,v)=>s+(parseFloat(v.preco)||0),0);
  const totalC=allV.filter(v=>v.custo).reduce((s,v)=>s+(parseFloat(v.custo)||0),0);

  const semEst=allE.filter(e=>qtdN(e.qtd)===0).length;
  const encPend=allEnc.filter(e=>!e.vf).length;
  const porMarca={};
  allV.forEach(v=>{const m=v.marca||'Outras';porMarca[m]=(porMarca[m]||0)+(parseFloat(v.preco)||0);});
  const top=Object.entries(porMarca).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxV=top[0]?top[0][1]:1;
  set('<div class="pt">Loja — Dashboard</div><div class="ps">LmSTORE · <span style="color:#16a34a;font-weight:500">● banco conectado</span></div>'+
  '<div class="metrics">'+

  mc('Margem estimada','vg',mg?mg.toFixed(1)+'%':'—','onde há custo')+
  mc('Em estoque','vi',emEst,semEst+' peças zeradas')+
  mc('Encomendas s/ pgto','va',encPend,'a receber')+
  '</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'+
  '<div><div style="font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Por marca</div>'+
  '<div class="dp" style="padding:12px">'+top.map(([m,v])=>
    '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>'+m+'</span><span style="font-weight:500">'+fR(v)+'</span></div>'+
    '<div class="chart-bar"><div class="chart-fill-l" style="width:'+Math.round(v/maxV*100)+'%"></div></div></div>'
  ).join('')+'</div></div>'+
  '<div><div style="font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Últimas vendas</div>'+
  '<div class="tw"><table><thead><tr><th>Item</th><th>Cliente</th><th>Valor</th></tr></thead><tbody>'+
  allV.slice(-8).reverse().map(v=>'<tr><td>'+v.item+'</td><td>'+v.cliente+'</td><td style="color:#db2777;font-weight:500">'+fR(v.preco)+'</td></tr>').join('')+
  '</tbody></table></div></div></div>');
}

// ── AGENDA (grade local — usa dados em memória) ───────────
function rPAgenda(){
  let h='<div class="pt">Grade de Aulas</div><div class="ps">Horários dos alunos ativos · Cap: '+CAP+'/turma</div>'+
  '<div style="display:flex;gap:12px;font-size:11px;margin-bottom:12px;flex-wrap:wrap">'+
  '<span style="display:flex;gap:4px;align-items:center"><span style="width:10px;height:10px;border-radius:2px;background:#d1fae5;border:.5px solid #6ee7b7;display:inline-block"></span>Cheia</span>'+
  '<span style="display:flex;gap:4px;align-items:center"><span style="width:10px;height:10px;border-radius:2px;background:#fef3c7;border:.5px solid #fcd34d;display:inline-block"></span>Com vaga</span>'+
  '<span style="display:flex;gap:4px;align-items:center"><span style="width:10px;height:10px;border-radius:2px;background:#f5f5f0;border:.5px solid #ddd;display:inline-block"></span>Sem aula</span></div>'+
  '<div class="sg"><div class="sgh"><div>Hr</div>'+DIAS.map(d=>'<div>'+d+'</div>').join('')+'</div>';
  HORAS.forEach(hr=>{
    h+='<div class="sgr"><div class="stl">'+hr+'</div>';
    DIAS.forEach(d=>{
      const k=d+'-'+hr, aula=GD[k]||[];
      if(!aula.length){h+='<div class="sl"><div style="display:flex;align-items:center;justify-content:center;height:100%"><span class="sf">–</span></div></div>';}
      else{
        const fu=aula.length>=CAP;
        h+='<div class="sl '+(fu?'sfu':'spa')+'" onclick="verTurma(\''+d+'\',\''+hr+'\')">';
        aula.slice(0,3).forEach(nm=>h+='<span class="'+(fu?'sn':'sp')+'">'+nm+'</span>');
        if(aula.length>3)h+='<span class="sc">+'+( aula.length-3)+'</span>';
        else h+='<span class="sc">'+aula.length+'/'+CAP+'</span>';
        h+='</div>';
      }
    });
    h+='</div>';
  });
  set(h+'</div>');
}

function verTurma(d,hr){
  const k=d+'-'+hr, aula=GD[k]||[], livre=CAP-aula.length;
  abrirModal('<div class="mdt">'+d+' – '+hr+'</div>'+
  '<div style="margin-bottom:10px"><span class="bdg '+(livre===0?'bg':'ba')+'">'+aula.length+'/'+CAP+' alunos</span>'+(livre>0?' <span style="font-size:11px;color:#16a34a">'+livre+' vaga(s) livre</span>':'')+' </div>'+
  aula.map(nm=>'<div style="padding:5px 0;border-bottom:.5px solid rgba(0,0,0,.08);font-size:12px">'+nm+'</div>').join('')+
  (livre>0?'<div style="font-size:11px;color:#16a34a;margin-top:8px"><i class="ti ti-circle-check"></i> Disponível para reposição</div>':'')+
  '<div class="mdf"><button class="btn" onclick="fecharModal()">Fechar</button></div>');
}

function verPaciente(idx){
  const cache=window._fisioCache||FISIO;
  const p=cache[idx];
  if(!p) return;
  const ok=p.sessoes&&p.realizadas>=p.sessoes;
  const faltam=p.sessoes?Math.max(0,p.sessoes-p.realizadas):null;
  set('<div class="tb"><button class="btn" onclick="nav(\'f_pacientes\')"><i class="ti ti-arrow-left"></i> Voltar</button></div>'+
  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+
  '<div style="width:44px;height:44px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:#065f46">'+p.n.slice(0,2).toUpperCase()+'</div>'+
  '<div><div style="font-size:15px;font-weight:500">'+p.n+'</div></div>'+
  '<span style="margin-left:auto"><span class="bdg '+(ok?'bg':p.realizadas>0?'ba':'bx')+'">'+(ok?'Concluído':p.realizadas>0?'Em andamento':'Aguardando')+'</span></span></div>'+
  '<div class="dp"><h3 style="color:#059669">Sessões</h3>'+
  dr('Sessões contratadas',p.sessoes||'Sem contrato fixo')+
  dr('Sessões realizadas',p.realizadas)+
  (faltam!=null?dr('Faltam',faltam+' sessão(ões)'):'')+
  '</div>'+
  (p.datas&&p.datas.length?'<div class="dp"><h3 style="color:#059669">Datas realizadas</h3>'+
  '<div style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 0">'+
  p.datas.map(d=>'<span style="background:#d1fae5;color:#065f46;padding:3px 8px;border-radius:6px;font-size:11px">'+(d||'—')+'</span>').join('')+
  '</div></div>':'')+
  '<div style="display:flex;gap:8px"><button class="btn btne" onclick="abrirRegistrarSessao(\''+esc(p.n)+'\')"><i class="ti ti-plus"></i> Registrar sessão</button></div>');
}
