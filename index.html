<style>
/* ═══════════════════════════════════════════════════════════
   LM ESTUDIO — AESTHETIC OFF-WHITE
   Inspiração: Instagram · Clean · Modern · Soft
═══════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap');

:root {
  /* Off-white palette */
  --bg:          #F8F6F2;
  --bg-2:        #F2EFE9;
  --bg-3:        #EDE9E1;
  --white:       #FFFFFF;
  --card:        rgba(255,255,255,.92);

  /* Accent — dourado suave */
  --gold:        #C9A96E;
  --gold-light:  #E4C99A;
  --gold-dark:   #A8844A;
  --gold-muted:  rgba(201,169,110,.12);

  /* Text */
  --text-1:      #1A1A1A;
  --text-2:      #6B6B6B;
  --text-3:      #A0A0A0;
  --text-gold:   #8B6A2E;

  /* Green accent */
  --green:       #3D7A4A;
  --green-light: rgba(61,122,74,.1);

  /* Borders */
  --border:      rgba(0,0,0,.07);
  --border-md:   rgba(0,0,0,.12);
  --border-gold: rgba(201,169,110,.25);

  /* Shadows */
  --shadow-xs:   0 1px 3px rgba(0,0,0,.05);
  --shadow-sm:   0 2px 12px rgba(0,0,0,.06);
  --shadow-md:   0 8px 32px rgba(0,0,0,.08);
  --shadow-lg:   0 24px 64px rgba(0,0,0,.1);
  --shadow-card: 0 0 0 1px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.06);

  /* Border radius — generoso como Instagram */
  --r-sm:  12px;
  --r-md:  18px;
  --r-lg:  24px;
  --r-xl:  32px;
  --r-full: 999px;

  /* Fonts */
  --font:       'Plus Jakarta Sans', system-ui, sans-serif;
  --font-serif: 'Playfair Display', Georgia, serif;

  /* Transitions */
  --ease:        cubic-bezier(.4,0,.2,1);
  --spring:      cubic-bezier(.34,1.56,.64,1);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-1);
  font-size: 13.5px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* Subtle background pattern */
body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(201,169,110,.05) 0%, transparent 55%),
    radial-gradient(ellipse 60% 60% at 90% 100%, rgba(61,122,74,.03) 0%, transparent 50%);
}

.app { display:flex; min-height:100vh; position:relative; z-index:1; }

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sb {
  width: 240px; min-width: 240px;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 0 0 20px;
  position: fixed; top:0; left:0;
  height: 100vh; overflow-y: auto;
  z-index: 50;
  box-shadow: 2px 0 20px rgba(0,0,0,.04);
}
.sb::-webkit-scrollbar { width:3px; }
.sb::-webkit-scrollbar-thumb { background: var(--border-md); border-radius:4px; }

.brand {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: background .15s;
}
.brand:hover { background: var(--bg); }
.brand-name {
  font-family: var(--font-serif);
  font-size: 17px; font-weight: 600;
  color: var(--text-1); letter-spacing: .01em;
}
.brand-sub {
  font-size: 10px; color: var(--text-3);
  letter-spacing: .12em; text-transform: uppercase;
  margin-top: 2px;
}

.nsep {
  font-size: 9.5px; font-weight: 700;
  color: var(--text-3);
  padding: 16px 20px 4px;
  text-transform: uppercase; letter-spacing: .14em;
}

.ni {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 12px 9px 16px;
  margin: 1px 8px;
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 400;
  cursor: pointer; color: var(--text-2);
  border: none; background: none;
  width: calc(100% - 16px);
  text-align: left;
  transition: all .15s var(--ease);
  letter-spacing: .005em;
}
.ni:hover { background: var(--bg-2); color: var(--text-1); }
.ni.act {
  background: var(--gold-muted);
  color: var(--text-gold);
  font-weight: 600;
}
.ni i { font-size: 16px; flex-shrink:0; }
.ni.act i { color: var(--gold); }

/* ── MAIN ─────────────────────────────────────────────────── */
.mn { flex:1; padding: 28px 32px; margin-left: 240px; }

/* ── PAGE HEADER ──────────────────────────────────────────── */
.pt {
  font-family: var(--font-serif);
  font-size: 28px; font-weight: 600;
  color: var(--text-1); margin-bottom: 4px;
  letter-spacing: -.01em;
}
.ps { font-size: 13px; color: var(--text-2); margin-bottom: 22px; }

/* ── METRIC CARDS ─────────────────────────────────────────── */
.metrics  { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:24px; }
.metrics3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; margin-bottom:24px; }

.mc {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px 16px;
  box-shadow: var(--shadow-card);
  transition: all .2s var(--ease);
  position: relative; overflow: hidden;
}
.mc:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.mc .lb {
  font-size: 11px; color: var(--text-3);
  margin-bottom: 8px;
  font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
}
.mc .vl {
  font-family: var(--font-serif);
  font-size: 26px; font-weight: 600;
  color: var(--text-1); line-height: 1;
}
.mc .s2 { font-size: 11.5px; color: var(--text-2); margin-top: 6px; }

/* Accent colors */
.vg { color: #2D7A3A; }
.va { color: var(--gold-dark); }
.vr { color: #C0392B; }
.vi { color: #3A6EA8; }
.vp { color: #8B4A8B; }
.ve { color: #2D7A3A; }

/* ── TABLES ───────────────────────────────────────────────── */
.tw {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: auto; margin-bottom: 20px;
  box-shadow: var(--shadow-xs);
}
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th {
  padding: 12px 16px;
  text-align: left; font-size: 10.5px; font-weight: 700;
  color: var(--text-3);
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  text-transform: uppercase; letter-spacing: .08em;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg); cursor: pointer; }
tbody td { padding: 12px 16px; color: var(--text-1); white-space: nowrap; }
.sum-row { background: var(--bg-2); font-weight: 600; }

/* ── BADGES ───────────────────────────────────────────────── */
.bdg {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: var(--r-full);
  font-size: 11px; font-weight: 600; letter-spacing: .02em;
}
.bg  { background: #E8F5EC; color: #1A7A2E; }
.ba  { background: #FEF3E2; color: #9A6010; }
.br  { background: #FEE8E7; color: #C0392B; }
.bb  { background: #EEF4FF; color: #2D5EA8; }
.bp  { background: #F3EEF8; color: #6B3A8B; }
.bpk { background: #FEE8EE; color: #A03060; }
.bav { background: #E8F5EC; color: #1A7A2E; }
.bx  { background: var(--bg-2); color: var(--text-2); }
.be  { background: #E8F5EC; color: #1A7A2E; }

/* ── AVATARS ──────────────────────────────────────────────── */
.av {
  width: 28px; height: 28px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  margin-right: 10px; flex-shrink: 0;
  border: 1.5px solid var(--border-md);
}
.a0 { background: #F0E6D8; color: #7A5A30; }
.a1 { background: #DFF0E4; color: #1A6A2A; }
.a2 { background: #F0E0DC; color: #8A3020; }
.a3 { background: #EAE6D8; color: #6A5A20; }
.a4 { background: #E4DCD0; color: #6A4A20; }

/* ── BUTTONS ──────────────────────────────────────────────── */
.btn {
  padding: 8px 16px; border-radius: var(--r-full);
  font-size: 13px; font-weight: 500; font-family: var(--font);
  cursor: pointer; border: 1.5px solid var(--border-md);
  background: var(--white); color: var(--text-1);
  transition: all .18s var(--ease);
  letter-spacing: .01em;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--bg-2); border-color: var(--border-md); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.btn:active { transform: translateY(0); }

.btnb {
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  color: #fff; border-color: transparent;
  box-shadow: 0 2px 12px rgba(201,169,110,.3);
  font-weight: 600;
}
.btnb:hover { background: linear-gradient(135deg, #EDD5A8, #BF9040); box-shadow: 0 4px 20px rgba(201,169,110,.4); }

.btnp {
  background: var(--text-1); color: #fff;
  border-color: transparent; font-weight: 600;
}
.btnp:hover { background: #333; }

.btne {
  background: #1A7A2E; color: #fff;
  border-color: transparent; font-weight: 600;
}
.btne:hover { background: #155C24; }

.btnd { background: #C0392B; color: #fff; border-color: transparent; }
.btns { padding: 5px 12px; font-size: 12px; }

/* ── TOOLBAR ──────────────────────────────────────────────── */
.tb { display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap; }
.srch {
  padding: 9px 16px; border-radius: var(--r-full);
  border: 1.5px solid var(--border-md);
  background: var(--white); color: var(--text-1);
  font-size: 13px; width: 240px; font-family: var(--font);
  transition: all .18s; outline: none;
  box-shadow: var(--shadow-xs);
}
.srch:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(201,169,110,.12); }
.srch::placeholder { color: var(--text-3); }
.sel {
  padding: 9px 16px; border-radius: var(--r-full);
  border: 1.5px solid var(--border-md);
  background: var(--white); color: var(--text-1);
  font-size: 13px; font-family: var(--font); cursor: pointer;
}

/* ── TABS ─────────────────────────────────────────────────── */
.tabs { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
.tab {
  padding: 7px 18px; border-radius: var(--r-full);
  font-size: 12.5px; font-weight: 500; cursor: pointer;
  color: var(--text-2); background: var(--white);
  border: 1.5px solid var(--border-md);
  font-family: var(--font);
  transition: all .15s;
}
.tab:hover { background: var(--bg-2); color: var(--text-1); }
.tab.act { color: var(--text-1); font-weight: 600; border-color: var(--border-md); background: var(--bg-2); }
.tab.actb { background: var(--gold-muted); border-color: var(--gold); color: var(--text-gold); }
.tab.acte { background: var(--green-light); border-color: var(--green); color: var(--green); }
.tab.actp { background: var(--bg-3); border-color: var(--border-md); color: var(--text-1); }

/* ── SCHEDULE GRID ────────────────────────────────────────── */
.sg {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: auto;
  margin-bottom: 20px; box-shadow: var(--shadow-xs);
}
.sgh { display:grid; grid-template-columns:58px repeat(6,minmax(80px,1fr)); border-bottom:1px solid var(--border); }
.sgh>div {
  padding: 10px 4px; font-size: 10px; font-weight: 700;
  color: var(--text-3); text-align: center;
  border-right: 1px solid var(--border);
  background: var(--bg); text-transform: uppercase; letter-spacing: .08em;
}
.sgh>div:last-child { border-right:none; }
.sgr { display:grid; grid-template-columns:58px repeat(6,minmax(80px,1fr)); border-bottom:1px solid rgba(0,0,0,.04); }
.sgr:last-child { border-bottom:none; }
.stl {
  padding:4px; font-size:10px; color:var(--text-3);
  border-right:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; background:var(--bg);
}
.sl {
  padding:4px 5px; border-right:1px solid rgba(0,0,0,.04);
  min-height:48px; cursor:pointer;
  display:flex; flex-direction:column; gap:2px;
  transition:background .1s;
}
.sl:last-child { border-right:none; }
.sl:hover { background: rgba(0,0,0,.025); }
.sfu { background: rgba(45,122,58,.06); }
.spa { background: rgba(201,169,110,.05); }
.sn { font-size:9.5px; font-weight:700; color:#1A6A2A; line-height:1.3; }
.sp { font-size:9.5px; font-weight:600; color:var(--text-gold); }
.sc { font-size:9px; color:var(--text-3); }
.sf { font-size:9px; color:rgba(0,0,0,.2); }

/* ── PRODUCT CARDS ────────────────────────────────────────── */
.card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:14px; margin-bottom:20px; }
.prod-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px;
  cursor: pointer; transition: all .2s var(--ease);
  box-shadow: var(--shadow-xs);
}
.prod-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--border-md); }
.prod-card .pn { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height:1.4; color:var(--text-1); }
.prod-card .pm { font-size: 11.5px; color: var(--text-2); margin-bottom: 8px; }
.prod-card .pt2 { display:flex; justify-content:space-between; align-items:center; }
.s0  { border-left: 3px solid #C0392B; }
.slow{ border-left: 3px solid var(--gold); }
.sok { border-left: 3px solid #2D7A3A; }

/* ── DETAIL PANEL ─────────────────────────────────────────── */
.dp {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 20px;
  margin-bottom: 16px; box-shadow: var(--shadow-xs);
}
.dp h3 {
  font-family: var(--font-serif);
  font-size: 16px; font-weight: 600;
  margin-bottom: 14px; color: var(--text-gold);
}
.dr {
  display:flex; justify-content:space-between;
  font-size: 13px; padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.dr:last-child { border-bottom:none; }
.dl { color: var(--text-2); }

/* ── CHARTS ───────────────────────────────────────────────── */
.chart-bar { height:7px; border-radius:var(--r-full); background:var(--bg-2); margin-top:5px; overflow:hidden; }
.chart-fill-p { height:100%; border-radius:var(--r-full); background:linear-gradient(90deg,var(--gold),var(--gold-light)); }
.chart-fill-l { height:100%; border-radius:var(--r-full); background:linear-gradient(90deg,#1A1A1A,#555); }
.chart-fill-e { height:100%; border-radius:var(--r-full); background:linear-gradient(90deg,#1A6A2A,#2D7A3A); }

/* ── FUNNEL ───────────────────────────────────────────────── */
.funil { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:20px; }
.fs {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 18px; text-align:center;
  box-shadow: var(--shadow-xs); transition: all .2s var(--ease);
}
.fs:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.fs .fn { font-family:var(--font-serif); font-size:32px; font-weight:600; margin-bottom:4px; line-height:1; }
.fs .fl { font-size:12px; color:var(--text-2); }

/* ── MODAL ────────────────────────────────────────────────── */
.ovlbg {
  position:fixed; inset:0;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(12px) saturate(.8);
  display:flex; align-items:center; justify-content:center;
  z-index:999;
}
.mdl {
  background: var(--white);
  border-radius: var(--r-xl);
  border: 1px solid var(--border-md);
  padding: 28px 30px; width:480px;
  max-width:95vw; max-height:90vh;
  overflow-y:auto;
  box-shadow: var(--shadow-lg);
  z-index:1000;
  animation: modalIn .22s var(--spring);
}
@keyframes modalIn { from{opacity:0;transform:scale(.95) translateY(10px)} to{opacity:1;transform:none} }
.mdt {
  font-family: var(--font-serif);
  font-size: 20px; font-weight: 600;
  margin-bottom: 20px; color: var(--text-1);
  padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.mdf {
  display:flex; gap:10px; justify-content:flex-end;
  margin-top:20px; padding-top:16px; border-top:1px solid var(--border);
}
.fl {
  font-size: 11px; font-weight: 700; color: var(--text-3);
  margin-bottom: 5px; display:block;
  letter-spacing: .08em; text-transform: uppercase;
}
.fi {
  width:100%; padding:10px 14px;
  border-radius: var(--r-md);
  border: 1.5px solid var(--border-md);
  background: var(--bg);
  color: var(--text-1); font-size:13.5px;
  margin-bottom: 12px; outline: none;
  font-family: var(--font);
  transition: all .15s;
}
.fi:focus { border-color: var(--gold); box-shadow:0 0 0 4px rgba(201,169,110,.1); background:var(--white); }
select.fi { cursor:pointer; }
.fr2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.fr3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

/* ── SCROLLBAR ────────────────────────────────────────────── */
.mn::-webkit-scrollbar { width:4px; }
.mn::-webkit-scrollbar-track { background:transparent; }
.mn::-webkit-scrollbar-thumb { background:var(--border-md); border-radius:4px; }

/* ── LOGIN ────────────────────────────────────────────────── */
.login-bg {
  position:fixed; inset:0;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  z-index:9999;
}
.login-bg::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 60% 60% at 25% 25%, rgba(201,169,110,.08) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 75% 75%, rgba(61,122,74,.05) 0%, transparent 50%);
}
.login-box {
  background: var(--white);
  border-radius: var(--r-xl);
  border: 1px solid var(--border-md);
  padding: 48px 52px;
  width: 400px; max-width: 95vw;
  box-shadow: var(--shadow-lg);
  text-align: center;
  animation: modalIn .3s var(--spring);
  position: relative;
}
.login-logo { width:72px; height:72px; object-fit:contain; margin-bottom:20px; }
.login-title {
  font-family: var(--font-serif);
  font-size: 28px; font-weight: 600;
  color: var(--text-1); letter-spacing:-.01em; margin-bottom:5px;
}
.login-sub { font-size:12px; color:var(--text-3); margin-bottom:30px; letter-spacing:.1em; text-transform:uppercase; }
.login-field { margin-bottom:14px; text-align:left; }
.login-field label { font-size:11px; font-weight:700; color:var(--text-3); letter-spacing:.08em; text-transform:uppercase; display:block; margin-bottom:6px; }
.login-field input {
  width:100%; padding:12px 16px;
  border-radius: var(--r-md);
  border: 1.5px solid var(--border-md);
  background: var(--bg); color:var(--text-1);
  font-size:14px; font-family:var(--font);
  outline:none; transition:all .18s;
}
.login-field input:focus { border-color:var(--gold); box-shadow:0 0 0 4px rgba(201,169,110,.12); background:var(--white); }
.login-btn {
  width:100%; padding:13px;
  background: var(--text-1); color:#fff;
  border:none; border-radius:var(--r-md);
  font-size:14px; font-weight:700; font-family:var(--font);
  cursor:pointer; margin-top:8px;
  transition:all .18s; letter-spacing:.04em;
}
.login-btn:hover { background:#333; transform:translateY(-1px); box-shadow:var(--shadow-md); }
.login-error {
  color:#C0392B; font-size:12px; margin-top:12px; display:none;
  background:#FEE8E7; padding:10px 14px; border-radius:var(--r-md);
  border:1px solid rgba(192,57,43,.2);
}

/* ── USER BADGE ───────────────────────────────────────────── */
.user-avatar {
  width:24px; height:24px; border-radius:50%;
  background:var(--text-1); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:800;
}

/* ── ACCESS DENIED ────────────────────────────────────────── */
.acesso-negado {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:60vh; gap:16px; color:var(--text-2);
}
.acesso-negado i { font-size:52px; color:var(--border-md); }
.acesso-negado h3 { font-family:var(--font-serif); font-size:24px; color:var(--text-1); }

/* ── GOOGLE CALENDAR ──────────────────────────────────────── */
.gcal-connect {
  margin:8px 8px; padding:10px 14px;
  background:var(--bg); border:1.5px dashed var(--border-md);
  border-radius:var(--r-md); cursor:pointer;
  transition:all .15s; display:flex; align-items:center; gap:9px;
  font-size:12px; color:var(--text-2);
}
.gcal-connect:hover { background:var(--bg-2); color:var(--text-1); border-color:var(--gold); }
.gcal-connected {
  margin:8px 8px; padding:10px 14px;
  background:#E8F5EC; border:1px solid #B8DFC0;
  border-radius:var(--r-md); font-size:12px; color:#1A7A2E;
  display:flex; align-items:center; gap:9px; cursor:pointer;
}

/* ── BARCODE ──────────────────────────────────────────────── */
.barcode-box {
  display:flex; align-items:center; gap:10px;
  background:var(--bg); border:1.5px dashed var(--border-md);
  border-radius:var(--r-md); padding:10px 14px; margin-bottom:12px;
  transition:all .18s;
}
.barcode-box:focus-within { border-color:var(--gold); background:var(--gold-muted); box-shadow:0 0 0 4px rgba(201,169,110,.1); }
.barcode-box i { font-size:20px; color:var(--gold); flex-shrink:0; }
.barcode-box input { border:none; background:transparent; font-size:14px; color:var(--text-1); font-family:var(--font); flex:1; outline:none; letter-spacing:.04em; }
.barcode-box input::placeholder { color:var(--text-3); font-size:12px; letter-spacing:0; }
.scan-flash { animation:scanFlash .4s ease; }
@keyframes scanFlash { 0%{background:rgba(45,122,58,.15)} 100%{background:var(--bg)} }

/* ── ANIMATIONS ───────────────────────────────────────────── */
@keyframes spin   { to{transform:rotate(360deg)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
@keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.5} }

.mn > * { animation: fadeIn .22s var(--ease) both; }

/* ── MOBILE ───────────────────────────────────────────────── */
@media(max-width:768px){
  .app { flex-direction:column; }
  .sb {
    width:100%!important; min-width:unset!important; height:auto!important;
    position:fixed!important; top:auto!important; bottom:0!important; left:0!important;
    flex-direction:row!important; padding:0!important;
    overflow-x:auto!important; overflow-y:hidden!important; z-index:100!important;
    border-right:none!important; border-top:1px solid var(--border)!important;
    box-shadow:0 -4px 20px rgba(0,0,0,.06)!important;
    justify-content:space-around; padding-bottom:env(safe-area-inset-bottom)!important;
    background:var(--white)!important;
  }
  .brand,.nsep,#sepRelatorios,.sb>div:last-child { display:none!important; }
  .ni {
    flex-direction:column!important; gap:3px!important;
    padding:10px 8px!important; font-size:9px!important;
    border-radius:0!important; border:none!important;
    margin:0!important; width:auto!important;
    min-width:52px!important; background:none!important;
    align-items:center!important; justify-content:center!important;
    border-top:2px solid transparent!important;
  }

  .srch { width:100%!important; }
  .login-box { padding:36px 28px!important; }

}

// ── SERVICE WORKER — PWA offline ──────────────────────────
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'lm-estudio-v1';
    const ASSETS = ['/LmBase/'];
    
    self.addEventListener('install', e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
      self.skipWaiting();
    });
    
    self.addEventListener('activate', e=>{
      e.waitUntil(caches.keys().then(keys=>
        Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
      ));
      self.clients.claim();
    });
    
    self.addEventListener('fetch', e=>{
      // Network first para API do Supabase e Google
      if(e.request.url.includes('supabase.co')||
         e.request.url.includes('googleapis.com')||
         e.request.url.includes('accounts.google.com')){
        return;
      }
      // Cache first para assets estáticos
      e.respondWith(
        caches.match(e.request).then(cached=>{
          const network = fetch(e.request).then(res=>{
            if(res.ok){
              const clone = res.clone();
              caches.open(CACHE).then(c=>c.put(e.request, clone));
            }
            return res;
          }).catch(()=>cached);
          return cached || network;
        })
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).then(reg=>{
    console.log('SW registrado:', reg.scope);
  }).catch(e=>console.warn('SW erro:', e));
}

// Hash SHA-256 simples via SubtleCrypto
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── SINCRONIZAÇÃO AUTOMÁTICA ──────────────────────────────
const SYNC_INTERVALO = 5 * 60 * 1000; // 5 minutos
let _syncTimer = null;
let _ultimoSync = null;

function iniciarSyncAutomatico(){
  if(_syncTimer) clearInterval(_syncTimer);
  _syncTimer = setInterval(syncAgendaBackground, SYNC_INTERVALO);
  // Também renova o token antes de expirar (tokens OAuth duram 1h)
  setTimeout(renovarToken, 55 * 60 * 1000);
  console.log('Sync automático iniciado — a cada 5 minutos');
  atualizarIndicadorSync('ok');
}

function pararSyncAutomatico(){
  if(_syncTimer){ clearInterval(_syncTimer); _syncTimer = null; }
}

async function syncAgendaBackground(){
  if(!gcalToken) return;
  try {
    // Atualiza silenciosamente — só recarrega se estiver na tela da agenda
    if(pg === 'gcal'){
      await carregarSemana(gcalViewDate);
    }
    // Atualiza grade de aulas se estiver nela
    if(pg === 'p_agenda'){
      await rPAgenda();
    }
    _ultimoSync = new Date();
    atualizarIndicadorSync('ok');
    console.log('Sync automático concluído:', _ultimoSync.toLocaleTimeString('pt-BR'));
  } catch(e){
    console.warn('Sync falhou:', e.message);
    atualizarIndicadorSync('erro');
    // Se token expirou, para o sync e pede reconexão
    if(e.message.includes('expirado') || e.message.includes('401')){
      pararSyncAutomatico();
      gcalToken = null;
      atualizarIndicadorSync('desconectado');
    }
  }
}

async function gcalRequest(url){
  if(!gcalToken) throw new Error('Não autenticado');
  const r = await fetch(url, { headers:{ Authorization:'Bearer '+gcalToken } });
  if(r.status===401){ gcalToken=null; throw new Error('Token expirado — reconecte'); }
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function gcalPost(url, body){
  if(!gcalToken) throw new Error('Não autenticado');
  const r = await fetch(url, {
    method:'POST',
    headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function carregarSemana(refDate, modo){
  if(modo) gcalViewMode = modo;
  const d = new Date(refDate);

  let inicio, fim;
  if(gcalViewMode === 'day'){
    inicio = new Date(d); inicio.setHours(0,0,0,0);
    fim    = new Date(d); fim.setHours(23,59,59,0);
    gcalViewDate = inicio;
  } else {
    const dow = d.getDay();
    const seg = new Date(d); seg.setDate(d.getDate() - (dow===0?6:dow-1)); seg.setHours(0,0,0,0);
    const dom = new Date(seg); dom.setDate(seg.getDate()+6); dom.setHours(23,59,59,0);
    inicio = seg; fim = dom;
    gcalViewDate = seg;
  }

  const promises = gcalCals
    .filter(c=>c.selected!==false)
    .map(c=>gcalListEvents(c.id, inicio.toISOString(), fim.toISOString())
      .then(evs=>evs.map(e=>({...e,_calColor:c.backgroundColor||'#4285F4',_calId:c.id})))
      .catch(()=>[])
    );
  const resultados = await Promise.all(promises);
  gcalEvents = resultados.flat().sort((a,b)=>{
    const ta = a.start?.dateTime||a.start?.date||'';
    const tb = b.start?.dateTime||b.start?.date||'';
    return ta.localeCompare(tb);
  });

  if(gcalViewMode === 'day') renderDia(inicio);
  else renderSemana(inicio, fim);
}

function renderSemana(seg, dom){
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diasNomes = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const mesesNomes = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  // Dias da semana (Seg a Dom)
  const dias = Array.from({length:7},(_,i)=>{ const d=new Date(seg); d.setDate(seg.getDate()+i); return d; });

  // Horas a mostrar: 5h às 22h
  const HORAS_GRID = Array.from({length:18},(_,i)=>i+5);

  // Posição vertical: 1 hora = 60px
  const PX_HORA = 60;

  // Agrupa eventos por dia
  const porDia = {};
  dias.forEach(d=>porDia[d.toDateString()]=[]);
  gcalEvents.forEach(ev=>{
    const s = ev.start?.dateTime||ev.start?.date;
    if(!s) return;
    const d = new Date(s);
    const key = d.toDateString();
    if(porDia[key]) porDia[key].push(ev);
  });

  // Cor do evento
  function corEv(ev){
    const gcalCores = {'1':'#a4bdfc','2':'#7ae7bf','3':'#dbadff','4':'#ff887c','5':'#fbd75b','6':'#ffb878','7':'#46d6db','8':'#e1e1e1','9':'#5484ed','10':'#51b749','11':'#dc2127'};
    if(ev.colorId && gcalCores[ev.colorId]) return gcalCores[ev.colorId];
    return ev._calColor||'#4285F4';
  }

  // Renderiza bloco de evento
  // Detecta conflitos e calcula colunas para cada evento do dia
  function calcularColunas(evsDia){
    const evs = evsDia.filter(ev=>ev.start?.dateTime).map(ev=>({
      ev,
      start: new Date(ev.start.dateTime).getTime(),
      end:   new Date(ev.end?.dateTime||ev.start.dateTime).getTime()
    })).sort((a,b)=>a.start-b.start);

    const colunas = [];
    evs.forEach(item=>{
      let col = colunas.findIndex(c=>!c.some(o=>item.start < o.end-60000 && item.end-60000 > o.start));
      if(col===-1){ colunas.push([]); col=colunas.length-1; }
      colunas[col].push(item);
      item.col = col;
    });

    evs.forEach(item=>{
      const conflitos = evs.filter(o=>o!==item && item.start < o.end-60000 && item.end-60000 > o.start);
      const maxCol = conflitos.reduce((m,o)=>Math.max(m,o.col), item.col);
      item.totalCols = maxCol + 1;
    });

    return evs;
  }

  function blocoEvento(item){
    const ev = item.ev||item; // suporta tanto o objeto wrapped quanto direto
    const sRaw = ev.start?.dateTime||ev.start?.date;
    const eRaw = ev.end?.dateTime||ev.end?.date;
    const allDay = !ev.start?.dateTime;
    if(allDay) return '';

    const start = new Date(sRaw);
    const end   = new Date(eRaw);
    const top   = (start.getHours() + start.getMinutes()/60 - HORAS_GRID[0]) * PX_HORA;
    const dur   = (end - start) / 3600000;
    const h     = Math.max(dur * PX_HORA, 22);
    const cor   = corEv(ev);
    const horaStr = start.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const evIdx = gcalEvents.indexOf(ev);

    // Posição horizontal baseada em coluna
    const col       = item.col||0;
    const totalCols = item.totalCols||1;
    const pctW = 100/totalCols;
    const left = col * pctW;
    const width = pctW - 1; // 1% de gap entre colunas

    return `<div onclick="abrirEditarEvento(${evIdx})" style="
      position:absolute;
      top:${top}px;
      left:calc(${left}% + 2px);
      width:calc(${width}% - 4px);
      height:${h}px;
      background:${cor}22;
      border-left:3px solid ${cor};
      border-radius:6px;
      padding:3px 6px;
      cursor:pointer;
      overflow:hidden;
      transition:all .15s;
      box-shadow:0 1px 4px rgba(0,0,0,.08);
      z-index:2;
    " onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.2)';this.style.zIndex=10"

    `<button class="btn btns" onclick="carregarSemana(gcalViewDate,'day')" style="border-radius:0;border:none;border-left:1px solid var(--border-str);${gcalViewMode==='day'?'background:var(--gold);color:white;':''}">Dia</button>`+

    '<button class="btn btns" onclick="carregarSemana(new Date('+segAnterior.getTime()+'))"><i class="ti ti-chevron-left"></i></button>'+
    '<button class="btn btns" onclick="carregarSemana(new Date('+segProxima.getTime()+'))"><i class="ti ti-chevron-right"></i></button>'+
    '<span style="font-size:14px;font-weight:600;color:var(--brown)">'+mesLabel+'</span>'+
    '<div style="margin-left:auto;display:flex;gap:8px;align-items:center">'+
    toggleBtns+
    '<select class="sel" style="font-size:12px" onchange="gcalSelectedCal=this.value;carregarSemana(gcalViewDate)">'+calOpts+'</select>'+
    '<button class="btn btns" onclick="syncAgendaBackground();carregarSemana(gcalViewDate)"><i class="ti ti-refresh"></i></button>'+
    '<button class="btn btnb" onclick="abrirNovoEvento()"><i class="ti ti-plus"></i> Novo evento</button>'+
    '</div></div>'+

    '<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;box-shadow:var(--shadow-sm)">'+

    // Header dos dias
    '<div style="display:grid;grid-template-columns:50px repeat(7,1fr);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:20">'+
    '<div style="border-right:1px solid var(--border)"></div>'+
    dias.map(d=>{
      const isHoje = d.toDateString()===hoje.toDateString();
      const nomeDia = diasNomes[d.getDay()];
      const numDia = d.getDate();
      return `<div style="text-align:center;padding:10px 4px;border-right:1px solid var(--border);cursor:pointer" onclick="carregarSemana(new Date(${d.getTime()}),'day')" title="Ver ${nomeDia} ${numDia}">
        <div style="font-size:10px;color:var(--brown-light);font-weight:600;text-transform:uppercase;letter-spacing:.06em">${nomeDia}</div>
        <div style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:4px auto 0;
          ${isHoje?'background:var(--gold);color:white;font-weight:700;':'color:var(--brown);'}font-size:15px;font-weight:${isHoje?700:400};
          transition:background .15s" onmouseover="if(!this.style.background.includes('gold'))this.style.background='rgba(201,169,110,.15)'" onmouseout="if(!this.style.background.includes('gold'))this.style.background=''">${numDia}</div>
      </div>`;
    }).join('')+
    '</div>'+

    // Grid de horas
    '<div style="display:grid;grid-template-columns:50px repeat(7,1fr);position:relative">'+

    // Coluna de horas
    '<div style="border-right:1px solid var(--border)">'+
    HORAS_GRID.map(h=>`<div style="height:${PX_HORA}px;border-bottom:1px solid rgba(201,169,110,.08);display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 6px 0 0">
      <span style="font-size:10px;color:var(--brown-light)">${String(h).padStart(2,'0')}:00</span></div>`).join('')+
    '</div>'+

    // Colunas dos dias
    dias.map(d=>{
      const evsDia = porDia[d.toDateString()]||[];
      const isHoje = d.toDateString()===hoje.toDateString();
      const evsComColunas = calcularColunas(evsDia);
      // Eventos dia-inteiro ficam acima (ignorados no grid)
      const evsDiaInteiro = evsDia.filter(ev=>!ev.start?.dateTime);
      return `<div style="border-right:1px solid var(--border);position:relative;${isHoje?'background:rgba(201,169,110,.03)':''}">
        ${HORAS_GRID.map(h=>`<div style="height:${PX_HORA}px;border-bottom:1px solid rgba(201,169,110,.08)" onclick="abrirNovoEventoHora(${d.getFullYear()},${d.getMonth()},${d.getDate()},${h})"></div>`).join('')}
        ${evsComColunas.map(item=>blocoEvento(item)).join('')}
      </div>`;
    }).join('')+
    '</div></div>';

  set(html);

  // Linha do horário atual
  setTimeout(()=>{
    const agora = new Date();
    const top = (agora.getHours() + agora.getMinutes()/60 - HORAS_GRID[0]) * PX_HORA;
    // Injeta linha vermelha na coluna de hoje
    const cols = document.querySelectorAll('[style*="border-right:1px solid var(--border);position:relative"]');
    const diaHojeIdx = dias.findIndex(d=>d.toDateString()===hoje.toDateString());
    if(diaHojeIdx>=0 && cols[diaHojeIdx]){
      const linha = document.createElement('div');
      linha.style.cssText = `position:absolute;top:${top}px;left:0;right:0;height:2px;background:#EA4335;z-index:15;pointer-events:none`;
      const circulo = document.createElement('div');
      circulo.style.cssText = 'position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#EA4335';
      linha.appendChild(circulo);
      cols[diaHojeIdx].appendChild(linha);
    }
  }, 100);
}

function abrirEditarEvento(idx){
  const ev = gcalEvents[idx];
  if(!ev) return;
  window._evEditando = ev;
  window._evEditIdx = idx;

  const sRaw = ev.start?.dateTime||ev.start?.date||'';
  const eRaw = ev.end?.dateTime||ev.end?.date||'';
  const allDay = !ev.start?.dateTime;

  function toLocal(iso){
    if(!iso) return '';
    const d = new Date(iso);
    const pad = n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  const isRecorrente = !!(ev.recurrence || ev.recurringEventId);
  const cor = ev._calColor||'#4285F4';

  abrirModal(
    `<div class="mdt"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${cor};margin-right:8px;vertical-align:middle"></span>Editar evento</div>`+
    '<label class="fl">Título *</label><input class="fi" id="ev_titulo" value="'+((ev.summary||'').replace(/"/g,'&quot;'))+'">'+
    '<div class="fr2"><div><label class="fl">Início</label><input class="fi" id="ev_inicio" type="datetime-local" value="'+toLocal(sRaw)+'"></div>'+
    '<div><label class="fl">Fim</label><input class="fi" id="ev_fim" type="datetime-local" value="'+toLocal(eRaw)+'"></div></div>'+
    '<label class="fl">Local</label><input class="fi" id="ev_local" value="'+(ev.location||'')+'">'+
    '<label class="fl">Descrição</label><textarea class="fi" id="ev_desc" rows="2" style="resize:vertical">'+(ev.description||'')+'</textarea>'+

    // Seletor de escopo para eventos recorrentes
    (isRecorrente?
      '<label class="fl" style="margin-top:4px">Aplicar alteração em</label>'+
      '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">'+
      '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--brown)">'+
        '<input type="radio" name="ev_escopo" value="this" checked style="accent-color:var(--gold)">'+
        '<span><strong>Somente este evento</strong> <span style="color:var(--brown-light);font-size:11px">— altera apenas esta data</span></span></label>'+
      '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--brown)">'+
        '<input type="radio" name="ev_escopo" value="following" style="accent-color:var(--gold)">'+
        '<span><strong>Este e os seguintes</strong> <span style="color:var(--brown-light);font-size:11px">— a partir desta data em diante</span></span></label>'+
      '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--brown)">'+
        '<input type="radio" name="ev_escopo" value="all" style="accent-color:var(--gold)">'+
        '<span><strong>Todos os eventos</strong> <span style="color:var(--brown-light);font-size:11px">— toda a série recorrente</span></span></label>'+
      '</div>'
    :'')+

    '<div class="mdf">'+
    '<button class="btn" style="color:#8B2E1A;border-color:rgba(139,46,26,.3)" onclick="excluirEvento()"><i class="ti ti-trash"></i> Excluir</button>'+
    '<button class="btn" onclick="fecharModal()">Cancelar</button>'+

async function atualizarEvento(){
  const ev  = window._evEditando;
  if(!ev) return;
  const btn = document.getElementById('ev_btn');
  btn.disabled=true; btn.textContent='Salvando…';

  const titulo = document.getElementById('ev_titulo').value.trim();
  const inicio = document.getElementById('ev_inicio').value;
  const fim    = document.getElementById('ev_fim').value;
  const escopo = document.querySelector('input[name="ev_escopo"]:checked')?.value || 'this';

  const isRecorrente = !!(ev.recurrence || ev.recurringEventId);
  const calId = ev._calId||'primary';
  const baseId = ev.recurringEventId || ev.id; // ID da série mãe

  const body = {
    summary:     titulo,
    location:    document.getElementById('ev_local').value||undefined,
    description: document.getElementById('ev_desc').value||undefined,
    start: { dateTime: new Date(inicio).toISOString(), timeZone:'America/Sao_Paulo' },
    end:   { dateTime: new Date(fim||inicio).toISOString(), timeZone:'America/Sao_Paulo' },
  };

  try {
    if(!isRecorrente || escopo==='this'){
      // Edita só esta ocorrência
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${ev.id}`,{
        method:'PATCH',
        headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });

    } else if(escopo==='following'){
      // "Este e os seguintes": trunca a série no dia anterior e cria nova série a partir daqui
      // 1. Busca o evento mãe
      const maeR = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        headers:{ Authorization:'Bearer '+gcalToken }
      });
      const mae = await maeR.json();

      // 2. Trunca a série mãe: define UNTIL = 1 dia antes desta ocorrência
      const diaAntes = new Date(ev.start?.dateTime||ev.start?.date);
      diaAntes.setDate(diaAntes.getDate()-1);
      const until = diaAntes.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
      const recOld = (mae.recurrence||[]).map(r=>
        r.startsWith('RRULE:') ? r.replace(/UNTIL=[^;]*(;|$)/,'').replace(/COUNT=[^;]*(;|$)/,'')+'UNTIL='+until : r
      );
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        method:'PATCH',
        headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
        body: JSON.stringify({recurrence: recOld})
      });

      // 3. Cria nova série com os dados editados a partir desta data
      const novoEvento = {
        ...body,
        recurrence: mae.recurrence||['RRULE:FREQ=WEEKLY']
      };
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events`,{
        method:'POST',
        headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
        body: JSON.stringify(novoEvento)
      });

    } else if(escopo==='all'){
      // Edita a série inteira (evento mãe)
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        method:'PATCH',
        headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });
    }

    const escopoLabel = escopo==='this'?'esta ocorrência':escopo==='following'?'este e seguintes':'toda a série';
    await registrarLog('editou evento', 'google_agenda', titulo+' ('+escopoLabel+') em '+new Date(inicio).toLocaleDateString('pt-BR'));
    fecharModal();
    carregarSemana(gcalViewDate);
  } catch(e){
    btn.disabled=false; btn.textContent='Salvar';
    alert('Erro ao salvar: '+e.message);
  }
}

async function excluirEvento(){
  const ev = window._evEditando;
  if(!ev) return;
  const isRecorrente = !!(ev.recurrence || ev.recurringEventId);
  const calId = ev._calId||'primary';
  const baseId = ev.recurringEventId || ev.id;

  // Para recorrentes, pergunta o escopo
  let escopo = 'this';
  if(isRecorrente){
    const opcao = await new Promise(resolve=>{
      abrirModal(
        '<div class="mdt" style="color:#8B2E1A"><i class="ti ti-trash" style="margin-right:8px"></i>Excluir evento recorrente</div>'+
        '<div style="font-size:13px;color:var(--brown);margin-bottom:16px">Como deseja excluir <strong>"'+ev.summary+'"</strong>?</div>'+
        '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">'+
        '<button class="btn" style="text-align:left;padding:10px 14px" onclick="window._excluirEscopo=\'this\';fecharModal()">'+
          '<strong>Somente este evento</strong><div style="font-size:11px;color:var(--brown-light)">Remove apenas esta data</div></button>'+
        '<button class="btn" style="text-align:left;padding:10px 14px" onclick="window._excluirEscopo=\'following\';fecharModal()">'+
          '<strong>Este e os seguintes</strong><div style="font-size:11px;color:var(--brown-light)">Remove desta data em diante</div></button>'+
        '<button class="btn" style="text-align:left;padding:10px 14px" onclick="window._excluirEscopo=\'all\';fecharModal()">'+
          '<strong>Todos os eventos</strong><div style="font-size:11px;color:var(--brown-light)">Remove toda a série</div></button>'+
        '</div>'+
        '<div class="mdf"><button class="btn" onclick="window._excluirEscopo=\'cancel\';fecharModal()">Cancelar</button></div>'
      );
      // Aguarda fechamento do modal
      const check = setInterval(()=>{
        if(document.getElementById('ovlbg').style.display==='none'){
          clearInterval(check);
          resolve(window._excluirEscopo||'cancel');
        }
      }, 100);
    });
    if(opcao==='cancel') return;
    escopo = opcao;
  } else {
    if(!confirm('Excluir "'+ev.summary+'"?')) return;
  }

  try {
    if(escopo==='this'){
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${ev.id}`,{
        method:'DELETE', headers:{ Authorization:'Bearer '+gcalToken }
      });
    } else if(escopo==='following'){
      // Trunca a série no dia anterior
      const maeR = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        headers:{ Authorization:'Bearer '+gcalToken }
      });
      const mae = await maeR.json();
      const diaAntes = new Date(ev.start?.dateTime||ev.start?.date);
      diaAntes.setDate(diaAntes.getDate()-1);
      const until = diaAntes.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
      const recOld = (mae.recurrence||[]).map(r=>
        r.startsWith('RRULE:') ? r.replace(/UNTIL=[^;]*(;|$)/,'').replace(/COUNT=[^;]*(;|$)/,'')+'UNTIL='+until : r
      );
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        method:'PATCH',
        headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
        body: JSON.stringify({recurrence: recOld})
      });
    } else if(escopo==='all'){
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        method:'DELETE', headers:{ Authorization:'Bearer '+gcalToken }
      });
    }

    const escopoLabel = escopo==='this'?'esta ocorrência':escopo==='following'?'este e seguintes':'toda a série';
    await registrarLog('excluiu evento', 'google_agenda', ev.summary+' ('+escopoLabel+')');
    fecharModal();
    carregarSemana(gcalViewDate);
  } catch(e){ alert('Erro ao excluir: '+e.message); }
}

async function salvarEvento(){
  const titulo = document.getElementById('ev_titulo').value.trim();
  if(!titulo){ alert('Informe o título.'); return; }
  const btn = document.getElementById('ev_btn');
  btn.disabled=true; btn.textContent='Criando…';
  const inicio = document.getElementById('ev_inicio').value;
  const fim    = document.getElementById('ev_fim').value;
  const calId  = document.getElementById('ev_cal')?.value||'primary';
  const evento = {
    summary: titulo,
    location: document.getElementById('ev_local').value||undefined,
    description: document.getElementById('ev_desc').value||undefined,
    start: { dateTime: new Date(inicio).toISOString(), timeZone:'America/Sao_Paulo' },
    end:   { dateTime: new Date(fim||inicio).toISOString(), timeZone:'America/Sao_Paulo' },
  };
  try {
    await gcalCreateEvent(calId, evento);
    await registrarLog('criou evento', 'google_agenda', titulo+' em '+new Date(inicio).toLocaleDateString('pt-BR'));
    fecharModal();
    carregarSemana(gcalViewDate);
  } catch(e){
    btn.disabled=false; btn.textContent='Criar';
    alert('Erro: '+e.message);
  }
}

function renderDia(dia){
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diasNomes = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const mesesNomes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const HORAS_GRID = Array.from({length:18},(_,i)=>i+5);
  const PX_HORA = 64;
  const isHoje = dia.toDateString()===hoje.toDateString();

  const diaAnterior = new Date(dia); diaAnterior.setDate(dia.getDate()-1);
  const diaProximo  = new Date(dia); diaProximo.setDate(dia.getDate()+1);

  const calOpts = gcalCals.map(c=>`<option value="${c.id}" ${c.id===gcalSelectedCal?'selected':''}>${c.summary}</option>`).join('');

  const toggleBtns =
    '<div style="display:flex;border:1px solid var(--border-str);border-radius:var(--radius-sm);overflow:hidden">'+
    `<button class="btn btns" onclick="carregarSemana(gcalViewDate,'week')" style="border-radius:0;border:none;">Semana</button>`+
    `<button class="btn btns" onclick="carregarSemana(gcalViewDate,'day')" style="border-radius:0;border:none;border-left:1px solid var(--border-str);background:var(--gold);color:white;">Dia</button>`+
    '</div>';

  const mesLabel = `${diasNomes[dia.getDay()]}, ${dia.getDate()} de ${mesesNomes[dia.getMonth()]} ${dia.getFullYear()}`;

  // Eventos do dia com colunas
  function corEv(ev){
    const gcalCores = {'1':'#a4bdfc','2':'#7ae7bf','3':'#dbadff','4':'#ff887c','5':'#fbd75b','6':'#ffb878','7':'#46d6db','8':'#e1e1e1','9':'#5484ed','10':'#51b749','11':'#dc2127'};
    if(ev.colorId && gcalCores[ev.colorId]) return gcalCores[ev.colorId];
    return ev._calColor||'#4285F4';
  }

  function calcularColunasDia(evs){
    const items = evs.filter(ev=>ev.start?.dateTime).map(ev=>({
      ev,
      start: new Date(ev.start.dateTime).getTime(),
      end:   new Date(ev.end?.dateTime||ev.start.dateTime).getTime()
    })).sort((a,b)=>a.start-b.start);

    // Atribui coluna — eventos sequenciais (end == start do outro) NÃO conflitam
    const colunas=[];
    items.forEach(item=>{
      let col=colunas.findIndex(c=>!c.some(o=>item.start < o.end-60000 && item.end-60000 > o.start));
      if(col===-1){colunas.push([]);col=colunas.length-1;}
      colunas[col].push(item);
      item.col=col;
    });

    // totalCols por grupo de conflito real
    items.forEach(item=>{
      const conflitos = items.filter(o=>o!==item && item.start < o.end-60000 && item.end-60000 > o.start);
      const maxCol = conflitos.reduce((m,o)=>Math.max(m,o.col), item.col);
      item.totalCols = maxCol + 1;
    });

    return items;
  }

  const evsDia = gcalEvents.filter(e=>{
    const s=e.start?.dateTime||e.start?.date;
    return s&&new Date(s).toDateString()===dia.toDateString();
  });
  const evsComColunas = calcularColunasDia(evsDia);
  const evsDiaInteiro = evsDia.filter(e=>!e.start?.dateTime);

  let html =
    '<div class="pt">Google Agenda</div>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">'+
    '<button class="btn btns" onclick="carregarSemana(new Date())"><i class="ti ti-calendar"></i> Hoje</button>'+
    '<button class="btn btns" onclick="carregarSemana(new Date('+diaAnterior.getTime()+'),'+"'day'"+')"><i class="ti ti-chevron-left"></i></button>'+
    '<button class="btn btns" onclick="carregarSemana(new Date('+diaProximo.getTime()+'),'+"'day'"+')"><i class="ti ti-chevron-right"></i></button>'+
    `<span style="font-size:15px;font-weight:600;color:var(--brown)">${mesLabel}</span>`+
    '<div style="margin-left:auto;display:flex;gap:8px;align-items:center">'+
    toggleBtns+
    '<select class="sel" style="font-size:12px" onchange="gcalSelectedCal=this.value;carregarSemana(gcalViewDate,\'day\')">'+calOpts+'</select>'+
    '<button class="btn btns" onclick="syncAgendaBackground();carregarSemana(gcalViewDate,\'day\')"><i class="ti ti-refresh"></i></button>'+
    '<button class="btn btnb" onclick="abrirNovoEvento()"><i class="ti ti-plus"></i> Novo evento</button>'+
    '</div></div>';

  // Eventos dia inteiro
  if(evsDiaInteiro.length){
    html += '<div style="background:var(--glass);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px">'+
    evsDiaInteiro.map((e,i)=>{
      const cor=corEv(e);
      const idx=gcalEvents.indexOf(e);
      return `<span onclick="abrirEditarEvento(${idx})" style="background:${cor}22;border:1px solid ${cor}44;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:500;color:${cor};cursor:pointer">${e.summary}</span>`;
    }).join('')+'</div>';
  }

  // Grade do dia
  html +=
    '<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;box-shadow:var(--shadow-sm)">'+
    // Header do dia
    `<div style="display:grid;grid-template-columns:54px 1fr;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:20">
      <div style="border-right:1px solid var(--border)"></div>
      <div style="text-align:center;padding:12px 4px">
        <div style="font-size:11px;color:var(--brown-light);font-weight:600;text-transform:uppercase;letter-spacing:.06em">${diasNomes[dia.getDay()].slice(0,3)}</div>
        <div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:4px auto 0;${isHoje?'background:var(--gold);color:white;font-weight:700;':'color:var(--brown);'}font-size:20px;font-weight:${isHoje?700:500}">${dia.getDate()}</div>
      </div>
    </div>`+
    // Grid de horas
    '<div style="display:grid;grid-template-columns:54px 1fr;position:relative">'+
    // Coluna de horas
    '<div style="border-right:1px solid var(--border)">'+
    HORAS_GRID.map(h=>`<div style="height:${PX_HORA}px;border-bottom:1px solid rgba(201,169,110,.08);display:flex;align-items:flex-start;justify-content:flex-end;padding:3px 8px 0 0"><span style="font-size:11px;color:var(--brown-light)">${String(h).padStart(2,'0')}:00</span></div>`).join('')+
    '</div>'+
    // Coluna do dia — altura explícita = horas * PX_HORA
    `<div style="position:relative;height:${HORAS_GRID.length*PX_HORA}px;${isHoje?'background:rgba(201,169,110,.02)':''}">
      ${HORAS_GRID.map((h,i)=>`<div style="position:absolute;top:${i*PX_HORA}px;left:0;right:0;height:${PX_HORA}px;border-bottom:1px solid rgba(201,169,110,.08);box-sizing:border-box" onclick="abrirNovoEventoHora(${dia.getFullYear()},${dia.getMonth()},${dia.getDate()},${h})"></div>`).join('')}
      ${evsComColunas.map(item=>{
        const ev=item.ev;
        const sRaw=ev.start?.dateTime;
        const eRaw=ev.end?.dateTime||sRaw;
        const start=new Date(sRaw), end=new Date(eRaw);
        const top=(start.getHours()+start.getMinutes()/60-HORAS_GRID[0])*PX_HORA;
        const dur=(end-start)/3600000;
        const h=Math.max(dur*PX_HORA,24);
        const cor=corEv(ev);
        const horaStr=start.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+' – '+end.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        const col=item.col||0, totalCols=item.totalCols||1;
        const pctW=100/totalCols, left=col*pctW;
        const evIdx=gcalEvents.indexOf(ev);
        return `<div onclick="abrirEditarEvento(${evIdx})" style="
          position:absolute;top:${top}px;left:calc(${left}%+3px);width:calc(${pctW}%-6px);height:${h}px;
          background:${cor}18;border-left:4px solid ${cor};border-radius:6px;
          padding:6px 10px;cursor:pointer;overflow:hidden;transition:all .15s;
          box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:2"
          onmouseover="this.style.background='${cor}28';this.style.zIndex=10"
          onmouseout="this.style.background='${cor}18';this.style.zIndex=2">
          <div style="font-size:12px;font-weight:600;color:${cor};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.summary||'(sem título)'}</div>
          ${h>40?`<div style="font-size:11px;color:${cor}99;margin-top:2px">${horaStr}</div>`:''}
          ${h>60&&ev.location?`<div style="font-size:10px;color:${cor}88;margin-top:2px"><i class="ti ti-map-pin"></i> ${ev.location}</div>`:''}
        </div>`;
      }).join('')}
    </div>`+
    '</div></div>';

  // Linha do horário atual
  set(html);
  if(isHoje){
    setTimeout(()=>{
      const agora=new Date();
      const top=(agora.getHours()+agora.getMinutes()/60-HORAS_GRID[0])*PX_HORA;
      const cols=document.querySelectorAll('[style*="position:relative"][style*="background:rgba(201,169,110,.02)"]');
      if(cols[0]){
        const linha=document.createElement('div');
        linha.style.cssText=`position:absolute;top:${top}px;left:0;right:0;height:2px;background:#EA4335;z-index:15;pointer-events:none`;
        const circulo=document.createElement('div');
        circulo.style.cssText='position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#EA4335';
        linha.appendChild(circulo);
        cols[0].appendChild(linha);
      }
    },100);
  }
}

// Buffer para captura de leitores de código de barras (USB HID)
// Leitores tipicamente enviam os caracteres rapidamente + Enter
let _barcodeBuffer = '';
let _barcodeTimer  = null;
let _barcodeAtivo  = false;
let _barcodeCallback = null;

function ativarLeitorCodigoBarras(callback){
  _barcodeCallback = callback;
  _barcodeAtivo = true;
  _barcodeBuffer = '';
}

function desativarLeitorCodigoBarras(){
  _barcodeAtivo = false;
  _barcodeCallback = null;
  _barcodeBuffer = '';
}

// Captura global de teclado para o leitor
document.addEventListener('keydown', function(e){
  if(!_barcodeAtivo) return;
  if(e.key === 'Enter' && _barcodeBuffer.length > 3){
    const codigo = _barcodeBuffer.trim();
    _barcodeBuffer = '';
    clearTimeout(_barcodeTimer);
    if(_barcodeCallback) _barcodeCallback(codigo);
    return;
  }
  if(e.key.length === 1){
    _barcodeBuffer += e.key;
    clearTimeout(_barcodeTimer);
    _barcodeTimer = setTimeout(()=>{ _barcodeBuffer=''; }, 200);
  }
});

    '</div>'+

async function processarCodigoManual(codigo, confirmar=false){
  codigo = (codigo||'').trim();
  if(!codigo) return;
  if(!confirmar) return; // espera Enter

  const input = document.getElementById('barcodeInput');
  const box   = document.getElementById('barcodeBox');
  const res   = document.getElementById('barcodeResult');
  if(input) input.value = '';

  // Efeito visual
  if(box){ box.classList.add('scan-flash'); setTimeout(()=>box.classList.remove('scan-flash'),400); }

  try {
    // Busca no estoque por código
    const r = await fetchWithTimeout(
      `${SB_URL}/rest/v1/estoque?codigo_barras=eq.${encodeURIComponent(codigo)}&limit=1`,
      { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
    );
    const lista = await r.json();

    if(lista[0]){
      const peca = lista[0];
      const novaQtd = (peca.quantidade||0)+1;
      await sbUpdate('estoque', peca.id, {quantidade: novaQtd});

      window._bipagemContadores[codigo] = (window._bipagemContadores[codigo]||0)+1;
      window._bipagemLog.unshift({codigo, item:peca.item, qtd:novaQtd, ok:true});

      if(res) res.innerHTML = `<div style="background:rgba(74,122,40,.1);border:1px solid rgba(74,122,40,.2);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px">
        <i class="ti ti-check" style="color:#3A6A14;font-size:18px"></i>
        <div><strong style="color:var(--brown)">${peca.item}</strong> <span style="color:var(--brown-light)">${peca.tamanho||''}</span><br>
        <span style="font-size:11px;color:#3A6A14">Estoque atualizado: ${peca.quantidade||0} → ${novaQtd}</span></div></div>`;
    } else {
      // Código não encontrado — pergunta se quer cadastrar
      window._bipagemLog.unshift({codigo, item:'Desconhecido', ok:false});
      if(res) res.innerHTML = `<div style="background:rgba(184,146,74,.1);border:1px solid rgba(184,146,74,.3);border-radius:8px;padding:10px 14px">
        <div style="font-weight:600;color:var(--brown)">Código não cadastrado: ${codigo}</div>
        <div style="font-size:11px;color:var(--brown-light);margin:4px 0 8px">Esta peça não existe no estoque ainda.</div>
        <button class="btn btns btnb" onclick="abrirCadastrarPecaCodigo('${codigo}')">+ Cadastrar esta peça</button></div>`;
    }
  } catch(e){
    if(res) res.innerHTML = `<div style="color:#8B2E1A;font-size:12px">Erro: ${e.message}</div>`;
  }

  // Atualiza log visual
  atualizarBipagemLog();
  if(input) input.focus();
}

function atualizarBipagemLog(){
  const el = document.getElementById('barcodeLog');
  if(!el) return;
  const log = window._bipagemLog||[];
  if(!log.length){ el.innerHTML = '<span style="opacity:.5">Nenhum item ainda…</span>'; return; }
  el.innerHTML = log.slice(0,20).map(l=>
    `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
      <i class="ti ${l.ok?'ti-check':'ti-alert-circle'}" style="color:${l.ok?'#3A6A14':'#8B2E1A'};font-size:14px"></i>
      <span style="flex:1">${l.item}</span>
      <span style="font-size:10px;color:var(--brown-light);font-family:monospace">${l.codigo}</span>
    </div>`
  ).join('');
}

async function buscarPecaPorCodigo(codigo){
  if(!codigo) return;
  codigo = codigo.trim();
  const input = document.getElementById('vd_codigo_barras');
  const res   = document.getElementById('vd_codigo_result');

  try {
    const r = await fetchWithTimeout(
      `${SB_URL}/rest/v1/estoque?codigo_barras=eq.${encodeURIComponent(codigo)}&limit=1`,
      { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
    );
    const lista = await r.json();
    if(lista[0]){
      const peca = lista[0];
      // Preenche campos automaticamente
      const itemInput = document.getElementById('vd_item');
      const marcaInput = document.getElementById('vd_marca');
      if(itemInput) itemInput.value = peca.item;
      if(marcaInput){
        for(let o of marcaInput.options)
          if(o.value===peca.marca) o.selected=true;
      }
      if(res) res.innerHTML = `<div style="font-size:11px;background:rgba(74,122,40,.1);border:1px solid rgba(74,122,40,.2);border-radius:6px;padding:6px 10px;color:#3A6A14">
        ✓ ${peca.item} ${peca.tamanho||''} — estoque atual: ${peca.quantidade||0} un.</div>`;
      window._vendaCodigoBarras = codigo;
    } else {
      if(res) res.innerHTML = `<div style="font-size:11px;color:#8B2E1A">Código não encontrado no estoque. Verifique ou cadastre a peça primeiro.</div>`;
    }
  } catch(e){}
}

// ── EXCLUIR VENDA ──────────────────────────────────────────
async function excluirVenda(){
  const v = window._vendaEditando;
  if(!v) return;
  if(!confirm('Excluir a venda de "'+v.item+'"?\n\nEsta ação não pode ser desfeita.')) return;
  try {
    if(v.id) await sbDelete('vendas', v.id);
    // Remove do cache
    if(window._vendasCache){
      const i = window._vendasCache.findIndex(x=>x.id===v.id);
      if(i>=0) window._vendasCache.splice(i,1);
    }
    if(window._vendasLista){
      const i = window._vendasLista.findIndex(x=>x.id===v.id);
      if(i>=0) window._vendasLista.splice(i,1);
    }
    await registrarLog('excluiu venda','vendas', v.item+' — '+fR(v.preco));
    fecharModal();
    navLVendas();
  } catch(e){ alert('Erro: '+e.message); }
}

function buildGrade(){
  const g={};
  DIAS.forEach(d=>HORAS.forEach(h=>g[d+'-'+h]=[]));
  AL.filter(a=>a.s==='A').forEach(a=>{
    if(!a.h||a.h==='-'||a.h==='—') return;
    a.h.split(',').forEach(p=>{
      const m=p.trim().match(/^(SEG|TER|QUA|QUI|SEX|SAB)\s+(\d+H)/i);
      if(!m) return;
      const dm={SEG:'Seg',TER:'Ter',QUA:'Qua',QUI:'Qui',SEX:'Sex',SAB:'Sáb'};
      const k=dm[m[1].toUpperCase()]+'-'+m[2].toUpperCase();
      if(g[k]) g[k].push(a.n.split(' ').slice(0,2).map((w,i)=>i?w[0]+'.':w).join(' '));
    });
  });
  return g;
}

// Timeout helper — aborta se demorar mais de 6 segundos
function fetchWithTimeout(url, opts={}, ms=6000){
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, {...opts, signal:ctrl.signal}).finally(()=>clearTimeout(tid));
}

async function sbGet(table, order='id'){
  const r = await fetchWithTimeout(`${SB_URL}/rest/v1/${table}?order=${order}`, {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

function renderPonto(registros, isAdmin, usuarioLogado){
  const hoje = new Date();
  const hojeStr = hoje.toLocaleDateString('pt-BR');

  function fmtHora(iso){ return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
  function fmtMin(min){ const h=Math.floor(min/60),m=min%60; return h+'h'+(m>0?String(m).padStart(2,'0')+'min':''); }

  function calcMin(regs){
    const s=[...regs].sort((a,b)=>new Date(a.horario)-new Date(b.horario));
    let entrada=null,pausaIni=null,min=0;
    s.forEach(r=>{
      if(r.tipo==='entrada') entrada=new Date(r.horario);
      else if(r.tipo==='inicio_pausa'&&entrada) pausaIni=new Date(r.horario);
      else if(r.tipo==='fim_pausa') pausaIni=null;
      else if(r.tipo==='saida'&&entrada){
        const total=(new Date(r.horario)-entrada)/60000;
        const pausa=pausaIni?(new Date(r.horario)-pausaIni)/60000:0;
        min+=total-pausa; entrada=null;
      }
    });
    if(entrada&&!pausaIni) min+=(new Date()-entrada)/60000;
    return Math.max(0,Math.round(min));
  }

  // Determina próximo tipo para o usuário logado
  const regHojeUser = registros.filter(r=>{
    const d=new Date(r.horario).toLocaleDateString('pt-BR');
    return d===hojeStr && r.usuario===usuarioLogado;
  }).sort((a,b)=>new Date(a.horario)-new Date(b.horario));

  const ultimoTipo = regHojeUser.length?regHojeUser[regHojeUser.length-1].tipo:null;
  const proximoTipo = !ultimoTipo?'entrada'
    :ultimoTipo==='entrada'?'inicio_pausa'
    :ultimoTipo==='inicio_pausa'?'fim_pausa'
    :ultimoTipo==='fim_pausa'?'saida':null;

  const minHoje = calcMin(regHojeUser);
  const pctHoje = Math.min(100,Math.round(minHoje/CARGA_HORARIA*100));

  // ── Bloco de bater ponto ──────────────────────────────────
  let pontoHtml = '';
  if(!isAdmin){
    if(proximoTipo){
      const tp=TIPO_PONTO[proximoTipo];
      pontoHtml=
        '<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r-xl);padding:28px;margin-bottom:20px;text-align:center;box-shadow:var(--shadow-sm)">'+
        '<div style="font-size:13px;color:var(--text-3);margin-bottom:16px">'+hojeStr+' · '+hoje.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</div>'+
        '<div style="margin-bottom:20px">'+
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-bottom:6px">'+
        '<span>Horas trabalhadas hoje</span><span style="font-weight:600">'+fmtMin(minHoje)+' / 6h</span></div>'+
        '<div style="height:8px;border-radius:4px;background:var(--bg-2)">'+
        '<div style="width:'+pctHoje+'%;height:100%;border-radius:4px;background:'+(pctHoje>=100?'#2D7A3A':'var(--gold)')+'"></div></div>'+
        (minHoje>0&&pctHoje<100?'<div style="font-size:11px;color:var(--text-3);margin-top:4px">Faltam '+fmtMin(CARGA_HORARIA-minHoje)+'</div>':'')+
        '</div>'+
        '<button onclick="registrarPonto(\''+proximoTipo+'\')" style="background:'+tp.cor+';color:#fff;border:none;border-radius:var(--r-full);padding:16px 40px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);box-shadow:0 4px 20px rgba(0,0,0,.15);display:inline-flex;align-items:center;gap:10px">'+
        '<i class="ti '+tp.icon+'" style="font-size:20px"></i> '+tp.label+'</button>'+
        (regHojeUser.length?
          '<div style="margin-top:20px;display:flex;justify-content:center;gap:14px;flex-wrap:wrap">'+
          regHojeUser.map(r=>{const tp2=TIPO_PONTO[r.tipo]||{};return(
            '<div style="text-align:center">'+
            '<div style="font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase">'+tp2.label+'</div>'+
            '<div style="font-size:15px;font-weight:700;color:'+(tp2.cor||'var(--text-1)')+'">'+fmtHora(r.horario)+'</div></div>'
          );}).join('<div style="color:var(--border-md);font-size:18px;margin-top:10px">→</div>')+
          '</div>':'')+'</div>';
    } else {
      pontoHtml='<div style="background:#E8F5EC;border:1px solid #B8DFC0;border-radius:var(--r-xl);padding:28px;margin-bottom:20px;text-align:center">'+
      '<i class="ti ti-circle-check" style="font-size:36px;color:#2D7A3A;display:block;margin-bottom:8px"></i>'+
      '<div style="font-size:16px;font-weight:700;color:#2D7A3A">Dia concluído!</div>'+
      '<div style="font-size:13px;color:#3D7A4A;margin-top:4px">Total: <strong>'+fmtMin(minHoje)+'</strong></div></div>';
    }
  } else {
    pontoHtml='<div style="display:flex;gap:10px;margin-bottom:20px">'+
    '<button class="btn btnb" onclick="abrirRegistroPontoAdmin()"><i class="ti ti-clock-plus"></i> Registrar ponto retroativo</button>'+
    '</div>';
  }

  // ── Histórico por dia ─────────────────────────────────────
  const regsVisiveis = isAdmin ? registros : registros.filter(r=>r.usuario===usuarioLogado);
  const porDia={};
  regsVisiveis.forEach(r=>{
    const d=new Date(r.horario).toLocaleDateString('pt-BR');
    if(!porDia[d]) porDia[d]=[];
    porDia[d].push(r);
  });
  const dias=Object.entries(porDia).sort((a,b)=>new Date(b[0].split('/').reverse().join('-'))-new Date(a[0].split('/').reverse().join('-')));

  const histHtml=dias.slice(0,20).map(([dia,regs])=>{
    const regsDia=regs.sort((a,b)=>new Date(a.horario)-new Date(b.horario));
    const min=calcMin(regsDia);
    const completo=!!regsDia.find(r=>r.tipo==='saida');
    const diaHoje=dia===hojeStr;
    return '<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-xs)">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+
    '<div style="font-size:13px;font-weight:700;color:var(--text-1)">'+dia+(diaHoje?' <span class="bdg ba">hoje</span>':'')+'</div>'+
    '<div style="margin-left:auto;display:flex;align-items:center;gap:8px">'+
    '<span style="font-size:13px;font-weight:600;color:'+(completo?'#2D7A3A':'var(--gold-dark)')+'">'+fmtMin(min)+'</span>'+
    '<span class="bdg '+(completo?'bg':'ba')+'">'+(completo?'Completo':'Em andamento')+'</span>'+
    (isAdmin?'<button class="btn btns" onclick="abrirRegistroPontoAdmin(\''+dia+'\')"><i class="ti ti-plus"></i></button>':'')+
    '</div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
    regsDia.map(r=>{
      const tp2=TIPO_PONTO[r.tipo]||{label:r.tipo,cor:'var(--text-2)',icon:'ti-clock'};
      return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 12px;display:flex;align-items:center;gap:8px">'+
      '<i class="ti '+tp2.icon+'" style="color:'+tp2.cor+';font-size:14px"></i>'+
      '<div><div style="font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase">'+tp2.label+'</div>'+
      '<div style="font-size:14px;font-weight:700;color:var(--text-1)">'+fmtHora(r.horario)+
      (r.horario_manual?'<span style="font-size:9px;color:var(--gold);margin-left:3px">●manual</span>':'')+
      '</div>'+(isAdmin?'<div style="font-size:10px;color:var(--text-3)">'+r.usuario+'</div>':'')+
      '</div></div>';
    }).join('')+'</div></div>';
  }).join('');

  set(
    '<div class="pt">Controle de Ponto</div>'+
    '<div class="ps">Carga horária: 6h · Pausa: 15 min · '+hojeStr+'</div>'+
    pontoHtml+
    '<div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">'+
    (isAdmin?'Histórico — todos':'Meu histórico')+'</div>'+
    (histHtml||'<div style="text-align:center;padding:32px;color:var(--text-3)">Nenhum registro ainda</div>')
  );
}

async function registrarPonto(tipo){
  const usuario = usuarioAtual?.nome||'Vitória';
  try {
    await sbInsert('registros_ponto',{
      usuario, tipo,
      horario: new Date().toISOString(),
      horario_manual: false,
      registrado_por: usuario,
    });
    await registrarLog('bateu ponto','ponto',usuario+' — '+(TIPO_PONTO[tipo]?.label||tipo));
    navPonto();
  } catch(e){ alert('Erro: '+e.message); }
}

function abrirRegistroPontoAdmin(diaPreenchido){
  const hoje=new Date();
  const dataVal=diaPreenchido
    ? diaPreenchido.split('/').reverse().join('-').replace(/(\d{2})$/,'20$1')
    : hoje.toISOString().split('T')[0];
  abrirModal(
    '<div class="mdt"><i class="ti ti-clock-plus" style="margin-right:8px;color:var(--gold)"></i>Registrar ponto retroativo</div>'+
    '<label class="fl">Funcionário</label>'+

    '<label class="fl">Tipo</label>'+
    '<select class="fi" id="pt_tipo">'+
    Object.entries(TIPO_PONTO).map(([k,v])=>'<option value="'+k+'">'+v.label+'</option>').join('')+
    '</select>'+
    '<div class="fr2"><div><label class="fl">Data</label><input class="fi" id="pt_data" type="date" value="'+dataVal+'"></div>'+
    '<div><label class="fl">Horário</label><input class="fi" id="pt_hora" type="time" value="08:00"></div></div>'+

async function confirmarPontoAdmin(){
  const btn=document.getElementById('pt_btn'); btn.disabled=true; btn.textContent='Salvando…';
  const usuario=document.getElementById('pt_user').value;
  const tipo=document.getElementById('pt_tipo').value;
  const data=document.getElementById('pt_data').value;
  const hora=document.getElementById('pt_hora').value;
  const obs=document.getElementById('pt_obs').value||null;
  if(!data||!hora){btn.disabled=false;btn.textContent='Registrar';alert('Informe data e hora.');return;}
  const horario=new Date(data+'T'+hora+':00').toISOString();
  try {
    await sbInsert('registros_ponto',{usuario,tipo,horario,horario_manual:true,registrado_por:usuarioAtual?.nome||'admin',observacao:obs});
    await registrarLog('ponto manual','ponto',usuario+' — '+(TIPO_PONTO[tipo]?.label||tipo)+' '+data+' '+hora);
    fecharModal(); navPonto();
  } catch(e){btn.disabled=false;btn.textContent='Registrar';alert('Erro: '+e.message);}
}

function atualizarRelogio(){
  const el = document.getElementById('relogio');
  const de = document.getElementById('dataHoje');
  if(!el) { clearInterval(window._clockInterval); return; }
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  el.textContent = h+':'+m+':'+s;
  const dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  de.textContent = dias[now.getDay()]+', '+now.getDate()+' de '+meses[now.getMonth()]+' de '+now.getFullYear();
}

async function navPAlunos(){
  try {
    window._alunosDB = AL;
    renderPAlunos();
    const rows = await sbGet('alunos','nome');
    // Nomes que o banco conhece (incluindo excluídos)
    const dbNomes = new Set(rows.map(r=>r.nome.trim().toLowerCase()));
    // Excluídos no banco — não devem aparecer
    const excluidos = new Set(rows.filter(r=>r.status==='excluido').map(r=>r.nome.trim().toLowerCase()));
    const dbMapped = rows
      .filter(r=>r.status!=='excluido')
      .map(r=>({
        id:r.id, s:r.status, n:r.nome, tel:r.telefone,
        pl:r.plano, h:r.horario||'—', v:parseFloat(r.valor)||0,
        pg:r.ultimo_pagto, px:r.prox_vencto
      }));
    // Locais: só os que o banco não conhece E não foram excluídos
    const localExtras = AL.filter(a=>
      !dbNomes.has(a.n.trim().toLowerCase()) &&
      !excluidos.has(a.n.trim().toLowerCase())
    );
    window._alunosDB = rows.length > 0
      ? [...dbMapped, ...localExtras]
      : AL.filter(a=>!excluidos.has(a.n.trim().toLowerCase()));
    renderPAlunos();
  } catch(e){
    console.warn('navPAlunos:', e.message);
    window._alunosDB = AL;
    renderPAlunos();
  }
}

// Helpers vencimento
function vencido(px){
  if(!px||px==='parceria') return false;
  const p=px.split('/'); if(p.length<3) return false;
  const d=new Date('20'+p[2]+'-'+p[1]+'-'+p[0]); d.setHours(23,59,59);
  return d < new Date();
}
function proxVencer(px){
  if(!px||px==='parceria') return false;
  const p=px.split('/'); if(p.length<3) return false;
  const d=new Date('20'+p[2]+'-'+p[1]+'-'+p[0]);
  const diff=(d-new Date())/(1000*60*60*24);
  return diff>=0 && diff<=5;
}

async function salvarEdicaoAluno(){
  const a   = window._alunoAtual;
  if(!a) return;
  const btn = document.getElementById('ea_btn');
  btn.disabled=true; btn.textContent='Salvando…';

  const dados = {
    nome:          document.getElementById('ea_nome').value.trim(),
    telefone:      document.getElementById('ea_tel').value.trim()||null,
    status:        document.getElementById('ea_status').value,
    valor:         parseFloat(document.getElementById('ea_val').value)||0,
    plano:         document.getElementById('ea_plano').value,
    horario:       document.getElementById('ea_h').value.trim()||null,
    ultimo_pagto:  document.getElementById('ea_pg').value.trim()||null,
    prox_vencto:   document.getElementById('ea_px').value.trim()||null,
  };

  try {
    // Garante no banco e atualiza
    await garantirAlunoBanco(a);
    const r = await fetchWithTimeout(
      `${SB_URL}/rest/v1/alunos?nome=eq.${encodeURIComponent(a.n)}&limit=1`,
      { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
    );

    Object.assign(a, {
      n:a.n, tel:dados.telefone, s:dados.status,
      v:dados.valor, pl:dados.plano, h:dados.horario,
      pg:dados.ultimo_pagto, px:dados.prox_vencto
    });
    // Atualiza nome se mudou

      a.n = dados.nome;
