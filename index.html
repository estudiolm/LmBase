async function pausarAluno(){
  const a = window._alunoAtual;
  if(!a) return;

  // Se Google conectado, busca eventos futuros com o nome do aluno
  let eventosFuturos = [];
  const primeiroNome = a.n.split(' ')[0].toLowerCase();

  if(gcalToken){
    try {
      const hoje = new Date(); hoje.setHours(0,0,0,0);
      const fim  = new Date(hoje); fim.setMonth(fim.getMonth()+3);
      // Busca em todos os calendários visíveis
      const promises = gcalCals.filter(c=>c.selected!==false).map(c=>
        gcalListEvents(c.id, hoje.toISOString(), fim.toISOString())
          .then(evs=>evs.map(e=>({...e,_calId:c.id,_calNome:c.summary})))
          .catch(()=>[])
      );
      const todos = (await Promise.all(promises)).flat();
      // Filtra eventos que contêm o primeiro nome do aluno (case insensitive)
      eventosFuturos = todos.filter(e=>(e.summary||'').toLowerCase().includes(primeiroNome));
    } catch(err){ console.warn('Busca agenda:', err.message); }
  }

  // Monta o modal com aviso + eventos encontrados
  const temEventos = eventosFuturos.length > 0;

  function fmtEvento(ev){
    const s = ev.start?.dateTime||ev.start?.date||'';
    const d = s ? new Date(s) : null;
    const dataStr = d ? d.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'})+
      (ev.start?.dateTime?' · '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'') : '—';
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500;color:var(--brown)">${ev.summary}</div>
        <div style="font-size:11px;color:var(--brown-light)">${dataStr} · ${ev._calNome}</div>
      </div>
      <a href="https://calendar.google.com/calendar/r/eventedit/${ev.id}" target="_blank"
        style="font-size:11px;color:#4285F4;text-decoration:none;white-space:nowrap">
        <i class="ti ti-external-link"></i> Editar
      </a>
    </div>`;
  }

  abrirModal(
    '<div class="mdt"><i class="ti ti-pause-circle" style="color:var(--gold-dark);margin-right:8px"></i>Pausar aluno — '+a.n.split(' ')[0]+'</div>'+

    '<div style="background:rgba(184,146,74,.08);border:1px solid rgba(184,146,74,.25);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--brown)">'+
    '<strong>'+a.n+'</strong> será marcado como pausado e sairá dos financeiros e métricas do sistema.</div>'+

    '<label class="fl">Motivo da pausa (opcional)</label>'+
    '<input class="fi" id="pause_motivo" placeholder="Ex: Viagem, problema de saúde, férias…">'+

    (temEventos?
      '<div style="margin-bottom:8px">'+
      '<div style="font-size:11px;font-weight:600;color:#4285F4;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
      '<i class="ti ti-calendar-event"></i> '+eventosFuturos.length+' evento(s) futuros encontrados na agenda</div>'+
      '<div style="font-size:12px;color:var(--brown-light);margin-bottom:10px">Clique em "Editar" para abrir o evento no Google e remover o nome manualmente:</div>'+
      '<div style="max-height:220px;overflow-y:auto;padding-right:4px">'+
      eventosFuturos.map(fmtEvento).join('')+
      '</div>'+
      '<div style="font-size:11px;color:var(--brown-light);margin-top:10px;padding:8px;background:rgba(66,133,244,.06);border-radius:8px">'+
      '<i class="ti ti-info-circle"></i> Os eventos não são alterados automaticamente. Edite cada um no Google Agenda para remover o nome da pessoa.'+
      '</div></div>'
    :
      gcalToken?
      '<div style="font-size:12px;color:var(--brown-light);margin-bottom:12px"><i class="ti ti-calendar-check"></i> Nenhum evento futuro encontrado com o nome desta pessoa na agenda.</div>'
      :

    )+

    '<div class="mdf">'+
    '<button class="btn" onclick="fecharModal()">Cancelar</button>'+
    '<button class="btn" style="color:var(--gold-dark);border-color:rgba(184,146,74,.4)" id="pause_btn" onclick="confirmarPausa()">'+

// Garante que o aluno existe no banco (insere se necessário)
async function garantirAlunoBanco(a){
  const r = await fetchWithTimeout(

    { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }

async function excluirAluno(){
  const a = window._alunoAtual;
  if(!a) return;
  if(!confirm('Excluir o cadastro de '+a.n+'?\n\nEsta ação não pode ser desfeita.')) return;
  try {
    // Busca no banco pelo nome
    const r = await fetchWithTimeout(
      `${SB_URL}/rest/v1/alunos?nome=eq.${encodeURIComponent(a.n)}&limit=1`,
      { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
    );
    const lista = await r.json();

    if(lista[0]){
      // Já está no banco — exclui
      await sbDelete('alunos', lista[0].id);
    } else {
      // Só existe no hardcode — insere com status 'excluido' para marcar
      // Assim o banco "sabe" que foi excluído e não volta pelo merge
      await sbInsert('alunos',{
        nome: a.n, status: 'excluido',
        telefone: a.tel||null, plano: a.pl||null,
        horario: a.h||null, valor: parseFloat(a.v)||0,
        ultimo_pagto: a.pg||null, prox_vencto: a.px||null,
      });
    }

    // Remove de todos os caches locais
    const remover = (arr) => {
      const i = arr.findIndex(x=>x.n===a.n);
      if(i>=0) arr.splice(i,1);
    };
    remover(AL);
    if(window._alunosDB) remover(window._alunosDB);

    await registrarLog('excluiu aluno','alunos', a.n);
    navPAlunos();
  } catch(e){ alert('Erro ao excluir: '+e.message); }
}

    const dbNomesF = new Set(alRows.map(r=>r.nome.trim().toLowerCase()));
    const dbMapped = alRows.filter(r=>r.status==='A'&&r.status!=='PA').map(r=>({id:r.id,s:r.status,n:r.nome,pl:r.plano,h:r.horario||'—',v:parseFloat(r.valor)||0,pg:r.ultimo_pagto,px:r.prox_vencto}));
    const at = alRows.length > 0 ? [...dbMapped, ...AL.filter(a=>a.s==='A'&&!dbNomesF.has(a.n.trim().toLowerCase()))] : AL.filter(a=>a.s==='A');
    renderPFin(at, pgRows);
  } catch(e){ console.warn('Supabase fin:', e.message); }
}

function renderPFin(at, pags){
  const permF = usuarioAtual ? (PERMISSOES[usuarioAtual.perfil]||PERMISSOES.recepcao) : PERMISSOES.admin;
  const rec   = at.reduce((s,a)=>s+(parseFloat(a.v)||0),0);
  const sd    = at.filter(a=>!a.px||a.px==='parceria').length;

  const agora    = new Date(); agora.setHours(0,0,0,0);
  const mesAtual = agora.getMonth()+1;
  const anoAtual = agora.getFullYear();
  const mesStr   = String(mesAtual).padStart(2,'0');
  const anoStr   = String(anoAtual).slice(2);

  // Converte prox_vencto dd/mm/aa → Date
  function parseData(s){
    if(!s||s==='parceria') return null;
    const p=s.split('/'); if(p.length<3) return null;
    return new Date('20'+p[2]+'-'+p[1]+'-'+p[0]);
  }

  // Pendente = próx vencimento <= hoje (já venceu ou vence hoje)
  // Pago/em dia = próx vencimento > hoje (ainda não chegou a hora de pagar)
  function isPendente(a){
    // Sem data: sempre pendente
    if(!a.px||a.px==='parceria') return true;
    const d = parseData(a.px);
    if(!d) return true;
    // Se vencimento é hoje ou já passou → pendente
    return d <= agora;
  }

  const pendentes   = at.filter(a=>isPendente(a));
  const emDia       = at.filter(a=>!isPendente(a));

  // Ordena pendentes: mais atrasados primeiro
  const pendOrdenados = [...pendentes].sort((a,b)=>{
    const da=parseData(a.px), db=parseData(b.px);
    if(!da) return 1; if(!db) return -1;
    return da-db;
  });

  // Ordena em dia: próximos a vencer primeiro
  const emDiaOrdenados = [...emDia].sort((a,b)=>{
    const da=parseData(a.px), db=parseData(b.px);
    if(!da) return 1; if(!db) return -1;
    return da-db;
  });

  function diasAtraso(px){
    const d=parseData(px); if(!d) return 0;
    return Math.floor((agora-d)/(1000*60*60*24));
  }

  function diasAteVencer(px){
    const d=parseData(px); if(!d) return 999;
    return Math.floor((d-agora)/(1000*60*60*24));
  }

  // Separa em 3 grupos:
  // 1. Vencidos (px existe e já passou)
  // 2. Sem data (px e pg ambos vazios → parceria)
  // 3. Em dia (px existe e ainda não passou)
  const vencidos2   = pendentes.filter(a=>a.px&&a.px!=='parceria');
  const semDadosPag = pendentes.filter(a=>(!a.px||a.px==='parceria')&&!a.pg);
  const semVencSoPg = pendentes.filter(a=>(!a.px||a.px==='parceria')&&a.pg); // pagou mas sem próx data

  set(
    '<div class="pt">Financeiro — Pilates</div>'+
    '<div class="ps">Controle de mensalidades · '+mesAtual+'/'+anoAtual+'</div>'+

    '<div class="metrics3">'+
    (permF.verFinGeral ? mc('Receita estimada/mês','vg','R$ '+rec.toLocaleString('pt-BR'),at.length+' ativos') : '')+
    mc('Em dia','vg',emDia.length,'de '+at.length+' ativos')+
    mc('Pendentes','vr',pendentes.length, semDadosPag.length>0?semDadosPag.length+' parcerias':'')+
    '</div>'+

    '<div class="tb"><button class="btn btnb" onclick="abrirPagPilates(null,null)">'+
    '<i class="ti ti-plus"></i> Registrar pagamento</button></div>'+

    // ── 1. VENCIDOS ───────────────────────────────────────────
    (vencidos2.length?
    '<div style="font-size:11px;font-weight:600;color:#C0392B;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
    '<i class="ti ti-alert-circle"></i> Vencidos ('+vencidos2.length+')</div>'+
    '<div class="tw" style="margin-bottom:18px"><table><thead><tr>'+
    '<th>Aluno</th><th>Plano</th><th>Venceu em</th><th>Atraso</th><th>Valor</th><th></th>'+
    '</tr></thead><tbody>'+
    [...vencidos2].sort((a,b)=>{
      const da=parseData(a.px),db=parseData(b.px);
      if(!da) return 1; if(!db) return -1; return da-db;
    }).map(a=>{
      const atraso=diasAtraso(a.px);
      return '<tr>'+
      '<td>'+ncell(a)+'</td>'+
      '<td style="color:var(--text-2);font-size:12px">'+a.pl+'</td>'+
      '<td><span style="color:#C0392B;font-weight:600">'+a.px+'</span></td>'+
      '<td><span class="bdg br">'+atraso+'d</span></td>'+
      '<td style="font-weight:500">R$ '+a.v+'</td>'+
      '<td><button class="btn btns btnb" onclick="abrirPagPilates(\''+esc(a.n)+'\','+(a.v||0)+')">✓</button></td>'+
      '</tr>';
    }).join('')+'</tbody></table></div>':'') +

    // ── 2. PRÓXIMOS A VENCER ─────────────────────────────────
    (emDia.length?
    '<div style="font-size:11px;font-weight:600;color:#2D7A3A;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
    '<i class="ti ti-calendar-time"></i> Próximos vencimentos ('+emDia.length+')</div>'+
    '<div class="tw" style="margin-bottom:18px"><table><thead><tr>'+
    '<th>Aluno</th><th>Plano</th><th>Próx. venc.</th><th>Faltam</th><th>Valor</th>'+
    '</tr></thead><tbody>'+
    emDiaOrdenados.map(a=>{
      const dias=diasAteVencer(a.px);
      const urgente=dias<=5;
      return '<tr>'+
      '<td>'+ncell(a)+'</td>'+
      '<td style="color:var(--text-2);font-size:12px">'+a.pl+'</td>'+
      '<td><span style="color:'+(urgente?'var(--gold-dark)':'#2D7A3A')+';font-weight:600">'+a.px+'</span></td>'+
      '<td><span class="bdg '+(urgente?'ba':'bg')+'">'+dias+'d</span></td>'+
      '<td style="color:var(--text-2)">R$ '+a.v+'</td>'+
      '</tr>';
    }).join('')+'</tbody></table></div>':'') +

    // ── 3. PARCERIAS (sem pgto e sem vencimento) ──────────────
    (semDadosPag.length?
    '<div style="font-size:11px;font-weight:600;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
    '<i class="ti ti-handshake"></i> Parcerias / sem controle de pagamento ('+semDadosPag.length+')</div>'+
    '<div class="tw" style="margin-bottom:18px"><table><thead><tr>'+
    '<th>Aluno</th><th>Plano</th><th>Valor</th><th></th>'+
    '</tr></thead><tbody>'+
    semDadosPag.map(a=>
      '<tr>'+
      '<td>'+ncell(a)+'</td>'+
      '<td style="color:var(--text-2);font-size:12px">'+a.pl+'</td>'+
      '<td style="color:var(--text-2)">R$ '+a.v+'</td>'+
      '<td><button class="btn btns btnb" onclick="abrirPagPilates(\''+esc(a.n)+'\','+(a.v||0)+')">✓</button></td>'+
      '</tr>'
    ).join('')+'</tbody></table></div>':'') +

    // ── 4. SEM PRÓX VENCIMENTO (pagou mas não tem próx) ──────
    (semVencSoPg.length?
    '<div style="font-size:11px;font-weight:600;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
    '<i class="ti ti-calendar-x"></i> Sem próx. vencimento cadastrado ('+semVencSoPg.length+')</div>'+
    '<div class="tw" style="margin-bottom:18px"><table><thead><tr>'+
    '<th>Aluno</th><th>Plano</th><th>Último pgto</th><th>Valor</th><th></th>'+
    '</tr></thead><tbody>'+
    semVencSoPg.map(a=>
      '<tr>'+
      '<td>'+ncell(a)+'</td>'+
      '<td style="color:var(--text-2);font-size:12px">'+a.pl+'</td>'+
      '<td style="color:var(--text-2)">'+a.pg+'</td>'+
      '<td style="color:var(--text-2)">R$ '+a.v+'</td>'+
      '<td><button class="btn btns btnb" onclick="abrirPagPilates(\''+esc(a.n)+'\','+(a.v||0)+')">✓</button></td>'+
      '</tr>'
    ).join('')+'</tbody></table></div>':'') +

    // ── 5. ÚLTIMOS PAGAMENTOS ─────────────────────────────────
    (pags&&pags.length?
    '<div style="font-size:11px;font-weight:600;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
    '<i class="ti ti-cash"></i> Últimos pagamentos</div>'+
    '<div class="tw"><table><thead><tr>'+
    '<th>Aluno</th><th>Valor</th><th>Forma</th><th>Data pgto</th>'+
    '</tr></thead><tbody>'+
    pags.slice(-15).reverse().map(p=>
      '<tr><td style="font-weight:500">'+p.aluno_nome+'</td>'+
      '<td style="color:#2D7A3A;font-weight:600">'+fR(p.valor)+'</td>'+
      '<td style="color:var(--text-2);font-size:12px">'+p.forma_pgto+'</td>'+
      '<td style="color:var(--text-2);font-size:12px">'+p.data_pgto+'</td></tr>'
    ).join('')+'</tbody></table></div>':'')
  );
}

    const rows = await sbGet('pacientes_fisio','nome');
    const merged = rows.length > 0 ? rows.map(r=>({id:r.id,n:r.nome,sessoes:r.sessoes_contratadas,realizadas:r.sessoes_realizadas||0,datas:[]})) : FISIO;

function renderFDash(dados){
  const total=dados.length, conc=dados.filter(p=>p.sessoes&&p.realizadas>=p.sessoes).length;

    const pct=p.sessoes?Math.min(100,Math.round(p.realizadas/p.sessoes*100)):null;
    const ok=p.sessoes&&p.realizadas>=p.sessoes;
    return '<tr onclick="navFPacienteDetalhe('+i+','+JSON.stringify(dados).replace(/</g,'&lt;').split('').map(c=>c).join('')+')">'+

    '<td style="min-width:120px"><div style="display:flex;align-items:center;gap:8px">'+
    (pct!=null?'<div style="flex:1;height:6px;border-radius:3px;background:#f1f0e8"><div style="width:'+pct+'%;height:100%;border-radius:3px;background:'+(ok?'#16a34a':'#059669')+'"></div></div><span style="font-size:11px;color:#666">'+pct+'%</span>':'<span style="color:#aaa;font-size:11px">livre</span>')+
    '</div></td><td><span class="bdg '+(ok?'bg':p.realizadas>0?'ba':'bx')+'">'+(ok?'Concluído':p.realizadas>0?'Em andamento':'Aguardando')+'</span></td></tr>';
  }).join('')+'</tbody></table></div>');
}

async function navFPacientes(){
  const cacheAtual = (window._fisioCache||FISIO).filter(p=>p.status!=='alta'&&p.s!=='alta');
  renderFPacientes(cacheAtual);
  try {
    const [pacRows, sessRows] = await Promise.all([
      sbGet('pacientes_fisio','nome'),
      sbGet('sessoes_fisio','data_sessao').catch(()=>[])
    ]);

    // Agrupa datas por paciente_id
    const datasMap = {};
    sessRows.forEach(s=>{
      if(!datasMap[s.paciente_id]) datasMap[s.paciente_id]=[];
      if(s.data_sessao){
        const d = new Date(s.data_sessao);
        datasMap[s.paciente_id].push(
          String(d.getDate()).padStart(2,'0')+'/'+
          String(d.getMonth()+1).padStart(2,'0')+'/'+
          String(d.getFullYear()).slice(2)
        );
      }
    });

    // Verifica e dá alta automática para quem completou
    const paraAltaAutomatica = pacRows.filter(r=>
      r.status !== 'alta' &&
      r.sessoes_contratadas &&
      (r.sessoes_realizadas||0) >= r.sessoes_contratadas
    );

    // Dá alta em paralelo para quem completou
    if(paraAltaAutomatica.length > 0){
      await Promise.all(paraAltaAutomatica.map(r=>
        sbUpdate('pacientes_fisio', r.id, {status:'alta'}).catch(()=>{})
      ));
      // Atualiza status localmente
      paraAltaAutomatica.forEach(r=>{ r.status='alta'; });
    }

    const merged = pacRows.map(r=>({
      id:r.id, n:r.nome, tel:r.telefone,
      sessoes:r.sessoes_contratadas,
      realizadas:r.sessoes_realizadas||0,
      status:r.status||'ativo',
      s:r.status||'ativo',
      datas: datasMap[r.id]||[]
    }));

    window._fisioCache = merged;
    const ativos = merged.filter(p=>p.status!=='alta');
    window._fisioListaAtual = ativos;
    renderFPacientes(ativos);
  } catch(e){ console.warn('Supabase pacientes:', e.message); }
}

function verPacienteNome(nome){
  const cache = window._fisioCache || window._fisioListaAtual || FISIO;
  const p = cache.find(x=>x.n===nome);
  if(!p){ console.warn('Paciente não encontrado:', nome); return; }
  verPaciente(p);
}

async function darAlta(){
  const p = window._pacienteAtual;
  if(!p) return;
  if(!confirm('Dar alta para '+p.n+'?\n\nO paciente sairá do dashboard e ficará na aba "Com alta".')) return;
  try {
    if(p.id) await sbUpdate('pacientes_fisio', p.id, {status:'alta'});
    if(window._fisioCache){
      const i = window._fisioCache.findIndex(x=>x.n===p.n);
      if(i>=0){ window._fisioCache[i].status='alta'; window._fisioCache[i].s='alta'; }
    }
    await registrarLog('deu alta','pacientes_fisio','Alta: '+p.n+' ('+p.realizadas+' sessões)');
    navFPacientes();
  } catch(e){ alert('Erro: '+e.message); }
}

async function navLDash(){
  window._lojaCache={v:VENDAS,e:ESTOQUE,enc:ENCOMENDAS};
  renderLDash(VENDAS, ESTOQUE, ENCOMENDAS);
  try {
    const [vRows, eRows, encRows] = await Promise.all([sbGet('vendas','criado_em'), sbGet('estoque','item'), sbGet('encomendas','criado_em')]);
    const dbVIds = new Set(vRows.map(r=>r.id));
    const allV = vRows.length > 0 ? [...vRows.map(r=>({id:r.id,item:r.item,marca:r.marca,custo:r.custo,preco:r.preco,cliente:r.cliente,data:r.data_venda||'—',pgto:r.forma_pgto||'—'})), ...VENDAS.filter(v=>!dbVIds.has(v.id))] : VENDAS;
    const dbEItems = new Set(eRows.map(r=>r.item));
    const allE = eRows.length > 0 ? [...eRows.map(r=>({item:r.item,tam:r.tamanho,qtd:r.quantidade})), ...ESTOQUE.filter(e=>!dbEItems.has(e.item))] : ESTOQUE;
    const dbEncIds = new Set(encRows.map(r=>r.id));
    const allEnc = encRows.length > 0 ? [...encRows.map(r=>({id:r.id,item:r.item,tam:r.tamanho,custo:r.custo,preco:r.preco_tabela,pgto:r.forma_pgto,vf:r.valor_final,cliente:r.cliente,data:r.data_pedido||'—'})), ...ENCOMENDAS.filter(e=>!dbEncIds.has(e.id))] : ENCOMENDAS;
    window._lojaCache={v:allV,e:allE,enc:allEnc};
    renderLDash(allV, allE, allEnc);
  } catch(e){ console.warn('Supabase loja:', e.message); }
}

function renderLDash(allV, allE, allEnc){
  const totalV=allV.reduce((s,v)=>s+(parseFloat(v.preco)||0),0);
  const totalC=allV.filter(v=>v.custo).reduce((s,v)=>s+(parseFloat(v.custo)||0),0);
  const mg=totalC>0?((totalV-totalC)/totalV*100):null;
  const emEst=allE.reduce((s,e)=>s+qtdN(e.qtd),0);
  const semEst=allE.filter(e=>qtdN(e.qtd)===0).length;
  const encPend=allEnc.filter(e=>!e.vf).length;
  const porMarca={};
  allV.forEach(v=>{const m=v.marca||'Outras';porMarca[m]=(porMarca[m]||0)+(parseFloat(v.preco)||0);});
  const top=Object.entries(porMarca).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxV=top[0]?top[0][1]:1;
  set('<div class="pt">Loja — Dashboard</div><div class="ps">LmSTORE · <span style="color:#16a34a;font-weight:500">● banco conectado</span></div>'+
  '<div class="metrics">'+
  mc('Faturamento total','vp','R$ '+Math.round(totalV).toLocaleString('pt-BR'),allV.length+' itens vendidos')+
  mc('Margem estimada','vg',mg?mg.toFixed(1)+'%':'—','onde há custo')+
  mc('Em estoque','vi',emEst,semEst+' peças zeradas')+
  mc('Encomendas s/ pgto','va',encPend,'a receber')+
  '</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'+
  '<div><div style="font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Por marca</div>'+
  '<div class="dp" style="padding:12px">'+top.map(([m,v])=>
    '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>'+m+'</span><span style="font-weight:500">'+fR(v)+'</span></div>'+
    '<div class="chart-bar"><div class="chart-fill-l" style="width:'+Math.round(v/maxV*100)+'%"></div></div></div>'
  ).join('')+'</div></div>'+
  '<div><div style="font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Últimas vendas</div>'+
  '<div class="tw"><table><thead><tr><th>Item</th><th>Cliente</th><th>Valor</th></tr></thead><tbody>'+
  allV.slice(-8).reverse().map(v=>'<tr><td>'+v.item+'</td><td>'+v.cliente+'</td><td style="color:#db2777;font-weight:500">'+fR(v.preco)+'</td></tr>').join('')+
  '</tbody></table></div></div></div>');
}

async function navLVendas(){
  window._vendasCache = VENDAS;
  renderLVendas(VENDAS);
  try {
    const rows = await sbGet('vendas','criado_em');
    const all = rows.length > 0 ? rows.map(r=>({
      id:    r.id,
      item:  r.item,
      marca: r.marca,
      custo: r.custo,
      preco: r.preco,
      cliente: r.cliente,
      data:  r.data_venda||'—',
      pgto:  r.forma_pgto||'—',
      vendedor: r.vendedor||null,
      participacao_vitoria: r.participacao_vitoria||'nao',
      codigo_barras: r.codigo_barras||null,
    })) : VENDAS;
    window._vendasCache = all;
    renderLVendas(all);
  } catch(e){ console.warn('Supabase vendas:', e.message); }
}

function renderLVendas(all){
  const agora = new Date();
  const mesAtual = agora.getMonth()+1;
  const anoAtual = agora.getFullYear();

  // Normaliza data para dd/mm/aa independente do formato
  function normData(data){
    if(!data||data==='—'||data==='null'||data===null) return null;
    const s = String(data);
    // formato ISO: 2026-05-26 → 26/05/26
    if(s.match(/^\d{4}-\d{2}-\d{2}/)){
      const [y,m,d] = s.split('T')[0].split('-');
      return d+'/'+m+'/'+y.slice(2);
    }
    return s; // já está em dd/mm/aa
  }

  function getMesAnoNum(data){
    const d = normData(data);
    if(!d) return null;
    const p = d.split('/');
    if(p.length<3) return null;
    return { mes:parseInt(p[1]), ano:parseInt('20'+p[2]) };
  }

  // Agrupa por mês
  const porMes = {};
  all.forEach(v=>{
    const ma = getMesAnoNum(v.data);
    if(!ma) return;
    const key = String(ma.mes).padStart(2,'0')+'/'+ma.ano;
    if(!porMes[key]) porMes[key]={total:0,qtd:0};
    porMes[key].total += parseFloat(v.preco)||0;
    porMes[key].qtd++;
  });
  const mesesOrdenados = Object.entries(porMes).sort((a,b)=>b[0].localeCompare(a[0]));

  // Mês atual
  const mesAtualKey = String(mesAtual).padStart(2,'0')+'/'+anoAtual;
  const vendasMes = all.filter(v=>{
    const ma = getMesAnoNum(v.data);
    return ma && ma.mes===mesAtual && ma.ano===anoAtual;
  });
  const totalMes   = vendasMes.reduce((s,v)=>s+(parseFloat(v.preco)||0),0);
  const totalGeral = all.reduce((s,v)=>s+(parseFloat(v.preco)||0),0);

  const marcas=[...new Set(all.map(v=>v.marca||'—').filter(m=>m&&m!=='null'))].sort();
  const lista=all.filter(v=>
    (!ft||(v.item||'').toLowerCase().includes(ft.toLowerCase())||(v.cliente||'').toLowerCase().includes(ft.toLowerCase()))&&
    (!filM||v.marca===filM)
  );
  const tot=lista.reduce((s,v)=>s+(parseFloat(v.preco)||0),0);

  // Salva índices globais para edição
  window._vendasLista = lista;

  set(
    '<div class="pt">Vendas</div>'+
    '<div class="ps">'+all.length+' itens · '+fR(totalGeral)+' faturado total</div>'+

    '<div class="metrics3" style="margin-bottom:18px">'+
    mc('Faturamento total','vp',fR(totalGeral),all.length+' vendas')+
    mc('Mês atual ('+mesAtual+'/'+anoAtual+')','vg',fR(totalMes),vendasMes.length+' vendas · parcial')+
    mc('Ticket médio','va',all.length?fR(Math.round(totalGeral/all.length)):'—','por venda')+
    '</div>'+

    '<div style="font-size:11px;font-weight:600;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Faturamento por mês</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">'+
    mesesMesOrdenados(mesesOrdenados, mesAtualKey)+
    '</div>'+

    '<div class="tb">'+
    '<input class="srch" placeholder="Buscar item ou cliente…" oninput="ft=this.value;renderLVendas(window._vendasCache||[])" value="'+ft+'">'+
    '<select class="sel" onchange="filM=this.value;renderLVendas(window._vendasCache||[])">'+
      '<option value="">Todas as marcas</option>'+
      marcas.map(m=>'<option'+(filM===m?' selected':'')+'>'+m+'</option>').join('')+
    '</select>'+
    '<div style="margin-left:auto;display:flex;gap:8px;align-items:center">'+
    '<span style="font-size:12px;color:var(--brown-light)">'+lista.length+' · <strong style="color:var(--brown-mid)">'+fR(tot)+'</strong></span>'+
    '<button class="btn btnp" onclick="abrirNovaVenda()"><i class="ti ti-plus"></i> Nova venda</button>'+
    '</div></div>'+

    '<div class="tw"><table><thead><tr>'+
    '<th>#</th><th>Item</th><th>Marca</th><th>Cliente</th><th>Vendedor</th><th>Data</th><th>Pgto</th><th>Preço</th><th></th>'+
    '</tr></thead><tbody>'+
    lista.map((v,i)=>
      '<tr onclick="abrirEditarVenda('+i+')" style="cursor:pointer">'+
      '<td style="color:var(--text-3);font-size:11px">'+(i+1)+'</td>'+
      '<td style="font-weight:500">'+(v.item||'—')+'</td>'+
      '<td>'+(v.marca&&v.marca!=='null'?'<span class="bdg '+marcaBdg(v.marca)+'">'+v.marca+'</span>':'—')+'</td>'+
      '<td>'+(v.cliente&&v.cliente!=='null'?v.cliente:'—')+'</td>'+
      '<td>'+(v.vendedor&&v.vendedor!=='null'?'<span class="bdg bb">'+v.vendedor+'</span>':'—')+'</td>'+
      '<td style="color:var(--text-2)">'+(normData(v.data)||'—')+'</td>'+
      '<td style="color:var(--text-2)">'+(v.pgto&&v.pgto!=='null'?v.pgto:'—')+'</td>'+
      '<td style="color:var(--gold-dark);font-weight:600">'+fR(v.preco)+'</td>'+
      '<td><button class="btn btns" onclick="event.stopPropagation();abrirEditarVenda('+i+')"><i class="ti ti-pencil"></i></button></td>'+
      '</tr>'
    ).join('')+
    '<tr class="sum-row"><td colspan="7" style="text-align:right;padding:8px 15px">Total filtrado</td>'+
    '<td style="padding:8px 15px;color:var(--gold-dark)">'+fR(tot)+'</td><td></td></tr>'+
    '</tbody></table></div>'
  );
}

function mesesMesOrdenados(meses, mesAtualKey){
  const nomesMes = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return meses.slice(0,6).map(([key,dados])=>{
    const [mm,yyyy] = key.split('/');
    const isAtual = key===mesAtualKey;
    return `<div style="background:${isAtual?'rgba(201,169,110,.15)':'var(--glass)'};border:1px solid ${isAtual?'var(--border-str)':'var(--border)'};border-radius:10px;padding:10px 14px;min-width:100px;text-align:center;box-shadow:var(--shadow-sm)">
      <div style="font-size:10px;color:var(--brown-light);font-weight:700;text-transform:uppercase;letter-spacing:.06em">${nomesMes[parseInt(mm)]||mm}/${yyyy.slice(2)}${isAtual?' <span style="color:var(--gold-dark)">●</span>':''}</div>
      <div style="font-size:16px;font-weight:700;color:var(--brown);margin-top:4px">${fR(dados.total)}</div>
      <div style="font-size:10px;color:var(--brown-light);margin-top:2px">${dados.qtd} vendas</div>
    </div>`;
  }).join('');
}

    `<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(184,146,74,.1);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;margin:2px">
      ${it} <span onclick="window._vendaItensExtra.splice(${i},1);adicionarItemVenda();document.getElementById('vd_item_extra').value=''" style="cursor:pointer;color:var(--brown-light)">×</span>
    </span>`
  ).join('');

async function salvarEdicaoVenda(){
  const v = window._vendaEditando;
  if(!v) return;
  const btn = document.getElementById('vd_btn'); btn.disabled=true; btn.textContent='Salvando…';
  const preco = parseFloat(document.getElementById('vd_preco').value)||0;
  const desc  = parseFloat(document.getElementById('vd_desc').value)||0;
  const vf    = desc>0 ? preco*(1-desc/100) : preco;

  const dados = {
    item:      document.getElementById('vd_item').value.trim(),
    marca:     document.getElementById('vd_marca').value,
    tamanho:   document.getElementById('vd_tam').value||null,
    custo:     parseFloat(document.getElementById('vd_custo').value)||null,
    preco:     vf,
    cliente:   document.getElementById('vd_cliente').value||null,
    data_venda:document.getElementById('vd_data').value||null,
    forma_pgto:document.getElementById('vd_pgto').value||null,
    vendedor:  document.getElementById('vd_vendedor')?.value||null,
    participacao_vitoria:(()=>{
      const vend = document.getElementById('vd_vendedor')?.value;
      if(vend==='Vitoria') return 'atendeu';
      const radio = document.querySelector('input[name="vd_vitpart"]:checked');
      return (radio&&radio.value!=='nao') ? radio.value : 'nao';
    })(),
  };

  try {
    // Atualiza venda principal
    if(v.id) await sbUpdate('vendas', v.id, dados);

    // Insere itens extras como novas vendas ligadas ao mesmo cliente/data
    const itensExtra = window._vendaItensExtra||[];
    for(const item of itensExtra){
      await sbInsert('vendas',{...dados, item, custo:null, preco:0});
    }

    await registrarLog('editou venda','vendas', dados.item+(itensExtra.length?' + '+itensExtra.length+' item(ns)':''));
    fecharModal();
    navLVendas();
  } catch(e){ btn.disabled=false; btn.textContent='Salvar'; alert('Erro: '+e.message); }
}

async function navLEstoque(){
  window._estoqueCache = ESTOQUE;

    const rows = await sbGet('estoque','item');

      const all = rows.map(r=>({
        id:           r.id,

        qtd:          r.quantidade||0,
        marca:        r.marca||null,

      }));
      window._estoqueCache = all;

function renderLEstoque(all){
  const total=all.reduce((s,e)=>s+qtdN(e.qtd),0);
  const zeros=all.filter(e=>qtdN(e.qtd)===0).length;
  const valorVenda = all.reduce((s,e)=>s+(qtdN(e.qtd)*(parseFloat(e.preco)||0)),0);
  const valorCusto = all.reduce((s,e)=>s+(qtdN(e.qtd)*(parseFloat(e.custo)||0)),0);
  const lucroEstimado = valorVenda - valorCusto;
  const lista=all.filter(e=>!ft||(e.item||'').toLowerCase().includes(ft.toLowerCase())||(e.marca||'').toLowerCase().includes(ft.toLowerCase()));
  set('<div class="pt">Estoque</div><div class="ps">'+all.length+' modelos · '+total+' unidades · '+zeros+' zeradas</div>'+
  '<div class="metrics3">'+mc('Total em estoque','vi',total,'unidades')+mc('Peças zeradas','vr',zeros,'sem estoque')+mc('Modelos','vg',all.length,'cadastrados')+'</div>'+
  '<div class="metrics3">'+
  mc('Valor em estoque (venda)','vg',fR(valorVenda),'se vender tudo')+
  mc('Valor investido (custo)','va',fR(valorCusto),'capital empatado')+
  mc('Lucro potencial','vi',fR(lucroEstimado),'venda − custo')+
  '</div>'+
  '<div class="tb"><input class="srch" placeholder="Buscar peça ou marca…" oninput="ft=this.value;renderLEstoque(window._estoqueCache||[])" value="'+ft+'">'+
  '<div style="margin-left:auto;display:flex;gap:8px">'+
  '<button class="btn" onclick="abrirBipagemEstoque()"><i class="ti ti-barcode"></i> Bipar entrada</button>'+
  '<button class="btn btnb" onclick="nav(\'l_entrada\')"><i class="ti ti-package-import"></i> Entrada em lote</button>'+
  '<button class="btn btnp" onclick="abrirNovaPeca()"><i class="ti ti-plus"></i> Nova peça</button></div></div>'+
  '<div class="card-grid">'+
  lista.map(e=>{
    const q=qtdN(e.qtd); const cls=q===0?'s0':q<=1?'slow':'sok';
    return '<div class="prod-card '+cls+'" onclick="abrirEditarPeca(\''+esc(e.item||'')+'\')">'+

// ── REGISTRAR PAGAMENTO NO BANCO ──────────────────────────
async function confirmarPagamento(){
  const aluno = document.getElementById('pg_aluno').value;
  const ref   = document.getElementById('pg_ref').value;
  const valor = parseFloat(document.getElementById('pg_val').value)||0;
  const forma = document.getElementById('pg_forma').value;
  if(!aluno||!valor){ alert('Preencha aluno e valor.'); return; }
  const btn=document.getElementById('pg_btn');
  btn.disabled=true; btn.textContent='Salvando…';

  const hoje = new Date();
  const pad  = n=>String(n).padStart(2,'0');
  const dataStr = pad(hoje.getDate())+'/'+pad(hoje.getMonth()+1)+'/'+String(hoje.getFullYear()).slice(2);

  try {
    // 1. Salva o pagamento
    await sbInsert('pagamentos',{aluno_nome:aluno,referencia:ref,valor,forma_pgto:forma,data_pgto:dataStr});

    // 2. Busca o aluno no banco (ou insere se não existir) e atualiza datas
    let novoProx = null;
    try {
      // Busca direto pelo nome exato
      const r = await fetchWithTimeout(
        `${SB_URL}/rest/v1/alunos?nome=eq.${encodeURIComponent(aluno)}&limit=1`,
        { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
      );
      let lista = await r.json();
      let pac = lista[0];

      // Se não achou no banco, insere a partir dos dados locais
      if(!pac){
        const local = (window._alunosDB||AL).find(a=>a.n===aluno);
        if(local){
          const ins = await sbInsert('alunos',{
            status: local.s||'A', nome: local.n,
            telefone: local.tel||null, plano: local.pl||null,
            horario: local.h||null, valor: parseFloat(local.v)||0,
            ultimo_pagto: local.pg||null, prox_vencto: local.px||null,
          });
          pac = ins[0];
          console.log('Aluno inserido no banco:', pac?.nome);
        }
      }

      if(pac){
        let diaVenc = 10;
        const fonteData = pac.prox_vencto || pac.ultimo_pagto;
        if(fonteData && fonteData !== 'parceria'){
          const partes = fonteData.split('/');
          if(partes.length >= 2){
            const diaParseado = parseInt(partes[0]);
            if(diaParseado > 0 && diaParseado <= 31) diaVenc = diaParseado;
          }
        }

        let mesProx, anoProx;
        if(pac.prox_vencto && pac.prox_vencto !== 'parceria'){
          const p = pac.prox_vencto.split('/');
          if(p.length >= 3){
            const mesVenc = parseInt(p[1]) - 1;
            const anoVenc = parseInt('20' + p[2]);
            const proxData = new Date(anoVenc, mesVenc + 1, 1);
            mesProx = proxData.getMonth();
            anoProx = proxData.getFullYear();
          }
        }
        if(mesProx === undefined){
          mesProx = (hoje.getMonth() + 1) % 12;
          anoProx = hoje.getMonth() === 11 ? hoje.getFullYear() + 1 : hoje.getFullYear();
        }

        const dataFinal = new Date(anoProx, mesProx, diaVenc);
        if(dataFinal.getMonth() !== mesProx) dataFinal.setDate(0);
        novoProx = pad(dataFinal.getDate())+'/'+pad(dataFinal.getMonth()+1)+'/'+String(dataFinal.getFullYear()).slice(2);

        await sbUpdate('alunos', pac.id, { ultimo_pagto: dataStr, prox_vencto: novoProx });
        console.log('Banco atualizado ✓ próx:', novoProx);
      }
    } catch(e2){ console.warn('Update aluno banco:', e2.message); }

    // 3. Atualiza cache local em TODOS os lugares
    const atualizarTodosCache = (nome, pg, px) => {
      [AL, window._alunosDB||[]].forEach(lista=>{
        const a = lista.find(x=>x.n===nome);
        if(a){ a.pg=pg; if(px) a.px=px; }
      });
    };
    atualizarTodosCache(aluno, dataStr, novoProx);

    await registrarLog('registrou pagamento','pagamentos', aluno+' — '+fR(valor)+' ref. '+ref+' | próx: '+(novoProx||'—'));
    fecharModal();

    // 4. Recarrega sempre o financeiro para refletir o pagamento
    pg = 'p_fin';
    navPFin();

  } catch(e){ btn.disabled=false; btn.textContent='Confirmar'; alert('Erro: '+e.message); }
}

// ── REGISTRAR SESSÃO FISIO NO BANCO ───────────────────────
async function confirmarSessao(){
  const nome = document.getElementById('fs_nome').value;
  const data = document.getElementById('fs_data').value;
  const obs  = document.getElementById('fs_obs')?.value||null;
  const btn  = document.getElementById('fs_btn');
  btn.disabled=true; btn.textContent='Salvando…';
  try {
    const rows = await sbGet('pacientes_fisio','id');
    const pac  = rows.find(r=>r.nome===nome);
    if(!pac){ alert('Paciente não encontrado no banco.'); btn.disabled=false; btn.textContent='Registrar'; return; }

    const novasRealizadas = (pac.sessoes_realizadas||0) + 1;

    // Formata data para salvar nas datas dd/mm/aa
    const dataFmt = data ? (()=>{
      const [y,m,d] = data.split('-');
      return d+'/'+m+'/'+y.slice(2);
    })() : null;

    // Busca datas já registradas
    const sesoesAntigas = await sbGet('sessoes_fisio','id');
    const datasList = sesoesAntigas
      .filter(s=>s.paciente_id===pac.id)
      .map(s=>s.data_sessao ? (()=>{
        const d = new Date(s.data_sessao);
        return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()).slice(2);
      })() : '—')
      .concat(dataFmt||'—');

    // Registra sessão
    await sbInsert('sessoes_fisio',{
      paciente_id: pac.id,
      paciente_nome: nome,
      data_sessao: data,
      observacao: obs
    });

    // Verifica se completou o plano → alta automática
    const completou = pac.sessoes_contratadas && novasRealizadas >= pac.sessoes_contratadas;

    await sbUpdate('pacientes_fisio', pac.id, {
      sessoes_realizadas: novasRealizadas,
      ...(completou ? {status:'alta'} : {})
    });

    // Atualiza cache
    if(window._fisioCache){
      const i = window._fisioCache.findIndex(x=>x.n===nome);
      if(i>=0){
        window._fisioCache[i].realizadas = novasRealizadas;
        window._fisioCache[i].datas = datasList;
        if(completou){ window._fisioCache[i].status='alta'; window._fisioCache[i].s='alta'; }
      }
    }

    await registrarLog('registrou sessão','sessoes_fisio','Sessão de '+nome+' em '+(dataFmt||data)+(completou?' — PLANO COMPLETO → ALTA':'')+( obs?' | '+obs:''));
    fecharModal();

    if(completou){
      // Mostra aviso de alta automática e vai para o dashboard
      setTimeout(()=>{
        abrirModal(
          '<div style="text-align:center;padding:8px">'+
          '<div style="width:56px;height:56px;border-radius:50%;background:#E8F5EC;display:flex;align-items:center;justify-content:center;margin:0 auto 14px">'+
          '<i class="ti ti-user-check" style="font-size:28px;color:#2D7A3A"></i></div>'+
          '<div style="font-family:var(--font-serif);font-size:20px;font-weight:600;margin-bottom:8px">Plano concluído!</div>'+
          '<div style="font-size:13px;color:var(--text-2);margin-bottom:16px">'+
          '<strong>'+nome+'</strong> completou todas as '+pac.sessoes_contratadas+' sessões e foi automaticamente movido para "Com alta".</div>'+
          '<div class="mdf" style="justify-content:center">'+
          '<button class="btn btne" onclick="fecharModal();navFPacientes()">Ver pacientes</button>'+
          '</div></div>'
        );
      },200);
    } else {
      // Volta para a ficha do paciente atualizada
      window._fisioCache = null;
      navFPacientes();
    }
  } catch(e){ btn.disabled=false; btn.textContent='Registrar'; alert('Erro: '+e.message); }
}

  btn.disabled=true; btn.textContent='Salvando…';

  const tam    = document.getElementById('pc_tam').value||null;
  const qtd    = parseInt(document.getElementById('pc_qtd').value)||0;
  const custo  = parseFloat(document.getElementById('pc_custo').value)||null;
  const preco  = parseFloat(document.getElementById('pc_preco').value)||null;

async function excluirPeca(){
  const e = window._pecaEditando;
  if(!e) return;
  if(!confirm('Excluir "'+e.item+'" do estoque?\n\nEsta ação não pode ser desfeita.')) return;
  try {
    if(e.id) await sbDelete('estoque', e.id);
    if(window._estoqueCache){

      if(i>=0) window._estoqueCache.splice(i,1);

    await registrarLog('excluiu peça','estoque', e.item);

// ── AGENDA (grade local — usa dados em memória) ───────────
// Mapeia cor do Google Calendar para tipo
// Verde (10 = "sage", 2 = "basil") = Pilates
// Azul (1,7,9) = Fisio
// colorId null no calendário "Estudio Lm" = também Pilates
function tipoEvento(ev){
  const titulo = (ev.summary||'').toLowerCase();
  if(titulo.startsWith('fisio') || ev.colorId==='1'||ev.colorId==='7'||ev.colorId==='9') return 'fisio';
  return 'pilates';
}

// Converte horário do Google (ex: "2026-05-25T07:00:00-03:00") para chave da grade ("07H")
function horaParaChave(dateTimeStr){
  if(!dateTimeStr) return null;
  const d = new Date(dateTimeStr);
  return String(d.getHours()).padStart(2,'0')+'H';
}

// Converte dia da semana do Google para abreviação da grade
function diaParaChave(dateTimeStr){
  if(!dateTimeStr) return null;
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  return dias[new Date(dateTimeStr).getDay()];
}

// Extrai lista de nomes do título do evento
// "Ana G, Araci, Paula" → ["Ana G","Araci","Paula"]
function extrairNomes(titulo){
  return titulo
    .split(',')
    .map(n=>n.trim())
    .filter(n=>n.length>1 && !n.toLowerCase().startsWith('fisio'));
}

async function rPAgenda(){
  // Mostra grade local imediatamente
  renderGrade(GD, false);

  // Se Google conectado, tenta sincronizar
  if(!gcalToken){ return; }

  // Atualiza indicador
  const ps = document.querySelector('.ps');
  if(ps) ps.innerHTML = 'Sincronizando com Google Agenda <span style="color:var(--gold-dark)">⏳</span>';

  try {
    // Busca o calendário "Estudio Lm"
    const cals = await gcalListCalendars();
    const estudioCal = cals.find(c=>c.summary.toLowerCase().includes('estudio')||c.summary.toLowerCase().includes('estúdio')||c.summary.toLowerCase().includes('lm'));
    const calId = estudioCal ? estudioCal.id : 'primary';

    // Pega próxima semana completa (Seg a Sáb)
    const hoje = new Date();
    const seg = new Date(hoje);
    seg.setDate(hoje.getDate() - hoje.getDay() + 1); // próxima segunda
    seg.setHours(0,0,0,0);
    const sabado = new Date(seg);
    sabado.setDate(seg.getDate()+6);
    sabado.setHours(23,59,59,0);

    const eventos = await gcalListEvents(calId, seg.toISOString(), sabado.toISOString());

    // Monta grade a partir dos eventos
    const gdGoogle = {};
    DIAS.forEach(d=>HORAS.forEach(h=>gdGoogle[d+'-'+h]=[]));

    const eventosFisio = [];

    eventos.forEach(ev=>{
      const tipo = tipoEvento(ev);
      const inicio = ev.start?.dateTime||ev.start?.date;
      if(!inicio) return;

      const dia = diaParaChave(inicio);
      const hora = horaParaChave(inicio);
      if(!dia||!hora) return;

      const chaveHora = hora; // ex: "07H"
      const key = dia+'-'+chaveHora;

      if(tipo==='pilates'){
        const nomes = extrairNomes(ev.summary||'');
        if(nomes.length && gdGoogle[key]!==undefined){
          gdGoogle[key].push(...nomes);
        } else if(gdGoogle[key]!==undefined && ev.summary){
          // evento sem vírgula = nome único
          gdGoogle[key].push(ev.summary.trim());
        }
      } else if(tipo==='fisio'){
        eventosFisio.push({
          nome: (ev.summary||'').replace(/fisio\s*/i,'').trim(),
          inicio, dia, hora: chaveHora,
          titulo: ev.summary
        });
      }
    });

    // Merge: para células que a Google não cobriu, usa dados da planilha
    DIAS.forEach(d=>HORAS.forEach(h=>{
      const key=d+'-'+h;
      if(gdGoogle[key]===undefined) gdGoogle[key]=[];
      if(gdGoogle[key].length===0 && GD[key] && GD[key].length>0){
        gdGoogle[key] = [...GD[key]]; // fallback para dados da planilha
      }
    }));

    // Guarda fisio da agenda globalmente
    window._fisioAgenda = eventosFisio;

    renderGrade(gdGoogle, true, estudioCal?.summary||'Estudio Lm', eventos.length, eventosFisio.length);

  } catch(e){
    console.warn('Google Agenda erro:', e.message);
    renderGrade(GD, false);
    const ps2 = document.querySelector('.ps');
    if(ps2) ps2.innerHTML = 'Dados locais · <span style="color:#8B2E1A;font-size:11px">Google Agenda indisponível</span>';
  }
}

  // Busca tudo em PARALELO com timeout de 8s cada
  const safe = (p) => p.catch(()=>null);
  const [resAlunos, resPags, resVendas, resPacientes] = await Promise.all([

    safe(fetchWithTimeout(`${SB_URL}/rest/v1/pagamentos?select=*&limit=1000`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}},8000)),

  const ativos = alunosBase.filter(a=>a.s==='A');

function blocoComissaoVitoria(todasVendas){
  // Vendas por mês
  const agora = new Date();
  const nomesMes = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  // Agrupa por mês
  const porMes = {};
  todasVendas.forEach(v=>{
    if(!v.data) return;
    const s = String(v.data);
    let mes, ano;
    if(s.match(/^\d{4}-\d{2}/)){
      const [y,m] = s.split('-');
      mes=parseInt(m); ano=parseInt(y);
    } else {
      const p = s.split('/');
      if(p.length<3) return;
      mes=parseInt(p[1]); ano=parseInt('20'+p[2]);
    }
    const key = String(mes).padStart(2,'0')+'/'+ano;
    if(!porMes[key]) porMes[key]={ total:0, vitoria:0, provador:0, qtdTotal:0, qtdVitoria:0, qtdProvador:0 };
    porMes[key].total += parseFloat(v.preco)||0;
    porMes[key].qtdTotal++;
    if(v.participacao_vitoria==='atendeu' || v.vendedor==='Vitoria'){
      porMes[key].vitoria += parseFloat(v.preco)||0;
      porMes[key].qtdVitoria++;
    } else if(v.participacao_vitoria==='provador'){
      porMes[key].provador += parseFloat(v.preco)||0;
      porMes[key].qtdProvador++;
    }
  });

  const meses = Object.entries(porMes).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
  if(!meses.length) return '';

  const mesAtualKey = String(agora.getMonth()+1).padStart(2,'0')+'/'+agora.getFullYear();

  return '<div style="font-size:11px;font-weight:700;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px">'+
  '<i class="ti ti-percentage"></i> Comissão — Vitória</div>'+
  '<div class="tw"><table><thead><tr>'+
  '<th>Mês</th><th>Total loja</th><th>Vendas Vitória</th><th>% participação</th><th>Comissão (%)</th><th>Valor a pagar</th>'+
  '</tr></thead><tbody>'+
  meses.map(([key,d])=>{
    const [mm,yyyy] = key.split('/');
    const isAtual = key===mesAtualKey;
    // Regra de comissão:
    // - Atendeu: conta no % de participação → ≥50% = 5%, <50% = 3%
    // - Provador/indicação: sempre 3% fixo, não entra no % de participação
    const pct = d.total>0 ? (d.vitoria/d.total*100) : 0;
    const comPctAtendeu = pct>=50 ? 5 : (d.vitoria>0 ? 3 : 0);
    const comAtendeu = d.vitoria * (comPctAtendeu/100);
    const comProvador = d.provador * 0.03;
    const comTotal = comAtendeu + comProvador;
    const pctLabel = pct.toFixed(1)+'%';
    const pctColor = pct>=50 ? '#2D7A3A' : 'var(--gold-dark)';
    return '<tr style="'+(isAtual?'background:rgba(201,169,110,.05)':'')+'">'+
    '<td style="font-weight:'+(isAtual?700:400)+'">'+nomesMes[parseInt(mm)]+' '+yyyy+
      (isAtual?' <span style="font-size:10px;color:var(--gold-dark)">● atual</span>':'')+
    '</td>'+
    '<td>'+fR(d.total)+'<span style="font-size:10px;color:var(--text-3);margin-left:4px">'+d.qtdTotal+' vendas</span></td>'+
    '<td>'+
      (d.vitoria>0?'<div style="font-size:12px;font-weight:500">Atendeu: '+fR(d.vitoria)+' ('+d.qtdVitoria+')</div>':'')+
      (d.provador>0?'<div style="font-size:12px;color:var(--text-2)">Provador: '+fR(d.provador)+' ('+d.qtdProvador+')</div>':'')+
      (d.vitoria===0&&d.provador===0?'<span style="color:var(--text-3)">—</span>':'')+
    '</td>'+
    '<td>'+(d.vitoria>0?'<span style="font-weight:700;color:'+pctColor+'">'+pctLabel+'</span>'+
      '<div style="height:4px;border-radius:2px;background:var(--bg-2);margin-top:3px;width:80px">'+
      '<div style="width:'+Math.min(pct,100)+'%;height:100%;border-radius:2px;background:'+pctColor+'"></div></div>':
      (d.provador>0?'<span class="bdg ba">Provador</span>':'—'))+'</td>'+
    '<td>'+
      (d.vitoria>0?'<span class="bdg '+(comPctAtendeu===5?'bg':'ba')+'">'+comPctAtendeu+'%</span>':'')+
      (d.provador>0?'<span class="bdg bx" style="margin-left:4px">3% fixo</span>':'')+
      (d.vitoria===0&&d.provador===0?'<span style="color:var(--text-3)">—</span>':'')+
    '</td>'+
    '<td style="font-weight:700;color:'+(comTotal>0?'#2D7A3A':'var(--text-3)')+'">'+fR(comTotal)+
      (isAtual&&comTotal>0?'<span style="font-size:10px;color:var(--text-3);display:block">parcial</span>':'')+
    '</td>'+
    '</tr>';
  }).join('')+
  '</tbody></table>'+
  '<div style="padding:10px 16px;font-size:12px;color:var(--text-3);border-top:1px solid var(--border)">'+
  '<i class="ti ti-info-circle"></i> Regra: participação ≥ 50% das vendas do mês → 5% de comissão · participação < 50% → 3%'+
  '</div></div>';
}

function blocoMensalConsolidado(pagamentos, vendas){
  const agora = new Date();
  const nomesMes = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  // Agrupa pagamentos de pilates por mês
  const pgtosMes = {};
  pagamentos.forEach(p=>{
    if(!p.data_pgto) return;
    const pts = p.data_pgto.split('/');
    if(pts.length<3) return;
    const key = pts[1]+'/20'+pts[2]; // mm/yyyy
    if(!pgtosMes[key]) pgtosMes[key]={pilates:0,qtdPilates:0};
    pgtosMes[key].pilates += parseFloat(p.valor)||0;
    pgtosMes[key].qtdPilates++;
  });

  // Agrupa vendas por mês
  vendas.forEach(v=>{
    if(!v.data||v.data==='—') return;
    const pts = v.data.split('/');
    if(pts.length<3) return;
    const key = pts[1]+'/20'+pts[2];
    if(!pgtosMes[key]) pgtosMes[key]={pilates:0,qtdPilates:0};
    pgtosMes[key].loja = (pgtosMes[key].loja||0) + (parseFloat(v.preco)||0);
    pgtosMes[key].qtdLoja = (pgtosMes[key].qtdLoja||0)+1;
  });

  const meses = Object.entries(pgtosMes).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
  if(!meses.length) return '';

  const mesAtualKey = String(agora.getMonth()+1).padStart(2,'0')+'/'+agora.getFullYear();

  return '<div style="font-size:11px;font-weight:600;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px">'+
  '<i class="ti ti-calendar-stats"></i> Consolidado mensal</div>'+
  '<div class="tw"><table><thead><tr>'+
  '<th>Mês</th><th>Pilates recebido</th><th>Loja</th><th>Total</th><th></th>'+
  '</tr></thead><tbody>'+
  meses.map(([key,d])=>{
    const [mm,yyyy] = key.split('/');
    const isAtual = key===mesAtualKey;
    const total = (d.pilates||0)+(d.loja||0);
    return '<tr style="'+(isAtual?'background:rgba(201,169,110,.06)':'')+'">'+
    '<td style="font-weight:'+(isAtual?'700':'500')+'">'+
      nomesMes[parseInt(mm)]+' '+yyyy+
      (isAtual?' <span style="font-size:10px;color:var(--gold-dark)">● atual</span>':'')+
    '</td>'+
    '<td style="color:var(--gold-dark)">'+fR(d.pilates||0)+
      '<span style="font-size:10px;color:var(--brown-light);margin-left:4px">'+( d.qtdPilates||0)+' pgtos</span>'+
    '</td>'+
    '<td style="color:var(--brown-mid)">'+fR(d.loja||0)+
      (d.qtdLoja?'<span style="font-size:10px;color:var(--brown-light);margin-left:4px">'+d.qtdLoja+' vendas</span>':'')+
    '</td>'+
    '<td style="font-weight:700;color:var(--brown)">'+fR(total)+'</td>'+
    '<td style="font-size:11px;color:var(--brown-light)">'+(isAtual?'parcial':'')+'</td>'+
    '</tr>';
  }).join('')+
  '</tbody></table></div>';
}

  function fmtDt(dt){
    if(!dt) return '—';
    const d = new Date(dt);
    const dHoje  = d.toDateString()===hoje.toDateString();
    const dOntem = d.toDateString()===ontem.toDateString();

    if(dHoje)  return '<span style="color:var(--gold-dark);font-weight:500">Hoje '+hora+'</span>';

function renderLogRows(rows){
  function fmtDt(dt){
    if(!dt) return '—';
    const d = new Date(dt);
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const ontem = new Date(hoje); ontem.setDate(hoje.getDate()-1);
    const hora = d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    if(d.toDateString()===hoje.toDateString()) return '<span style="color:var(--gold-dark);font-weight:500">Hoje '+hora+'</span>';
    if(d.toDateString()===ontem.toDateString()) return 'Ontem '+hora;
    return d.toLocaleDateString('pt-BR')+' '+hora;
  }

  function iconeInfo(tab,acao){
    if(tab==='pagamentos') return {i:'ti-cash',c:'#16a34a',bg:'rgba(22,163,74,.1)',label:'Pagamento'};
    if(tab==='google_agenda') return {i:'ti-calendar-event',c:'#4285F4',bg:'rgba(66,133,244,.1)',label:'Agenda'};
    if(tab==='alunos') return {i:'ti-users',c:'#B8924A',bg:'rgba(184,146,74,.1)',label:'Aluno'};
    if(tab==='vendas') return {i:'ti-receipt',c:'#7A5230',bg:'rgba(122,82,48,.1)',label:'Venda'};
    if(tab==='estoque') return {i:'ti-package',c:'#6B7A2E',bg:'rgba(107,122,46,.1)',label:'Estoque'};
    if(tab==='encomendas') return {i:'ti-truck-delivery',c:'#8B6914',bg:'rgba(139,105,20,.1)',label:'Encomenda'};
    if(tab==='sessoes_fisio'||tab==='pacientes_fisio') return {i:'ti-heart-rate-monitor',c:'#4A6B2E',bg:'rgba(74,107,46,.1)',label:'Fisio'};
    if(tab==='sistema') return {i:'ti-login',c:'#888',bg:'rgba(128,128,128,.08)',label:'Sistema'};
    return {i:'ti-database',c:'#888',bg:'rgba(128,128,128,.08)',label:tab};
  }

  if(!rows.length) return '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--brown-light)">'+
    '<i class="ti ti-inbox" style="font-size:28px;opacity:.3;display:block;margin-bottom:8px"></i>Nenhum registro encontrado</td></tr>';

  return rows.map(r=>{
    const info = iconeInfo(r.tabela, r.acao);
    const isVitoria = r.perfil==='recepcao';
    const isPgto    = r.tabela==='pagamentos';
    const isAgenda  = r.tabela==='google_agenda';
    const rowStyle  = isPgto ? 'background:rgba(22,163,74,.04)' : isAgenda ? 'background:rgba(66,133,244,.04)' : '';

    return '<tr style="'+rowStyle+'">'+
    '<td style="font-size:12px;white-space:nowrap">'+fmtDt(r.criado_em)+'</td>'+
    '<td>'+
      '<div style="display:flex;align-items:center;gap:6px">'+
      '<div style="width:22px;height:22px;border-radius:50%;background:'+(isVitoria?'rgba(74,107,46,.2)':'rgba(184,146,74,.2)')+
      ';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:'+(isVitoria?'#3D5C3A':'#7A5230')+'">'+
      r.usuario.slice(0,2).toUpperCase()+'</div>'+
      '<span style="font-size:12px;font-weight:500;color:var(--brown)">'+r.usuario+'</span>'+
      '</div>'+
    '</td>'+
    '<td>'+
      '<div style="display:inline-flex;align-items:center;gap:5px;background:'+info.bg+';padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;color:'+info.c+'">'+
      '<i class="ti '+info.i+'" style="font-size:12px"></i>'+info.label+'</div>'+
    '</td>'+
    '<td style="font-size:12px;color:var(--brown)">'+r.acao+'</td>'+
    '<td style="font-size:12px;color:var(--brown-light);max-width:280px;overflow:hidden;text-overflow:ellipsis">'+(r.descricao||'—')+'</td>'+
    '</tr>';
  }).join('');
}

function filtrarLogs(){
  const ft      = (document.getElementById('logFt')?.value||'').toLowerCase();
  const usr     = document.getElementById('logUser')?.value||'';
  const tab     = document.getElementById('logTab')?.value||'';
  const periodo = document.getElementById('logPeriodo')?.value||'';
  const all     = window._logsCache||[];

  const hoje   = new Date(); hoje.setHours(0,0,0,0);
  const semana = new Date(hoje); semana.setDate(hoje.getDate()-7);
  const mes    = new Date(hoje); mes.setDate(1);

  const filtrado = all.filter(r=>{
    const dt = new Date(r.criado_em);
    const okFt  = !ft  || (r.descricao||'').toLowerCase().includes(ft) || (r.acao||'').toLowerCase().includes(ft) || (r.usuario||'').toLowerCase().includes(ft);
    const okUsr = !usr || r.usuario===usr;
    const okTab = !tab || r.tabela===tab;
    const okPer = !periodo ||
      (periodo==='hoje'  && dt>=hoje) ||
      (periodo==='semana'&& dt>=semana) ||
      (periodo==='mes'   && dt>=mes);
    return okFt && okUsr && okTab && okPer;
  });

  const body = document.getElementById('logBody');
  const cnt  = document.getElementById('logCount');
  if(body) body.innerHTML = renderLogRows(filtrado);
  if(cnt)  cnt.textContent = filtrado.length+' registros';
}

  const lote = window._lote;
  const totalItens = Object.values(lote.reconhecidos).reduce((s,v)=>s+v.count,0) +
                     Object.values(lote.desconhecidos).reduce((s,v)=>s+v.count,0);
  const totalPecas = Object.keys(lote.reconhecidos).length + Object.keys(lote.desconhecidos).length;
  const nDesc = Object.keys(lote.desconhecidos).length;

  set(
    '<div class="tb" style="margin-bottom:0">'+
    '<button class="btn" onclick="navLEstoque()"><i class="ti ti-arrow-left"></i> Voltar</button>'+
    '</div>'+

    '<div style="display:flex;align-items:flex-start;gap:24px;margin-top:16px">'+

    // ── COLUNA ESQUERDA — bipagem ──────────────────────────
    '<div style="flex:1;min-width:0">'+
    '<div class="pt">Entrada de Estoque em Lote</div>'+
    '<div class="ps">Bipe todas as peças da caixa. Reconhecidas entram direto; não reconhecidas você preenche no final.</div>'+

    // Campo de bipagem principal
    '<div style="background:var(--white);border:2px solid var(--border-md);border-radius:var(--r-lg);padding:20px;margin-bottom:16px;transition:all .2s" id="loteBox">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'+
    '<div style="width:44px;height:44px;border-radius:var(--r-md);background:var(--gold-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
    '<i class="ti ti-barcode" style="font-size:22px;color:var(--gold)"></i></div>'+
    '<div>'+
    '<div style="font-size:14px;font-weight:600;color:var(--text-1)">Pronto para bipar</div>'+
    '<div style="font-size:12px;color:var(--text-3)">Clique aqui e comece a bipar as peças</div>'+
    '</div></div>'+
    '<input type="text" id="loteInput" placeholder="Bipe ou digite o código e pressione Enter…" '+
    'style="width:100%;padding:12px 16px;border-radius:var(--r-md);border:1.5px solid var(--border-md);'+
    'background:var(--bg);color:var(--text-1);font-size:14px;font-family:var(--font);outline:none;'+
    'letter-spacing:.06em;transition:all .18s" '+
    'onfocus="ativarLoteBipagem();document.getElementById(\'loteBox\').style.borderColor=\'var(--gold)\'" '+
    'onblur="desativarLeitorCodigoBarras();document.getElementById(\'loteBox\').style.borderColor=\'var(--border-md)\'" '+
    'onkeydown="if(event.key===\'Enter\'){event.preventDefault();processarLote(this.value);this.value=\'\'}">'+
    '</div>'+

    // Resumo rápido
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">'+
    '<div class="mc"><div class="lb">Itens bipados</div><div class="vl vi" id="loteTotal">'+totalItens+'</div></div>'+
    '<div class="mc"><div class="lb">Reconhecidos</div><div class="vl vg" id="loteRec">'+Object.keys(lote.reconhecidos).length+'</div><div class="s2" id="loteRecQtd">0 unidades</div></div>'+
    '<div class="mc" style="'+(nDesc>0?'border-color:rgba(192,57,43,.3);background:rgba(192,57,43,.04)':'')+'">'+
    '<div class="lb">Não reconhecidos</div><div class="vl vr" id="loteDesc">'+nDesc+'</div>'+
    (nDesc>0?'<div class="s2" style="color:#C0392B">preencher no final</div>':'<div class="s2">tudo certo</div>')+
    '</div></div>'+

    // Botão finalizar
    '<button class="btn btnp" style="width:100%;justify-content:center;padding:13px;font-size:14px" '+
    'onclick="finalizarLote()" '+(totalItens===0?'disabled style="opacity:.4;pointer-events:none"':'')+'>'+
    '<i class="ti ti-check"></i> Finalizar entrada'+(nDesc>0?' ('+nDesc+' pendentes)':'')+'</button>'+
    '</div>'+

    // ── COLUNA DIREITA — lista ao vivo ─────────────────────
    '<div style="width:320px;flex-shrink:0">'+
    '<div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Log de bipagem</div>'+
    '<div id="loteLog" style="background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow-y:auto;max-height:520px">'+
    renderLoteLog()+
    '</div></div>'+

    '</div>' // fim flex
  );

  // Foca no campo
  setTimeout(()=>{ const el=document.getElementById('loteInput'); if(el) el.focus(); }, 100);
}

function renderLoteLog(){
  const lote = window._lote;
  if(!lote.ordem.length)
    return '<div style="padding:24px;text-align:center;color:var(--text-3);font-size:13px">'+
    '<i class="ti ti-barcode" style="font-size:28px;opacity:.3;display:block;margin-bottom:8px"></i>'+
    'Nenhuma peça bipada ainda</div>';

  return lote.ordem.slice().reverse().map(codigo=>{
    const r = lote.reconhecidos[codigo];
    const d = lote.desconhecidos[codigo];
    const count = r ? r.count : d ? d.count : 0;
    const nome  = r ? r.peca.item : '❓ Desconhecido';
    const marca = r ? (r.peca.marca||'') : '';
    const ok    = !!r;
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)">
      <div style="width:28px;height:28px;border-radius:8px;background:${ok?'rgba(45,122,58,.1)':'rgba(192,57,43,.08)'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="ti ${ok?'ti-check':'ti-question-mark'}" style="font-size:13px;color:${ok?'#2D7A3A':'#C0392B'}"></i>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12.5px;font-weight:500;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nome}</div>
        <div style="font-size:10.5px;color:var(--text-3);margin-top:1px;font-family:monospace">${codigo}${marca?' · '+marca:''}</div>
      </div>
      <div style="font-size:13px;font-weight:700;color:${ok?'#2D7A3A':'#C0392B'};min-width:28px;text-align:right">×${count}</div>
    </div>`;
  }).join('');
}

async function processarLote(codigo){
  codigo = (codigo||'').trim();
  if(!codigo) return;

  const lote = window._lote;

  // Efeito no box
  const box = document.getElementById('loteBox');
  if(box){ box.style.borderColor='var(--gold)'; }

  // Busca no banco
  try {
    const r = await fetchWithTimeout(
      `${SB_URL}/rest/v1/estoque?codigo_barras=eq.${encodeURIComponent(codigo)}&limit=1`,
      { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
    );
    const lista = await r.json();

    if(lista[0]){
      // Reconhecido
      if(!lote.reconhecidos[codigo])
        lote.reconhecidos[codigo] = { peca: lista[0], count: 0 };
      lote.reconhecidos[codigo].count++;
    } else {
      // Não reconhecido
      if(!lote.desconhecidos[codigo])
        lote.desconhecidos[codigo] = { count: 0 };
      lote.desconhecidos[codigo].count++;
    }
  } catch(e){
    if(!lote.desconhecidos[codigo])
      lote.desconhecidos[codigo] = { count: 0 };
    lote.desconhecidos[codigo].count++;
  }

  // Adiciona à ordem (sem duplicar)
  if(!lote.ordem.includes(codigo)) lote.ordem.push(codigo);

  // Atualiza UI sem re-renderizar tudo
  atualizarResumoLote();
  const logEl = document.getElementById('loteLog');
  if(logEl) logEl.innerHTML = renderLoteLog();
  const input = document.getElementById('loteInput');
  if(input) input.focus();
}

function atualizarResumoLote(){
  const lote = window._lote;
  const totalItens = Object.values(lote.reconhecidos).reduce((s,v)=>s+v.count,0) +
                     Object.values(lote.desconhecidos).reduce((s,v)=>s+v.count,0);
  const totalRec  = Object.keys(lote.reconhecidos).length;
  const totalDesc = Object.keys(lote.desconhecidos).length;
  const totalRecQtd = Object.values(lote.reconhecidos).reduce((s,v)=>s+v.count,0);

  const elTotal = document.getElementById('loteTotal');
  const elRec   = document.getElementById('loteRec');
  const elRecQtd= document.getElementById('loteRecQtd');
  const elDesc  = document.getElementById('loteDesc');
  if(elTotal) elTotal.textContent = totalItens;
  if(elRec)   elRec.textContent   = totalRec;
  if(elRecQtd)elRecQtd.textContent= totalRecQtd+' unidades';
  if(elDesc)  elDesc.textContent  = totalDesc;
}

function ativarLoteBipagem(){
  ativarLeitorCodigoBarras(codigo=>{
    const input = document.getElementById('loteInput');
    if(input){ input.value = codigo; }
    processarLote(codigo);
  });
}

async function finalizarLote(){
  const lote = window._lote;
  const nDesc = Object.keys(lote.desconhecidos).length;
  const nRec  = Object.keys(lote.reconhecidos).length;

  if(nRec === 0 && nDesc === 0){ alert('Nenhuma peça bipada.'); return; }

  // Se tem não reconhecidos, abre modal para preencher
  if(nDesc > 0){
    abrirModalDesconhecidos();
  } else {
    // Tudo reconhecido — confirma direto
    await confirmarEntradaLote();
  }
}

function abrirModalDesconhecidos(){
  const lote = window._lote;
  const descs = Object.entries(lote.desconhecidos);

  const marcas = ['Rosa Imperial','Camomila','Mnovo','Mantig','ALAD Amanda','Lm'];
  const marcaOpts = '<option value="">—</option>'+marcas.map(m=>'<option>'+m+'</option>').join('');

  abrirModal(
    '<div class="mdt"><i class="ti ti-question-mark" style="margin-right:8px;color:#C0392B"></i>'+descs.length+' peça(s) não reconhecida(s)</div>'+
    '<p style="font-size:13px;color:var(--text-2);margin-bottom:16px">Preencha os dados das peças desconhecidas para cadastrá-las automaticamente no estoque.</p>'+

    '<div style="max-height:360px;overflow-y:auto">'+
    descs.map(([codigo, d])=>
      `<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-family:monospace;font-size:12px;background:rgba(192,57,43,.08);color:#C0392B;padding:3px 8px;border-radius:6px">${codigo}</span>
          <span style="font-size:12px;color:var(--text-3)">×${d.count} unidades</span>
        </div>
        <input class="fi" data-codigo="${codigo}" data-campo="nome" placeholder="Nome da peça *" style="margin-bottom:8px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <select class="fi" data-codigo="${codigo}" data-campo="marca" style="margin-bottom:0">${marcaOpts}</select>
          <input class="fi" data-codigo="${codigo}" data-campo="tam" placeholder="Tamanho (P/M/G)" style="margin-bottom:0">
        </div>
      </div>`
    ).join('')+
    '</div>'+

    '<div class="mdf">'+
    '<button class="btn" onclick="fecharModal()">Cancelar</button>'+
    '<button class="btn" onclick="pularDesconhecidos()">Ignorar e entrar só os reconhecidos</button>'+
    '<button class="btn btnp" id="lote_btn" onclick="salvarDesconhecidosEFinalizar()"><i class="ti ti-check"></i> Cadastrar e finalizar</button>'+
    '</div>'
  );
}

async function pularDesconhecidos(){
  window._lote.desconhecidos = {};
  fecharModal();
  await confirmarEntradaLote();
}

async function salvarDesconhecidosEFinalizar(){
  const btn = document.getElementById('lote_btn');
  btn.disabled=true; btn.textContent='Salvando…';
  const lote = window._lote;

  // Lê os dados preenchidos
  document.querySelectorAll('[data-campo="nome"]').forEach(async el=>{
    const codigo = el.getAttribute('data-codigo');
    const nome   = el.value.trim();
    if(!nome) return; // ignora se não preencheu

    const marcaEl = document.querySelector(`[data-codigo="${codigo}"][data-campo="marca"]`);
    const tamEl   = document.querySelector(`[data-codigo="${codigo}"][data-campo="tam"]`);
    const marca   = marcaEl ? marcaEl.value||null : null;
    const tam     = tamEl   ? tamEl.value||null   : null;
    const qtd     = lote.desconhecidos[codigo]?.count||1;

    try {
      await sbInsert('estoque',{
        item:nome, marca, tamanho:tam,
        quantidade:qtd, codigo_barras:codigo
      });
      await registrarLog('cadastrou peça','estoque','Lote: '+nome+' ['+codigo+']');
      // Move para reconhecidos
      lote.reconhecidos[codigo] = { peca:{item:nome,marca,tamanho:tam,quantidade:0,codigo_barras:codigo}, count:qtd };
      delete lote.desconhecidos[codigo];
    } catch(e){ console.warn('Erro cadastro peça lote:', e.message); }
  });

  fecharModal();
  await confirmarEntradaLote();
}

async function confirmarEntradaLote(){
  const lote = window._lote;
  const recs  = Object.entries(lote.reconhecidos);
  if(!recs.length){ navLEstoque(); return; }

  // Mostra progresso
  set('<div class="pt">Entrada de Estoque</div>'+
  '<div class="ps">Atualizando estoque…</div>'+
  '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:14px">'+
  '<div style="width:32px;height:32px;border:3px solid var(--border-md);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite"></div>'+
  '<div style="font-size:13px;color:var(--text-2)">Atualizando '+recs.length+' peça(s)…</div>'+
  '</div>');

  let ok=0, erro=0;
  for(const [codigo, {peca, count}] of recs){
    try {
      const novaQtd = (peca.quantidade||0) + count;
      await sbUpdate('estoque', peca.id, {quantidade: novaQtd});
      ok++;
    } catch(e){ erro++; }
  }

  const totalItens = recs.reduce((s,[,v])=>s+v.count,0);
  await registrarLog('entrada em lote','estoque', totalItens+' unidades · '+ok+' peças atualizadas');

  // Tela de conclusão
  set(
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px;text-align:center">'+
    '<div style="width:64px;height:64px;border-radius:50%;background:rgba(45,122,58,.1);display:flex;align-items:center;justify-content:center">'+
    '<i class="ti ti-circle-check" style="font-size:32px;color:#2D7A3A"></i></div>'+
    '<div class="pt" style="margin-bottom:0">Entrada concluída!</div>'+
    '<div class="ps" style="margin-bottom:0">'+totalItens+' unidades adicionadas ao estoque · '+ok+' peças atualizadas'+(erro>0?' · '+erro+' erro(s)':'')+'</div>'+

    // Resumo final
    '<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 20px;width:100%;max-width:400px;margin-top:8px">'+
    recs.map(([cod,{peca,count}])=>
      `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span style="color:var(--text-1);font-weight:500">${peca.item}</span>
        <span style="color:#2D7A3A;font-weight:700">+${count}</span>
      </div>`
    ).join('')+
    '</div>'+

    '<div style="display:flex;gap:10px;margin-top:8px">'+
    '<button class="btn" onclick="navLEntrada()"><i class="ti ti-barcode"></i> Nova entrada</button>'+
    '<button class="btn btnp" onclick="navLEstoque()"><i class="ti ti-package"></i> Ver estoque</button>'+
    '</div></div>'
  );
}

// ═══════════════════════════════════════════════════════════
// UTILITÁRIOS

function set(h){document.getElementById('mn').innerHTML=h;}
function mc(lb,cor,vl,s2){return '<div class="mc"><div class="lb">'+lb+'</div><div class="vl '+cor+'">'+vl+'</div><div class="s2">'+s2+'</div></div>';}
function fs(n,cor,lb){return '<div class="fs"><div class="fn" style="color:'+cor+'">'+n+'</div><div class="fl">'+lb+'</div></div>';}
function dr(lb,val){return '<div class="dr"><span class="dl">'+lb+'</span><span>'+val+'</span></div>';}
function ncell(a){const id=a&&a.id?a.id:0;const n=a&&a.n?a.n:'?';return '<span style="display:flex;align-items:center"><span class="av '+avcls(id)+'">'+ini(n)+'</span>'+n+'</span>';}
function esc(s){return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

nav('home');
</script>
