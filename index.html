<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lm Estudio — Sistema de Gestão</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
/* ── PALETA LM STUDIO ──────────────────────────────────────
   Creme:       #F5EDE0  (fundo principal)
   Creme escuro:#EDE0CC  (sidebar, cards)
   Dourado:     #B8924A  (cor primária, destaques)
   Dourado claro:#D4B483 (hover, bordas)
   Marrom:      #4A2E1A  (texto principal)
   Marrom médio:#7A5230  (texto secundário)
   Branco quente:#FDF8F2 (cards, tabelas)
───────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F5EDE0;color:#4A2E1A;font-size:13px}
.app{display:flex;min-height:100vh}
.sb{width:190px;min-width:190px;background:#EDE0CC;border-right:.5px solid rgba(74,46,26,.15);display:flex;flex-direction:column;padding:12px 0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto}
.mn{flex:1;padding:16px 18px;margin-left:190px}

/* sidebar */
.brand{padding:0 12px 14px;border-bottom:.5px solid rgba(74,46,26,.15);margin-bottom:6px}
.brand h1{font-size:15px;font-weight:600;color:#4A2E1A;letter-spacing:.02em}
.brand p{font-size:11px;color:#7A5230;margin-top:2px}
.nsep{font-size:10px;font-weight:600;color:#B8924A;padding:10px 12px 3px;text-transform:uppercase;letter-spacing:.08em}
.ni{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;cursor:pointer;color:#7A5230;border:none;background:none;width:100%;text-align:left;border-right:2px solid transparent;transition:all .15s}
.ni:hover{background:#FDF8F2;color:#4A2E1A}
.ni.act{background:#FDF8F2;color:#4A2E1A;font-weight:500}
.ni i{font-size:15px;flex-shrink:0}
.ni.pilates.act{border-right-color:#B8924A;color:#B8924A}
.ni.loja.act{border-right-color:#7A5230;color:#7A5230}
.ni.fisio.act{border-right-color:#8B6914;color:#8B6914}

/* métricas */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:16px}
.metrics3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:16px}
.mc{background:#EDE0CC;border-radius:10px;padding:10px 14px;border:.5px solid rgba(184,146,74,.2)}
.mc .lb{font-size:11px;color:#7A5230;margin-bottom:2px}
.mc .vl{font-size:19px;font-weight:600;color:#4A2E1A}
.mc .s2{font-size:11px;color:#7A5230;margin-top:2px}

/* cores de destaque */
.vg{color:#5C7A2E}.va{color:#B8924A}.vr{color:#8B2E1A}.vi{color:#B8924A}.vp{color:#7A5230}.ve{color:#6B7A2E}

/* tipografia */
.pt{font-size:16px;font-weight:600;margin-bottom:3px;color:#4A2E1A}
.ps{font-size:12px;color:#7A5230;margin-bottom:14px}

/* tabelas */
.tw{background:#FDF8F2;border:.5px solid rgba(184,146,74,.25);border-radius:12px;overflow:auto;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:7px 10px;text-align:left;font-size:11px;font-weight:600;color:#7A5230;border-bottom:.5px solid rgba(184,146,74,.2);background:#EDE0CC;white-space:nowrap;letter-spacing:.02em}
tbody tr{border-bottom:.5px solid rgba(184,146,74,.12)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#F5EDE0;cursor:pointer}
tbody td{padding:7px 10px;white-space:nowrap;color:#4A2E1A}
.sum-row{background:#EDE0CC;font-weight:600}

/* badges */
.bdg{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.bg{background:#E8F0D8;color:#3D5C1A}
.ba{background:#F5E8D0;color:#7A5230}
.br{background:#F0D8D0;color:#7A2E1A}
.bb{background:#F0E8D8;color:#8B6914}
.bp{background:#EDE0CC;color:#6B4A1A}
.bpk{background:#F0E0D0;color:#7A3A1A}
.bav{background:#E8EDD8;color:#3D5C2E}
.bx{background:#EDE0CC;color:#7A5230}
.be{background:#E8EDD8;color:#3D5C2E}

/* avatares */
.av{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;margin-right:5px;flex-shrink:0}
.a0{background:#E8D8C0;color:#7A5230}
.a1{background:#D8E8C0;color:#3D5C1A}
.a2{background:#E8D0C0;color:#7A3A1A}
.a3{background:#E0D8C0;color:#6B5214}
.a4{background:#D8C8A8;color:#6B4A14}

/* botões */
.btn{padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;border:.5px solid rgba(184,146,74,.4);background:#FDF8F2;color:#4A2E1A;transition:all .15s}
.btn:hover{background:#EDE0CC}
.btnb{background:#B8924A;color:#FDF8F2;border-color:#B8924A}.btnb:hover{background:#A07D3A}
.btnp{background:#7A5230;color:#FDF8F2;border-color:#7A5230}.btnp:hover{background:#6A4220}
.btne{background:#6B7A2E;color:#FDF8F2;border-color:#6B7A2E}.btne:hover{background:#5A6A1E}
.btnd{background:#4A2E1A;color:#FDF8F2;border-color:#4A2E1A}.btnd:hover{opacity:.85}
.btns{padding:3px 7px;font-size:11px}

/* toolbar */
.tb{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.srch{padding:6px 9px;border-radius:8px;border:.5px solid rgba(184,146,74,.3);background:#EDE0CC;color:#4A2E1A;font-size:12px;width:200px}
.srch:focus{outline:none;border-color:#B8924A}
.sel{padding:6px 9px;border-radius:8px;border:.5px solid rgba(184,146,74,.3);background:#EDE0CC;color:#4A2E1A;font-size:12px}

/* tabs */
.tabs{display:flex;border-bottom:.5px solid rgba(184,146,74,.2);margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 12px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#7A5230;background:none;border-top:none;border-left:none;border-right:none;margin-bottom:-0.5px;transition:all .15s}
.tab:hover{color:#4A2E1A}
.tab.act{color:#4A2E1A;font-weight:500}
.tab.actb{border-bottom-color:#B8924A}
.tab.actp{border-bottom-color:#7A5230}
.tab.acte{border-bottom-color:#6B7A2E}

/* grade pilates */
.sg{background:#FDF8F2;border:.5px solid rgba(184,146,74,.25);border-radius:12px;overflow:auto;margin-bottom:14px}
.sgh{display:grid;grid-template-columns:58px repeat(6,minmax(80px,1fr));border-bottom:.5px solid rgba(184,146,74,.2)}
.sgh>div{padding:6px 4px;font-size:11px;font-weight:600;color:#7A5230;text-align:center;border-right:.5px solid rgba(184,146,74,.15);background:#EDE0CC;letter-spacing:.02em}
.sgh>div:last-child{border-right:none}
.sgr{display:grid;grid-template-columns:58px repeat(6,minmax(80px,1fr));border-bottom:.5px solid rgba(184,146,74,.1)}
.sgr:last-child{border-bottom:none}
.stl{padding:4px;font-size:10px;color:#7A5230;border-right:.5px solid rgba(184,146,74,.15);display:flex;align-items:center;justify-content:center;font-weight:600;background:#EDE0CC}
.sl{padding:3px 4px;border-right:.5px solid rgba(184,146,74,.1);min-height:44px;cursor:pointer;display:flex;flex-direction:column;gap:1px;transition:background .1s}
.sl:last-child{border-right:none}
.sl:hover{background:#F5EDE0}
.sfu{background:#E8EDD8}.spa{background:#F5E8D0}
.sn{font-size:9px;font-weight:600;color:#3D5C1A;line-height:1.3}
.sp{font-size:9px;font-weight:600;color:#7A5230}
.sc{font-size:9px;color:#7A5230}
.sf{font-size:9px;color:#B8924A}

/* estoque cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.prod-card{background:#FDF8F2;border:.5px solid rgba(184,146,74,.25);border-radius:12px;padding:12px;cursor:pointer;transition:background .15s}
.prod-card:hover{background:#EDE0CC}
.prod-card .pn{font-size:12px;font-weight:500;margin-bottom:4px;line-height:1.3;color:#4A2E1A}
.prod-card .pm{font-size:11px;color:#7A5230;margin-bottom:6px}
.prod-card .pt2{display:flex;justify-content:space-between;align-items:center}
.s0{border-left:3px solid #8B2E1A}.slow{border-left:3px solid #B8924A}.sok{border-left:3px solid #5C7A2E}

/* fisio */
.sess-dot{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;margin:2px}
.sess-ok{background:#E8EDD8;color:#3D5C1A}
.sess-pend{background:#EDE0CC;color:#7A5230}

/* detail panel */
.dp{background:#FDF8F2;border:.5px solid rgba(184,146,74,.25);border-radius:12px;padding:14px;margin-bottom:12px}
.dp h3{font-size:13px;font-weight:600;margin-bottom:10px;color:#B8924A}
.dr{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:.5px solid rgba(184,146,74,.12)}
.dr:last-child{border-bottom:none}
.dl{color:#7A5230}

/* chart */
.chart-bar{height:8px;border-radius:4px;background:#EDE0CC;margin-top:3px}
.chart-fill-p{height:100%;border-radius:4px;background:#B8924A}
.chart-fill-l{height:100%;border-radius:4px;background:#7A5230}
.chart-fill-e{height:100%;border-radius:4px;background:#6B7A2E}

/* funil */
.funil{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:16px}
.fs{background:#FDF8F2;border:.5px solid rgba(184,146,74,.25);border-radius:12px;padding:10px;text-align:center}
.fs .fn{font-size:20px;font-weight:600;margin-bottom:2px}
.fs .fl{font-size:11px;color:#7A5230}

/* modal */
.ovlbg{position:fixed;inset:0;background:rgba(74,46,26,.6);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(3px)}
.mdl{background:#FDF8F2;border-radius:14px;border:.5px solid rgba(184,146,74,.3);padding:22px;width:460px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(74,46,26,.25);position:relative;z-index:1000}
.mdt{font-size:15px;font-weight:600;margin-bottom:16px;color:#4A2E1A;padding-bottom:12px;border-bottom:.5px solid rgba(184,146,74,.2)}
.mdf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:.5px solid rgba(184,146,74,.2)}
.fl{font-size:12px;color:#7A5230;margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(184,146,74,.3);background:#FDF8F2;color:#4A2E1A;font-size:13px;margin-bottom:10px;outline:none}
.fi:focus{border-color:#B8924A;box-shadow:0 0 0 3px rgba(184,146,74,.15)}
select.fi{cursor:pointer}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
</style>
</head>

const DIAS=['Seg','Ter','Qua','Qui','Sex','Sáb'];
const HORAS=['07H','08H','09H','10H','15H','16H','17H','18H','19H'];
const CAP=4;
const SL_STATUS={'A':'Ativo','P':'Prospect','E':'Experimental','AV':'Avulso'};
const SL_BADGE={'A':'bg','P':'bp','E':'bb','AV':'bav'};

function buildGrade(){
  const g={};
  DIAS.forEach(d=>HORAS.forEach(h=>g[d+'-'+h]=[]));
  AL.filter(a=>a.s==='A').forEach(a=>{
    if(!a.h||a.h==='-'||a.h==='—') return;
    a.h.split(',').forEach(p=>{
      const m=p.trim().match(/^(SEG|TER|QUA|QUI|SEX|SAB)\s+(\d+H)/i);
      if(!m) return;
      const dm={SEG:'Seg',TER:'Ter',QUA:'Qua',QUI:'Qui',SEX:'Sex',SAB:'Sáb'};
      const k=dm[m[1].toUpperCase()]+'-'+m[2].toUpperCase();
      if(g[k]) g[k].push(a.n.split(' ').slice(0,2).map((w,i)=>i?w[0]+'.':w).join(' '));
    });
  });
  return g;
}
const GD=buildGrade();

function avcls(id){return 'a'+(id%5);}
function ini(n){return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');}
function sbadge(s){return '<span class="bdg '+(SL_BADGE[s]||'bx')+'">'+(SL_STATUS[s]||s)+'</span>';}
function fR(v){return v!=null?'R$ '+parseFloat(v).toFixed(2).replace('.',','):'—';}
function qtdN(q){if(typeof q==='number')return q;const m=String(q||0).match(/\d+/g);return m?m.reduce((s,n)=>s+parseInt(n),0):0;}
function marcaBdg(m){
  const mp={'Rosa Imperial':'bpk','Camomila':'ba','Mnovo':'bb','Mantig':'bx','ALAD Amanda':'bg','Lm':'bx'};
  const k=Object.keys(mp).find(k=>m&&m.toLowerCase().includes(k.toLowerCase()));
  return k?mp[k]:'bx';
}

// Timeout helper — aborta se demorar mais de 6 segundos
function fetchWithTimeout(url, opts={}, ms=6000){
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, {...opts, signal:ctrl.signal}).finally(()=>clearTimeout(tid));
}

async function sbGet(table, order='id'){
  const r = await fetchWithTimeout(`${SB_URL}/rest/v1/${table}?order=${order}`, {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbInsert(table, data){
  const r = await fetchWithTimeout(`${SB_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

    method:'PATCH',

  '</div>'+

  );

  atualizarRelogio();

function atualizarRelogio(){
  const el = document.getElementById('relogio');
  const de = document.getElementById('dataHoje');
  if(!el) { clearInterval(window._clockInterval); return; }
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  el.textContent = h+':'+m+':'+s;
  const dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  de.textContent = dias[now.getDay()]+', '+now.getDate()+' de '+meses[now.getMonth()]+' de '+now.getFullYear();
}

async function converterAtivo(json){
  const a=JSON.parse(json);

  try {

      await sbUpdate('alunos', a.id, {status:'A'});

    a.s='A';
    const idx=AL.findIndex(x=>x.n===a.n); if(idx>=0) AL[idx].s='A';

    const [vRows, eRows, encRows] = await Promise.all([sbGet('vendas','criado_em'), sbGet('estoque','item'), sbGet('encomendas','criado_em')]);

    const dbEItems = new Set(eRows.map(r=>r.item));
    const allE = eRows.length > 0 ? [...eRows.map(r=>({item:r.item,tam:r.tamanho,qtd:r.quantidade})), ...ESTOQUE.filter(e=>!dbEItems.has(e.item))] : ESTOQUE;

    renderLDash(allV, allE, allEnc);

function renderLDash(allV, allE, allEnc){
  const totalV=allV.reduce((s,v)=>s+(parseFloat(v.preco)||0),0);
  const totalC=allV.filter(v=>v.custo).reduce((s,v)=>s+(parseFloat(v.custo)||0),0);
  const mg=totalC>0?((totalV-totalC)/totalV*100):null;
  const emEst=allE.reduce((s,e)=>s+qtdN(e.qtd),0);
  const semEst=allE.filter(e=>qtdN(e.qtd)===0).length;
  const encPend=allEnc.filter(e=>!e.vf).length;
  const porMarca={};
  allV.forEach(v=>{const m=v.marca||'Outras';porMarca[m]=(porMarca[m]||0)+(parseFloat(v.preco)||0);});
  const top=Object.entries(porMarca).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxV=top[0]?top[0][1]:1;
  set('<div class="pt">Loja — Dashboard</div><div class="ps">LmSTORE · <span style="color:#16a34a;font-weight:500">● banco conectado</span></div>'+
  '<div class="metrics">'+

async function navLClientes(){
  loading('Carregando clientes…');
  try {
    const [vRows, encRows] = await Promise.all([sbGet('vendas','criado_em'), sbGet('encomendas','criado_em')]);
    const dbVIds = new Set(vRows.map(r=>r.id));
    const allV=[...vRows.map(r=>({item:r.item,cliente:r.cliente,preco:r.preco})),...VENDAS.filter(v=>!dbVIds.has(v.id))];
    const dbEIds = new Set(encRows.map(r=>r.id));
    const allEnc=[...encRows.map(r=>({item:r.item,cliente:r.cliente,vf:r.valor_final,preco:r.preco_tabela})),...ENCOMENDAS.filter(e=>!dbEIds.has(e.id))];
    const map={};
    allV.forEach(v=>{const c=v.cliente||'—';if(!map[c])map[c]={n:c,q:0,t:0,it:[]};map[c].q++;map[c].t+=parseFloat(v.preco)||0;map[c].it.push(v.item);});
    allEnc.forEach(e=>{const c=e.cliente||'—';if(!map[c])map[c]={n:c,q:0,t:0,it:[]};map[c].q++;map[c].t+=parseFloat(e.vf||e.preco)||0;map[c].it.push(e.item);});
    const lista=Object.values(map).filter(c=>!ft||c.n.toLowerCase().includes(ft.toLowerCase())).sort((a,b)=>b.t-a.t);
    set('<div class="pt">Clientes</div><div class="ps">'+lista.length+' clientes com compras</div>'+
    '<div class="tb"><input class="srch" placeholder="Buscar cliente…" oninput="ft=this.value;navLClientes()" value="'+ft+'"></div>'+
    '<div class="tw"><table><thead><tr><th>Cliente</th><th>Compras</th><th>Total</th><th>Últimos itens</th></tr></thead><tbody>'+
    lista.map(c=>'<tr><td><strong>'+c.n+'</strong></td><td>'+c.q+'</td><td style="color:#db2777;font-weight:500">'+fR(c.t)+'</td>'+
    '<td style="color:#666;max-width:240px;overflow:hidden;text-overflow:ellipsis">'+c.it.slice(-3).join(', ')+'</td></tr>').join('')+
    '</tbody></table></div>');
  } catch(e){ showErr(e.message); }
}

  '<div class="fr2"><div><label class="fl">Forma pgto</label><select class="fi" id="enc_pgto"><option>PIX</option><option>PIX 10%</option><option>PIX 15%</option><option>PIX 20%</option><option>PIX 25%</option><option>Cartão 3x</option><option>Encomenda 20%</option></select></div>'+

// ── AGENDA (grade local — usa dados em memória) ───────────
function rPAgenda(){
  let h='<div class="pt">Grade de Aulas</div><div class="ps">Horários dos alunos ativos · Cap: '+CAP+'/turma</div>'+
  '<div style="display:flex;gap:12px;font-size:11px;margin-bottom:12px;flex-wrap:wrap">'+
  '<span style="display:flex;gap:4px;align-items:center"><span style="width:10px;height:10px;border-radius:2px;background:#d1fae5;border:.5px solid #6ee7b7;display:inline-block"></span>Cheia</span>'+
  '<span style="display:flex;gap:4px;align-items:center"><span style="width:10px;height:10px;border-radius:2px;background:#fef3c7;border:.5px solid #fcd34d;display:inline-block"></span>Com vaga</span>'+
  '<span style="display:flex;gap:4px;align-items:center"><span style="width:10px;height:10px;border-radius:2px;background:#f5f5f0;border:.5px solid #ddd;display:inline-block"></span>Sem aula</span></div>'+
  '<div class="sg"><div class="sgh"><div>Hr</div>'+DIAS.map(d=>'<div>'+d+'</div>').join('')+'</div>';
  HORAS.forEach(hr=>{
    h+='<div class="sgr"><div class="stl">'+hr+'</div>';
    DIAS.forEach(d=>{
      const k=d+'-'+hr, aula=GD[k]||[];
      if(!aula.length){h+='<div class="sl"><div style="display:flex;align-items:center;justify-content:center;height:100%"><span class="sf">–</span></div></div>';}
      else{
        const fu=aula.length>=CAP;
        h+='<div class="sl '+(fu?'sfu':'spa')+'" onclick="verTurma(\''+d+'\',\''+hr+'\')">';
        aula.slice(0,3).forEach(nm=>h+='<span class="'+(fu?'sn':'sp')+'">'+nm+'</span>');
        if(aula.length>3)h+='<span class="sc">+'+( aula.length-3)+'</span>';
        else h+='<span class="sc">'+aula.length+'/'+CAP+'</span>';
        h+='</div>';
      }
    });
    h+='</div>';
  });
  set(h+'</div>');
}

function verTurma(d,hr){
  const k=d+'-'+hr, aula=GD[k]||[], livre=CAP-aula.length;
  abrirModal('<div class="mdt">'+d+' – '+hr+'</div>'+
  '<div style="margin-bottom:10px"><span class="bdg '+(livre===0?'bg':'ba')+'">'+aula.length+'/'+CAP+' alunos</span>'+(livre>0?' <span style="font-size:11px;color:#16a34a">'+livre+' vaga(s) livre</span>':'')+' </div>'+
  aula.map(nm=>'<div style="padding:5px 0;border-bottom:.5px solid rgba(0,0,0,.08);font-size:12px">'+nm+'</div>').join('')+
  (livre>0?'<div style="font-size:11px;color:#16a34a;margin-top:8px"><i class="ti ti-circle-check"></i> Disponível para reposição</div>':'')+
  '<div class="mdf"><button class="btn" onclick="fecharModal()">Fechar</button></div>');
}

function verPaciente(idx){
  const cache=window._fisioCache||FISIO;
  const p=cache[idx];
  if(!p) return;
  const ok=p.sessoes&&p.realizadas>=p.sessoes;
  const faltam=p.sessoes?Math.max(0,p.sessoes-p.realizadas):null;
  set('<div class="tb"><button class="btn" onclick="nav(\'f_pacientes\')"><i class="ti ti-arrow-left"></i> Voltar</button></div>'+
  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+
  '<div style="width:44px;height:44px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:#065f46">'+p.n.slice(0,2).toUpperCase()+'</div>'+
  '<div><div style="font-size:15px;font-weight:500">'+p.n+'</div></div>'+
  '<span style="margin-left:auto"><span class="bdg '+(ok?'bg':p.realizadas>0?'ba':'bx')+'">'+(ok?'Concluído':p.realizadas>0?'Em andamento':'Aguardando')+'</span></span></div>'+
  '<div class="dp"><h3 style="color:#059669">Sessões</h3>'+
  dr('Sessões contratadas',p.sessoes||'Sem contrato fixo')+
  dr('Sessões realizadas',p.realizadas)+
  (faltam!=null?dr('Faltam',faltam+' sessão(ões)'):'')+
  '</div>'+
  (p.datas&&p.datas.length?'<div class="dp"><h3 style="color:#059669">Datas realizadas</h3>'+
  '<div style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 0">'+
  p.datas.map(d=>'<span style="background:#d1fae5;color:#065f46;padding:3px 8px;border-radius:6px;font-size:11px">'+(d||'—')+'</span>').join('')+
  '</div></div>':'')+
  '<div style="display:flex;gap:8px"><button class="btn btne" onclick="abrirRegistrarSessao(\''+esc(p.n)+'\')"><i class="ti ti-plus"></i> Registrar sessão</button></div>');
}

}

function set(h){document.getElementById('mn').innerHTML=h;}
function mc(lb,cor,vl,s2){return '<div class="mc"><div class="lb">'+lb+'</div><div class="vl '+cor+'">'+vl+'</div><div class="s2">'+s2+'</div></div>';}
function fs(n,cor,lb){return '<div class="fs"><div class="fn" style="color:'+cor+'">'+n+'</div><div class="fl">'+lb+'</div></div>';}
function dr(lb,val){return '<div class="dr"><span class="dl">'+lb+'</span><span>'+val+'</span></div>';}
function ncell(a){return '<span style="display:flex;align-items:center"><span class="av '+avcls(a.id||0)+'">'+ini(a.n)+'</span>'+a.n+'</span>';}
function esc(s){return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
