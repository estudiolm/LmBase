<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lm Estudio — Sistema de Gestão</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ═══════════════════════════════════════════════════════════
   LM ESTUDIO — LUXURY DESIGN SYSTEM
   Paleta: Creme · Dourado · Marrom · Verde oliva
═══════════════════════════════════════════════════════════ */

:root {
  --cream:      #F7F0E6;
  --cream-dark: #EDE3D4;
  --cream-mid:  #E5D9C8;
  --gold:       #C9A96E;
  --gold-light: #DFC18E;
  --gold-dark:  #A8844A;
  --brown:      #3C2415;
  --brown-mid:  #6B4423;
  --brown-light:#9A7050;
  --white:      #FDFAF5;
  --glass:      rgba(253,250,245,.85);
  --border:     rgba(201,169,110,.2);
  --border-str: rgba(201,169,110,.4);
  --shadow-sm:  0 2px 12px rgba(60,36,21,.08);
  --shadow-md:  0 8px 32px rgba(60,36,21,.12);
  --shadow-lg:  0 20px 60px rgba(60,36,21,.18);
  --radius:     14px;
  --radius-sm:  9px;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans:  'Inter', system-ui, sans-serif;
  --transition: all .2s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: var(--font-sans);
  background: var(--cream);
  color: var(--brown);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── BACKGROUND TEXTURE ───────────────────────────────────── */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,169,110,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(60,36,21,.04) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

.app { display:flex; min-height:100vh; position:relative; z-index:1; }

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sb {
  width: 230px;
  min-width: 230px;
  background: linear-gradient(180deg, #F7F0E4 0%, #F0E8D6 60%, #EDE0CA 100%);
  border-right: 1px solid rgba(184,146,74,.2);
  display: flex;
  flex-direction: column;
  padding: 0 0 16px;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 50;
  box-shadow: 4px 0 20px rgba(184,146,74,.1);
}

.sb::-webkit-scrollbar { width: 3px; }
.sb::-webkit-scrollbar-track { background: transparent; }
.sb::-webkit-scrollbar-thumb { background: rgba(184,146,74,.3); border-radius: 4px; }

.brand {
  padding: 22px 18px 20px;
  border-bottom: 1px solid rgba(201,169,110,.12);
  margin-bottom: 8px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand:hover { background: rgba(184,146,74,.08); }
.brand-name {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 600;
  color: #3D5C3A;
  letter-spacing: .04em;
  line-height: 1.1;
}
.brand-sub {
  font-size: 11px;
  color: rgba(201,169,110,.5);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-top: 2px;
}

.nsep {
  font-size: 10px;
  font-weight: 600;
  color: #B8924A;
  padding: 14px 16px 5px;
  text-transform: uppercase;
  letter-spacing: .14em;
}

.ni {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 400;
  cursor: pointer;
  color: rgba(61,92,58,.7);
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  border-left: 2px solid transparent;
  transition: var(--transition);
  letter-spacing: .01em;
}
.ni:hover {
  background: rgba(184,146,74,.15);
  color: #3D5C3A;
}
.ni.act {
  background: rgba(184,146,74,.15);
  color: #3D5C3A;
  font-weight: 500;
  border-left-color: var(--gold);
}
.ni i { font-size: 17px; flex-shrink: 0; opacity: .8; }
.ni.act i { opacity: 1; color: #3D5C3A; }

/* ── MAIN CONTENT ─────────────────────────────────────────── */
.mn {
  flex: 1;
  padding: 32px 36px;
  margin-left: 230px;
  max-width: 100%;
}

/* ── PAGE HEADER ──────────────────────────────────────────── */
.pt {
  font-family: var(--font-serif);
  font-size: 30px;
  font-weight: 600;
  color: var(--brown);
  margin-bottom: 6px;
  letter-spacing: .01em;
  line-height: 1.2;
}
.ps {
  font-size: 13px;
  color: var(--brown-light);
  margin-bottom: 24px;
  font-weight: 400;
  letter-spacing: .01em;
}

/* ── METRIC CARDS ─────────────────────────────────────────── */
.metrics  { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:22px; }
.metrics3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-bottom:22px; }

.mc {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.mc::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,.4), transparent);
}
.mc:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.mc .lb {
  font-size: 11px;
  color: var(--brown-light);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .1em;
  font-weight: 500;
}
.mc .vl {
  font-family: var(--font-serif);
  font-size: 30px;
  font-weight: 600;
  color: var(--brown);
  line-height: 1;
}
.mc .s2 { font-size: 12px; color: var(--brown-light); margin-top: 5px; }

/* ── HIGHLIGHT COLORS ─────────────────────────────────────── */
.vg { color: #5C7A2E; }
.va { color: var(--gold-dark); }
.vr { color: #8B2E1A; }
.vi { color: var(--gold-dark); }
.vp { color: var(--brown-mid); }
.ve { color: #4A6B2E; }

/* ── TABLES ───────────────────────────────────────────────── */
.tw {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: auto;
  margin-bottom: 18px;
  box-shadow: var(--shadow-sm);
}

table { width:100%; border-collapse:collapse; font-size:13px; }

thead th {
  padding: 11px 15px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--brown-light);
  border-bottom: 1px solid var(--border);
  background: rgba(237,227,212,.6);
  white-space: nowrap;
  letter-spacing: .08em;
  text-transform: uppercase;
}

tbody tr {
  border-bottom: 1px solid rgba(201,169,110,.08);
  transition: var(--transition);
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(201,169,110,.06); cursor: pointer; }
tbody td { padding: 11px 15px; white-space: nowrap; color: var(--brown); }

.sum-row {
  background: rgba(184,146,74,.15);
  font-weight: 600;
  border-top: 1px solid var(--border);
}

/* ── BADGES ───────────────────────────────────────────────── */
.bdg {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .03em;
}
.bg  { background: rgba(92,122,46,.12);  color: #3D5C1A; border: 1px solid rgba(92,122,46,.2); }
.ba  { background: rgba(168,132,74,.12); color: #7A5C1A; border: 1px solid rgba(168,132,74,.2); }
.br  { background: rgba(139,46,26,.1);   color: #7A2E1A; border: 1px solid rgba(139,46,26,.2); }
.bb  { background: rgba(139,105,20,.1);  color: #7A6014; border: 1px solid rgba(139,105,20,.2); }
.bp  { background: rgba(107,74,26,.1);   color: #5A3A10; border: 1px solid rgba(107,74,26,.2); }
.bpk { background: rgba(168,90,50,.1);   color: #7A3A20; border: 1px solid rgba(168,90,50,.2); }
.bav { background: rgba(74,107,46,.1);   color: #3D5C2E; border: 1px solid rgba(74,107,46,.2); }
.bx  { background: rgba(60,36,21,.06);   color: var(--brown-light); border: 1px solid var(--border); }
.be  { background: rgba(74,107,46,.1);   color: #3D5C2E; border: 1px solid rgba(74,107,46,.2); }

/* ── AVATARS ──────────────────────────────────────────────── */
.av {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600;
  margin-right: 8px; flex-shrink: 0;
  border: 1px solid rgba(201,169,110,.3);
}
.a0 { background: linear-gradient(135deg,#E8D8C0,#D4C0A0); color: var(--brown-mid); }
.a1 { background: linear-gradient(135deg,#D8E0C0,#C4D0A8); color: #3D5C1A; }
.a2 { background: linear-gradient(135deg,#E8C8B8,#D4B0A0); color: #6A2E1A; }
.a3 { background: linear-gradient(135deg,#E0D4B8,#CCC0A0); color: #5A4A14; }
.a4 { background: linear-gradient(135deg,#D8C4A0,#C4B088); color: #5A4014; }

/* ── BUTTONS ──────────────────────────────────────────────── */
.btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border-str);
  background: var(--glass);
  color: var(--brown);
  transition: var(--transition);
  letter-spacing: .02em;
  backdrop-filter: blur(8px);
}
.btn:hover { background: var(--cream-dark); box-shadow: var(--shadow-sm); }

.btnb {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--white);
  border-color: var(--gold-dark);
  box-shadow: 0 2px 12px rgba(201,169,110,.3);
}
.btnb:hover { background: linear-gradient(135deg, var(--gold-light), var(--gold)); box-shadow: 0 4px 18px rgba(201,169,110,.4); }

.btnp {
  background: linear-gradient(135deg, var(--brown-mid), var(--brown));
  color: var(--white);
  border-color: var(--brown);
}
.btnp:hover { opacity: .9; box-shadow: var(--shadow-sm); }

.btne {
  background: linear-gradient(135deg, #6B7A2E, #4A5A1E);
  color: var(--white);
  border-color: #4A5A1E;
}
.btne:hover { opacity: .9; }

.btnd {
  background: linear-gradient(135deg, var(--brown), #2A1A0E);
  color: var(--white);
  border-color: var(--brown);
}
.btnd:hover { opacity: .9; }

.btns { padding: 5px 10px; font-size: 12px; }

/* ── TOOLBAR ──────────────────────────────────────────────── */
.tb { display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }

.srch {
  padding: 8px 13px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-str);
  background: var(--glass);
  color: var(--brown);
  font-size: 13px;
  width: 240px;
  backdrop-filter: blur(8px);
  transition: var(--transition);
  font-family: var(--font-sans);
}
.srch:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,.15); }
.srch::placeholder { color: var(--brown-light); }

.sel {
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-str);
  background: var(--glass);
  color: var(--brown);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
}

/* ── TABS ─────────────────────────────────────────────────── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
  gap: 4px;
}
.tab {
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 400;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--brown-light);
  background: none;
  border-top: none; border-left: none; border-right: none;
  margin-bottom: -1px;
  transition: var(--transition);
  letter-spacing: .02em;
  font-family: var(--font-sans);
}
.tab:hover { color: var(--brown); }
.tab.act { color: var(--brown); font-weight: 500; }
.tab.actb { border-bottom-color: var(--gold); }
.tab.actp { border-bottom-color: var(--brown-mid); }
.tab.acte { border-bottom-color: #6B7A2E; }

/* ── SCHEDULE GRID ────────────────────────────────────────── */
.sg {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: auto;
  margin-bottom: 18px;
  box-shadow: var(--shadow-sm);
}
.sgh { display:grid; grid-template-columns:58px repeat(6,minmax(80px,1fr)); border-bottom:1px solid var(--border); }
.sgh>div {
  padding: 9px 4px;
  font-size: 10px;
  font-weight: 600;
  color: var(--brown-light);
  text-align: center;
  border-right: 1px solid rgba(201,169,110,.1);
  background: rgba(237,227,212,.5);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.sgh>div:last-child { border-right: none; }
.sgr { display:grid; grid-template-columns:58px repeat(6,minmax(80px,1fr)); border-bottom:1px solid rgba(201,169,110,.07); }
.sgr:last-child { border-bottom: none; }
.stl {
  padding: 4px;
  font-size: 10px;
  color: var(--brown-light);
  border-right: 1px solid rgba(201,169,110,.1);
  display: flex; align-items: center; justify-content: center;
  font-weight: 600;
  background: rgba(237,227,212,.35);
}
.sl {
  padding: 4px 5px;
  border-right: 1px solid rgba(201,169,110,.07);
  min-height: 46px;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 2px;
  transition: var(--transition);
}
.sl:last-child { border-right: none; }
.sl:hover { background: rgba(184,146,74,.15); }
.sfu { background: rgba(92,122,46,.08); }
.spa { background: rgba(201,169,110,.07); }
.sn { font-size: 9px; font-weight: 600; color: #3D5C1A; line-height: 1.3; }
.sp { font-size: 9px; font-weight: 600; color: var(--brown-mid); }
.sc { font-size: 9px; color: var(--brown-light); }
.sf { font-size: 9px; color: rgba(184,146,74,.7); }

/* ── PRODUCT CARDS ────────────────────────────────────────── */
.card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-bottom:18px; }
.prod-card {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
}
.prod-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.prod-card .pn { font-size: 12px; font-weight: 500; margin-bottom: 4px; line-height: 1.4; color: var(--brown); }
.prod-card .pm { font-size: 11px; color: var(--brown-light); margin-bottom: 8px; }
.prod-card .pt2 { display:flex; justify-content:space-between; align-items:center; }
.s0  { border-left: 3px solid #8B2E1A; }
.slow{ border-left: 3px solid var(--gold-dark); }
.sok { border-left: 3px solid #5C7A2E; }

/* ── DETAIL PANEL ─────────────────────────────────────────── */
.dp {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.dp h3 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 14px;
  color: var(--gold-dark);
  letter-spacing: .02em;
}
.dr {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(201,169,110,.1);
}
.dr:last-child { border-bottom: none; }
.dl { color: var(--brown-light); font-weight: 400; }

/* ── CHARTS ───────────────────────────────────────────────── */
.chart-bar { height: 6px; border-radius: 3px; background: rgba(201,169,110,.15); margin-top: 5px; }
.chart-fill-p { height:100%; border-radius:3px; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); }
.chart-fill-l { height:100%; border-radius:3px; background: linear-gradient(90deg, var(--brown), var(--brown-mid)); }
.chart-fill-e { height:100%; border-radius:3px; background: linear-gradient(90deg, #4A6B2E, #6B7A2E); }

/* ── FUNNEL ───────────────────────────────────────────────── */
.funil { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:18px; }
.fs {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}
.fs:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.fs .fn {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 600;
  margin-bottom: 4px;
  line-height: 1;
}
.fs .fl { font-size: 12px; color: var(--brown-light); letter-spacing: .04em; }

/* ── MODAL ────────────────────────────────────────────────── */
.ovlbg {
  position: fixed; inset: 0;
  background: rgba(20,12,6,.7);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.mdl {
  background: var(--white);
  border-radius: 18px;
  border: 1px solid var(--border-str);
  padding: 30px;
  width: 500px;
  max-width: 95vw;
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(201,169,110,.1);
  position: relative;
  z-index: 1000;
  animation: modalIn .2s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn {
  from { opacity:0; transform: scale(.96) translateY(8px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.mdt {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 18px;
  color: var(--brown);
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  letter-spacing: .02em;
}
.mdf {
  display: flex; gap: 10px; justify-content: flex-end;
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid var(--border);
}
.fl { font-size: 12px; color: var(--brown-light); margin-bottom: 5px; display: block; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
.fi {
  width: 100%; padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-str);
  background: var(--cream);
  color: var(--brown);
  font-size: 13px;
  margin-bottom: 12px;
  outline: none;
  font-family: var(--font-sans);
  transition: var(--transition);
}
.fi:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,.15); background: var(--white); }
select.fi { cursor: pointer; }
.fr2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.fr3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

/* ── SCROLLBAR ────────────────────────────────────────────── */
.mn::-webkit-scrollbar { width: 4px; }
.mn::-webkit-scrollbar-track { background: transparent; }
.mn::-webkit-scrollbar-thumb { background: rgba(201,169,110,.25); border-radius: 4px; }

/* ── ANIMATIONS ───────────────────────────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

/* ── LOGIN SCREEN ─────────────────────────────────────────── */
.login-bg {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #F7F0E4 0%, #EDE3D4 40%, #E5D9C8 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.login-box {
  background: rgba(253,250,245,.95);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(184,146,74,.3);
  border-radius: 20px;
  padding: 44px 48px;
  width: 400px;
  max-width: 95vw;
  box-shadow: 0 24px 80px rgba(60,36,21,.15), 0 0 0 1px rgba(184,146,74,.1);
  text-align: center;
  animation: modalIn .3s cubic-bezier(.34,1.56,.64,1);
}
.login-logo { width: 64px; height: 64px; object-fit: contain; margin-bottom: 16px; }
.login-title {
  font-family: var(--font-serif);
  font-size: 28px; font-weight: 600;
  color: #B8924A; letter-spacing: .04em;
  margin-bottom: 4px;
}
.login-sub { font-size: 12px; color: var(--brown-light); margin-bottom: 28px; letter-spacing: .06em; text-transform: uppercase; }
.login-field { margin-bottom: 14px; text-align: left; }
.login-field label { font-size: 11px; font-weight: 600; color: var(--brown-light); letter-spacing: .07em; text-transform: uppercase; display: block; margin-bottom: 5px; }
.login-field input {
  width: 100%; padding: 11px 14px;
  border-radius: 10px;
  border: 1px solid rgba(184,146,74,.3);
  background: var(--cream);
  color: var(--brown);
  font-size: 14px; font-family: var(--font-sans);
  outline: none; transition: var(--transition);
}
.login-field input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,.15); }
.login-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--white); border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600; font-family: var(--font-sans);
  cursor: pointer; margin-top: 6px;
  box-shadow: 0 4px 18px rgba(201,169,110,.35);
  transition: var(--transition); letter-spacing: .04em;
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,169,110,.45); }
.login-error { color: #8B2E1A; font-size: 12px; margin-top: 10px; display: none; background: rgba(139,46,26,.08); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(139,46,26,.15); }

/* ── USER BADGE (top bar) ─────────────────────────────────── */
.topbar { display: flex; align-items: center; justify-content: flex-end; padding: 10px 32px 0; gap: 10px; }
.user-badge {
  display: flex; align-items: center; gap: 8px;
  background: rgba(184,146,74,.1); border: 1px solid rgba(184,146,74,.2);
  border-radius: 20px; padding: 5px 12px 5px 8px;
  font-size: 12px; color: var(--brown);
}
.user-avatar {
  width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: white; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
}
.logout-btn { font-size: 11px; color: var(--brown-light); cursor: pointer; margin-left: 4px; }
.logout-btn:hover { color: #8B2E1A; }

/* ── ACESSO NEGADO ────────────────────────────────────────── */
.acesso-negado {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 60vh; gap: 14px; color: var(--brown-light);
}
.acesso-negado i { font-size: 48px; color: rgba(184,146,74,.3); }
.acesso-negado h3 { font-family: var(--font-serif); font-size: 22px; color: var(--brown); }

/* ── GOOGLE CALENDAR ──────────────────────────────────────── */
.gcal-connect {
  margin: 8px 12px;
  padding: 8px 12px;
  background: rgba(201,169,110,.08);
  border: 1px dashed rgba(201,169,110,.3);
  border-radius: 10px;
  cursor: pointer;
  transition: var(--transition);
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: rgba(61,92,58,.7);
}
.gcal-connect:hover { background: rgba(201,169,110,.15); }
.gcal-connected {
  margin: 8px 12px;
  padding: 8px 12px;
  background: rgba(61,92,58,.08);
  border: 1px solid rgba(61,92,58,.2);
  border-radius: 10px;
  font-size: 11px; color: #3D5C3A;
  display: flex; align-items: center; gap: 8px;
}
.cal-event {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 12px;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
}
.cal-event:hover { box-shadow: var(--shadow-md); transform: translateX(2px); }
.cal-dot {
  width: 10px; height: 10px; border-radius: 50%;
  margin-top: 4px; flex-shrink: 0;
}
.cal-time { font-size: 11px; color: var(--brown-light); white-space: nowrap; min-width: 80px; }
.cal-title { font-size: 13px; font-weight: 500; color: var(--brown); }
.cal-desc { font-size: 11px; color: var(--brown-light); margin-top: 2px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 16px; }
.cal-day-header { text-align:center; font-size:10px; font-weight:600; color:var(--brown-light); text-transform:uppercase; letter-spacing:.06em; padding:6px 0; }
.cal-day {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex; flex-direction:column; align-items:center; justify-content:center;
  font-size: 12px; cursor: pointer;
  transition: var(--transition);
  position: relative;
  padding: 4px;
}
.cal-day:hover { background: rgba(201,169,110,.1); }
.cal-day.today { background: var(--gold); color: white; font-weight:600; }
.cal-day.has-event::after { content:''; width:4px; height:4px; border-radius:50%; background:var(--gold-dark); position:absolute; bottom:3px; }
.cal-day.today::after { background: white; }
.cal-day.other-month { opacity: .3; }
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }

.mn > * { animation: fadeIn .25s ease forwards; }
</style>
</head>

    <div class="login-title">Lm Estudio</div>
    <div class="login-sub">Sistema de Gestão</div>

<script>
// ═══════════════════════════════════════════════════════════
// AUTENTICAÇÃO E CONTROLE DE ACESSO
// ═══════════════════════════════════════════════════════════

// Usuários com hashes SHA-256 das senhas
// fernando → senha: lm2026admin
// vitoria  → senha: lm2026recep
const USUARIOS = {
  'fernando': {
    hash: 'e4442a71d465f5c6391ee250d3727d3dab4787cf90733a6ce81bf7a159200588',
    nome: 'Fernando',
    perfil: 'admin'
  },
  'vitoria': {
    hash: '7ba7e02943e7a7962bf258df16ad662f76ec2ab3b14933cea3e89c95338951f7',
    nome: 'Vitória',
    perfil: 'recepcao'
  }
};

// Permissões por perfil
const PERMISSOES = {
  admin: {
    verFinanceiro: true,
    verFinGeral: true,
    editarTudo: true
  },
  recepcao: {
    verFinanceiro: true,   // vê financeiro pilates (mensalidades, pagamentos)
    verFinGeral: false,    // não vê financeiro geral consolidado
    editarTudo: true
  }
};

let usuarioAtual = null;

// Hash SHA-256 simples via SubtleCrypto
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function fazerLogin(){
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const err  = document.getElementById('loginError');
  err.style.display = 'none';

  if(!user || !pass){ err.textContent='Preencha usuário e senha.'; err.style.display='block'; return; }

  // Verifica localmente primeiro (offline-friendly)
  const userData = USUARIOS[user];
  const passHash = await sha256(pass);

  // Tenta verificar no banco também
  let dbUser = null;
  try {
    const rows = await sbGet('usuarios','id');
    dbUser = rows.find(r=>r.username===user&&r.ativo);
  } catch(e){}

  // Aceita se bater local OU banco
  const localOk = userData && passHash === userData.hash;
  const dbOk = dbUser && dbUser.password_hash === passHash;

  if(!localOk && !dbOk){
    err.textContent = 'Usuário ou senha incorretos.';
    err.style.display = 'block';
    document.getElementById('loginPass').value = '';
    return;
  }

  // Define usuário atual
  usuarioAtual = {
    username: user,
    nome: dbUser?.nome_completo || userData?.nome || user,
    perfil: dbUser?.perfil || userData?.perfil || 'recepcao'
  };

  // Registra login no log
  try { await registrarLog('fez login', 'sistema', 'Acesso ao sistema'); } catch(e){}

  // Configura interface
  aplicarPermissoes();
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';

  // Injeta logo no login também
  const logoSrc = document.getElementById('loginLogo').src;
  if(!logoSrc || logoSrc===window.location.href){
    // pega do sidebar
    const sbImg = document.querySelector('.sb img');
    if(sbImg) document.getElementById('loginLogo').src = sbImg.src;
  }

  nav('home');
}

function fazerLogout(){
  if(!confirm('Sair do sistema?')) return;
  usuarioAtual = null;
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').style.display='none';
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

function aplicarPermissoes(){
  if(!usuarioAtual) return;
  const perm = PERMISSOES[usuarioAtual.perfil] || PERMISSOES.recepcao;

  // Badge no sidebar
  document.getElementById('sbAvatar').textContent = usuarioAtual.nome.slice(0,2).toUpperCase();
  document.getElementById('sbNome').textContent = usuarioAtual.nome;
  document.getElementById('sbPerfil').textContent = usuarioAtual.perfil==='admin' ? 'Administrador' : 'Recepção';

  // Oculta itens restritos
  const finBtn = document.querySelector('.ni.pilates[onclick*="p_fin"]');
  if(finBtn) finBtn.style.display = perm.verFinanceiro ? '' : 'none';

  const finGeralBtn = document.getElementById('btnFinGeral');
  const sepRel = document.getElementById('sepRelatorios');
  const logsBtn = document.getElementById('btnLogs');
  if(finGeralBtn) finGeralBtn.style.display = perm.verFinGeral ? '' : 'none';
  if(logsBtn) logsBtn.style.display = perm.verFinGeral ? '' : 'none';
  if(sepRel) sepRel.style.display = perm.verFinGeral ? '' : 'none';
}

function checarPermissao(pagina){
  if(!usuarioAtual) return false;
  const perm = PERMISSOES[usuarioAtual.perfil] || PERMISSOES.recepcao;
  if(pagina==='p_fin' && !perm.verFinanceiro) return false;
  if(pagina==='fin_geral' && !perm.verFinGeral) return false;
  if(pagina==='logs' && !perm.verFinGeral) return false;
  return true;
}

function semPermissao(){
  set('<div class="acesso-negado">'+
  '<i class="ti ti-lock"></i>'+
  '<h3>Acesso restrito</h3>'+
  '<p style="font-size:13px;color:var(--brown-light)">Esta seção é exclusiva para administradores.</p>'+
  '</div>');
}

// ── LOG DE ALTERAÇÕES ─────────────────────────────────────
async function registrarLog(acao, tabela, descricao){
  if(!usuarioAtual) return;
  try {
    await sbInsert('logs_alteracoes',{
      usuario: usuarioAtual.nome,
      perfil: usuarioAtual.perfil,
      acao, tabela, descricao
    });
  } catch(e){ console.warn('Log:', e.message); }
}

    const sbImg = document.querySelector('.sb img');
    if(sbImg) document.getElementById('loginLogo').src = sbImg.src;
  }, 100);
});

// ═══════════════════════════════════════════════════════════
// GOOGLE CALENDAR INTEGRATION
// ═══════════════════════════════════════════════════════════
const GCAL_CLIENT_ID = '640108150020-jfo20a6t15rg0dnbf168tb721o0bgv3j.apps.googleusercontent.com';
const GCAL_SCOPES = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events';

let gcalToken = null;
let gcalClient = null;

function conectarGoogle(){
  if(gcalToken){ nav('gcal'); return; }
  gcalClient = google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: GCAL_SCOPES,
    callback: async (resp) => {
      if(resp.error){ alert('Erro ao conectar: '+resp.error); return; }
      gcalToken = resp.access_token;
      // Atualiza UI
      const status = document.getElementById('gcalStatus');
      const btnAg  = document.getElementById('btnAgenda');
      if(status){
        status.className = 'gcal-connected';
        status.onclick = ()=>nav('gcal');
        document.getElementById('gcalStatusText').textContent = 'Agenda conectada ✓';
      }
      if(btnAg) btnAg.style.display = '';
      await registrarLog('conectou Google Agenda', 'sistema', 'Integração Google Calendar ativada');

      // Inicia sincronização automática
      iniciarSyncAutomatico();
      nav('gcal');
    }
  });
  gcalClient.requestAccessToken();
}

// ── SINCRONIZAÇÃO AUTOMÁTICA ──────────────────────────────
const SYNC_INTERVALO = 5 * 60 * 1000; // 5 minutos
let _syncTimer = null;
let _ultimoSync = null;

function iniciarSyncAutomatico(){
  if(_syncTimer) clearInterval(_syncTimer);
  _syncTimer = setInterval(syncAgendaBackground, SYNC_INTERVALO);
  // Também renova o token antes de expirar (tokens OAuth duram 1h)
  setTimeout(renovarToken, 55 * 60 * 1000);
  console.log('Sync automático iniciado — a cada 5 minutos');
  atualizarIndicadorSync('ok');
}

function pararSyncAutomatico(){
  if(_syncTimer){ clearInterval(_syncTimer); _syncTimer = null; }
}

async function syncAgendaBackground(){
  if(!gcalToken) return;
  try {
    // Atualiza silenciosamente — só recarrega se estiver na tela da agenda
    if(pg === 'gcal'){
      await carregarSemana(gcalViewDate);
    }
    // Atualiza grade de aulas se estiver nela
    if(pg === 'p_agenda'){
      await rPAgenda();
    }
    _ultimoSync = new Date();
    atualizarIndicadorSync('ok');
    console.log('Sync automático concluído:', _ultimoSync.toLocaleTimeString('pt-BR'));
  } catch(e){
    console.warn('Sync falhou:', e.message);
    atualizarIndicadorSync('erro');
    // Se token expirou, para o sync e pede reconexão
    if(e.message.includes('expirado') || e.message.includes('401')){
      pararSyncAutomatico();
      gcalToken = null;
      atualizarIndicadorSync('desconectado');
    }
  }
}

function renovarToken(){
  if(!gcalClient || !gcalToken) return;
  try {
    gcalClient.requestAccessToken({prompt:''});
    console.log('Token renovado');
  } catch(e){ console.warn('Renovação falhou:', e.message); }
}

function atualizarIndicadorSync(estado){
  const el = document.getElementById('gcalStatusText');
  const dot = document.getElementById('gcalSyncDot');
  if(!el) return;
  const agora = _ultimoSync ? _ultimoSync.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
  if(estado==='ok'){
    el.innerHTML = 'Agenda conectada ✓'+(agora?' <span style="font-size:9px;opacity:.7">'+agora+'</span>':'');
    if(dot) dot.style.background = '#3D5C3A';
  } else if(estado==='sincronizando'){
    el.innerHTML = 'Sincronizando… <span style="font-size:9px;opacity:.7">⏳</span>';
  } else if(estado==='erro'){
    el.innerHTML = 'Falha no sync <span style="font-size:9px;opacity:.7">⚠</span>';
    if(dot) dot.style.background = '#B8924A';
  } else if(estado==='desconectado'){
    el.innerHTML = 'Reconectar agenda';
    if(dot) dot.style.background = '#8B2E1A';
  }
}

async function gcalRequest(url){
  if(!gcalToken) throw new Error('Não autenticado');
  const r = await fetch(url, { headers:{ Authorization:'Bearer '+gcalToken } });
  if(r.status===401){ gcalToken=null; throw new Error('Token expirado — reconecte'); }
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function gcalPost(url, body){
  if(!gcalToken) throw new Error('Não autenticado');
  const r = await fetch(url, {
    method:'POST',
    headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

// Busca calendários do usuário
async function gcalListCalendars(){
  const d = await gcalRequest('https://www.googleapis.com/calendar/v3/users/me/calendarList');
  return d.items||[];
}

// Busca eventos de um período
async function gcalListEvents(calId='primary', timeMin, timeMax){
  const min = timeMin || new Date(new Date().setHours(0,0,0,0)).toISOString();
  const max = timeMax || new Date(new Date().setDate(new Date().getDate()+30)).toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events`+
    `?timeMin=${min}&timeMax=${max}&singleEvents=true&orderBy=startTime&maxResults=100`;
  const d = await gcalRequest(url);
  return d.items||[];
}

// Cria evento no Google Agenda
async function gcalCreateEvent(calId='primary', event){
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events`;
  return gcalPost(url, event);
}

async function carregarSemana(refDate){
  // Calcula Seg–Dom da semana de refDate
  const d = new Date(refDate);
  const dow = d.getDay(); // 0=dom
  const seg = new Date(d); seg.setDate(d.getDate() - (dow===0?6:dow-1)); seg.setHours(0,0,0,0);
  const dom = new Date(seg); dom.setDate(seg.getDate()+6); dom.setHours(23,59,59,0);
  gcalViewDate = seg;

  // Busca eventos da semana em todos os calendários visíveis
  const promises = gcalCals
    .filter(c=>c.selected!==false)
    .map(c=>gcalListEvents(c.id, seg.toISOString(), dom.toISOString())
      .then(evs=>evs.map(e=>({...e,_calColor:c.backgroundColor||'#4285F4',_calId:c.id})))
      .catch(()=>[])
    );
  const resultados = await Promise.all(promises);
  gcalEvents = resultados.flat().sort((a,b)=>{
    const ta = a.start?.dateTime||a.start?.date||'';
    const tb = b.start?.dateTime||b.start?.date||'';
    return ta.localeCompare(tb);
  });

  renderSemana(seg, dom);
}

function renderSemana(seg, dom){
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diasNomes = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const mesesNomes = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  // Dias da semana (Seg a Dom)
  const dias = Array.from({length:7},(_,i)=>{ const d=new Date(seg); d.setDate(seg.getDate()+i); return d; });

  // Horas a mostrar: 5h às 22h
  const HORAS_GRID = Array.from({length:18},(_,i)=>i+5);

  // Posição vertical: 1 hora = 60px
  const PX_HORA = 60;

  // Agrupa eventos por dia
  const porDia = {};
  dias.forEach(d=>porDia[d.toDateString()]=[]);
  gcalEvents.forEach(ev=>{
    const s = ev.start?.dateTime||ev.start?.date;
    if(!s) return;
    const d = new Date(s);
    const key = d.toDateString();
    if(porDia[key]) porDia[key].push(ev);
  });

  // Cor do evento
  function corEv(ev){
    const gcalCores = {'1':'#a4bdfc','2':'#7ae7bf','3':'#dbadff','4':'#ff887c','5':'#fbd75b','6':'#ffb878','7':'#46d6db','8':'#e1e1e1','9':'#5484ed','10':'#51b749','11':'#dc2127'};
    if(ev.colorId && gcalCores[ev.colorId]) return gcalCores[ev.colorId];
    return ev._calColor||'#4285F4';
  }

  // Renderiza bloco de evento
  // Detecta conflitos e calcula colunas para cada evento do dia
  function calcularColunas(evsDia){
    // Ordena por início
    const evs = evsDia.filter(ev=>ev.start?.dateTime).map(ev=>({
      ev,
      start: new Date(ev.start.dateTime).getTime(),
      end:   new Date(ev.end?.dateTime||ev.start.dateTime).getTime()
    })).sort((a,b)=>a.start-b.start);

    const colunas = []; // cada coluna é um array de slots ocupados

    evs.forEach(item=>{
      // Acha a primeira coluna onde não há conflito
      let col = colunas.findIndex(c=>!c.some(o=>item.start < o.end && item.end > o.start));
      if(col===-1){ colunas.push([]); col=colunas.length-1; }
      colunas[col].push(item);
      item.col = col;
    });

    const total = colunas.length||1;
    evs.forEach(item=>item.totalCols=total);
    return evs;
  }

  function blocoEvento(item){
    const ev = item.ev||item; // suporta tanto o objeto wrapped quanto direto
    const sRaw = ev.start?.dateTime||ev.start?.date;
    const eRaw = ev.end?.dateTime||ev.end?.date;
    const allDay = !ev.start?.dateTime;
    if(allDay) return '';

    const start = new Date(sRaw);
    const end   = new Date(eRaw);
    const top   = (start.getHours() + start.getMinutes()/60 - HORAS_GRID[0]) * PX_HORA;
    const dur   = (end - start) / 3600000;
    const h     = Math.max(dur * PX_HORA, 22);
    const cor   = corEv(ev);
    const horaStr = start.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const evIdx = gcalEvents.indexOf(ev);

    // Posição horizontal baseada em coluna
    const col       = item.col||0;
    const totalCols = item.totalCols||1;
    const pctW = 100/totalCols;
    const left = col * pctW;
    const width = pctW - 1; // 1% de gap entre colunas

    return `<div onclick="abrirEditarEvento(${evIdx})" style="
      position:absolute;
      top:${top}px;
      left:calc(${left}% + 2px);
      width:calc(${width}% - 4px);
      height:${h}px;
      background:${cor}22;
      border-left:3px solid ${cor};
      border-radius:6px;
      padding:3px 6px;
      cursor:pointer;
      overflow:hidden;
      transition:all .15s;
      box-shadow:0 1px 4px rgba(0,0,0,.08);
      z-index:2;
    " onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.2)';this.style.zIndex=10"
       onmouseout="this.style.boxShadow='0 1px 4px rgba(0,0,0,.08)';this.style.zIndex=2">
      <div style="font-size:10px;font-weight:600;color:${cor};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ev.summary||'(sem título)'}</div>
      ${h>28?`<div style="font-size:9px;color:${cor}bb">${horaStr}</div>`:''}
    </div>`;
  }

  // Semana anterior / próxima
  const segAnterior = new Date(seg); segAnterior.setDate(seg.getDate()-7);
  const segProxima  = new Date(seg); segProxima.setDate(seg.getDate()+7);

  // Header da semana
  const mesLabel = seg.getMonth()===dom.getMonth()
    ? `${diasNomes[seg.getDay()]} ${seg.getDate()} – ${diasNomes[dom.getDay()]} ${dom.getDate()} de ${['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][seg.getMonth()]} ${seg.getFullYear()}`
    : `${seg.getDate()} ${mesesNomes[seg.getMonth()]} – ${dom.getDate()} ${mesesNomes[dom.getMonth()]} ${dom.getFullYear()}`;

  // Seletor de calendários
  const calOpts = gcalCals.map(c=>`<option value="${c.id}" ${c.id===gcalSelectedCal?'selected':''}>${c.summary}</option>`).join('');

  let html =
    '<div class="pt">Google Agenda</div>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">'+
    '<button class="btn btns" onclick="gcalViewDate=new Date();carregarSemana(new Date())"><i class="ti ti-calendar"></i> Hoje</button>'+
    '<button class="btn btns" onclick="carregarSemana(new Date('+segAnterior.getTime()+'))"><i class="ti ti-chevron-left"></i></button>'+
    '<button class="btn btns" onclick="carregarSemana(new Date('+segProxima.getTime()+'))"><i class="ti ti-chevron-right"></i></button>'+
    '<span style="font-size:14px;font-weight:600;color:var(--brown)">'+mesLabel+'</span>'+
    '<div style="margin-left:auto;display:flex;gap:8px">'+
    '<select class="sel" style="font-size:12px" onchange="gcalSelectedCal=this.value;carregarSemana(gcalViewDate)">'+calOpts+'</select>'+
    '<button class="btn btns" onclick="syncAgendaBackground();carregarSemana(gcalViewDate)"><i class="ti ti-refresh"></i> Atualizar</button>'+
    '<button class="btn btnb" onclick="abrirNovoEvento()"><i class="ti ti-plus"></i> Novo evento</button>'+
    '</div></div>'+

    // Grade semanal
    '<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;box-shadow:var(--shadow-sm)">'+

    // Header dos dias
    '<div style="display:grid;grid-template-columns:50px repeat(7,1fr);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:20">'+
    '<div style="border-right:1px solid var(--border)"></div>'+
    dias.map(d=>{
      const isHoje = d.toDateString()===hoje.toDateString();
      const nomeDia = diasNomes[d.getDay()];
      const numDia = d.getDate();
      return `<div style="text-align:center;padding:10px 4px;border-right:1px solid var(--border)">
        <div style="font-size:10px;color:var(--brown-light);font-weight:600;text-transform:uppercase;letter-spacing:.06em">${nomeDia}</div>
        <div style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:4px auto 0;
          ${isHoje?'background:var(--gold);color:white;font-weight:700;':'color:var(--brown);'}font-size:15px;font-weight:${isHoje?700:400}">${numDia}</div>
      </div>`;
    }).join('')+
    '</div>'+

    // Grid de horas
    '<div style="display:grid;grid-template-columns:50px repeat(7,1fr);position:relative">'+

    // Coluna de horas
    '<div style="border-right:1px solid var(--border)">'+
    HORAS_GRID.map(h=>`<div style="height:${PX_HORA}px;border-bottom:1px solid rgba(201,169,110,.08);display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 6px 0 0">
      <span style="font-size:10px;color:var(--brown-light)">${String(h).padStart(2,'0')}:00</span></div>`).join('')+
    '</div>'+

    // Colunas dos dias
    dias.map(d=>{
      const evsDia = porDia[d.toDateString()]||[];
      const isHoje = d.toDateString()===hoje.toDateString();
      const evsComColunas = calcularColunas(evsDia);
      // Eventos dia-inteiro ficam acima (ignorados no grid)
      const evsDiaInteiro = evsDia.filter(ev=>!ev.start?.dateTime);
      return `<div style="border-right:1px solid var(--border);position:relative;${isHoje?'background:rgba(201,169,110,.03)':''}">
        ${HORAS_GRID.map(h=>`<div style="height:${PX_HORA}px;border-bottom:1px solid rgba(201,169,110,.08)" onclick="abrirNovoEventoHora(${d.getFullYear()},${d.getMonth()},${d.getDate()},${h})"></div>`).join('')}
        ${evsComColunas.map(item=>blocoEvento(item)).join('')}
      </div>`;
    }).join('')+
    '</div></div>';

  set(html);

  // Linha do horário atual
  setTimeout(()=>{
    const agora = new Date();
    const top = (agora.getHours() + agora.getMinutes()/60 - HORAS_GRID[0]) * PX_HORA;
    // Injeta linha vermelha na coluna de hoje
    const cols = document.querySelectorAll('[style*="border-right:1px solid var(--border);position:relative"]');
    const diaHojeIdx = dias.findIndex(d=>d.toDateString()===hoje.toDateString());
    if(diaHojeIdx>=0 && cols[diaHojeIdx]){
      const linha = document.createElement('div');
      linha.style.cssText = `position:absolute;top:${top}px;left:0;right:0;height:2px;background:#EA4335;z-index:15;pointer-events:none`;
      const circulo = document.createElement('div');
      circulo.style.cssText = 'position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#EA4335';
      linha.appendChild(circulo);
      cols[diaHojeIdx].appendChild(linha);
    }
  }, 100);
}

function abrirEditarEvento(idx){
  const ev = gcalEvents[idx];
  if(!ev) return;
  window._evEditando = ev;
  window._evEditIdx = idx;

  const sRaw = ev.start?.dateTime||ev.start?.date||'';
  const eRaw = ev.end?.dateTime||ev.end?.date||'';
  const allDay = !ev.start?.dateTime;

  function toLocal(iso){
    if(!iso) return '';
    const d = new Date(iso);
    const pad = n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  const isRecorrente = !!(ev.recurrence || ev.recurringEventId);
  const cor = ev._calColor||'#4285F4';

  abrirModal(
    `<div class="mdt"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${cor};margin-right:8px;vertical-align:middle"></span>Editar evento</div>`+
    '<label class="fl">Título *</label><input class="fi" id="ev_titulo" value="'+((ev.summary||'').replace(/"/g,'&quot;'))+'">'+
    '<div class="fr2"><div><label class="fl">Início</label><input class="fi" id="ev_inicio" type="datetime-local" value="'+toLocal(sRaw)+'"></div>'+
    '<div><label class="fl">Fim</label><input class="fi" id="ev_fim" type="datetime-local" value="'+toLocal(eRaw)+'"></div></div>'+
    '<label class="fl">Local</label><input class="fi" id="ev_local" value="'+(ev.location||'')+'">'+
    '<label class="fl">Descrição</label><textarea class="fi" id="ev_desc" rows="2" style="resize:vertical">'+(ev.description||'')+'</textarea>'+

    // Seletor de escopo para eventos recorrentes
    (isRecorrente?
      '<label class="fl" style="margin-top:4px">Aplicar alteração em</label>'+
      '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">'+
      '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--brown)">'+
        '<input type="radio" name="ev_escopo" value="this" checked style="accent-color:var(--gold)">'+
        '<span><strong>Somente este evento</strong> <span style="color:var(--brown-light);font-size:11px">— altera apenas esta data</span></span></label>'+
      '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--brown)">'+
        '<input type="radio" name="ev_escopo" value="following" style="accent-color:var(--gold)">'+
        '<span><strong>Este e os seguintes</strong> <span style="color:var(--brown-light);font-size:11px">— a partir desta data em diante</span></span></label>'+
      '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--brown)">'+
        '<input type="radio" name="ev_escopo" value="all" style="accent-color:var(--gold)">'+
        '<span><strong>Todos os eventos</strong> <span style="color:var(--brown-light);font-size:11px">— toda a série recorrente</span></span></label>'+
      '</div>'
    :'')+

    '<div class="mdf">'+
    '<button class="btn" style="color:#8B2E1A;border-color:rgba(139,46,26,.3)" onclick="excluirEvento()"><i class="ti ti-trash"></i> Excluir</button>'+
    '<button class="btn" onclick="fecharModal()">Cancelar</button>'+
    '<button class="btn btnb" id="ev_btn" onclick="atualizarEvento()"><i class="ti ti-check"></i> Salvar</button>'+
    '</div>'
  );
}

async function atualizarEvento(){
  const ev  = window._evEditando;
  if(!ev) return;
  const btn = document.getElementById('ev_btn');
  btn.disabled=true; btn.textContent='Salvando…';

  const titulo = document.getElementById('ev_titulo').value.trim();
  const inicio = document.getElementById('ev_inicio').value;
  const fim    = document.getElementById('ev_fim').value;
  const escopo = document.querySelector('input[name="ev_escopo"]:checked')?.value || 'this';

  const isRecorrente = !!(ev.recurrence || ev.recurringEventId);
  const calId = ev._calId||'primary';
  const baseId = ev.recurringEventId || ev.id; // ID da série mãe

  const body = {
    summary:     titulo,
    location:    document.getElementById('ev_local').value||undefined,
    description: document.getElementById('ev_desc').value||undefined,
    start: { dateTime: new Date(inicio).toISOString(), timeZone:'America/Sao_Paulo' },
    end:   { dateTime: new Date(fim||inicio).toISOString(), timeZone:'America/Sao_Paulo' },
  };

  try {
    if(!isRecorrente || escopo==='this'){
      // Edita só esta ocorrência
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${ev.id}`,{
        method:'PATCH',
        headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });

    } else if(escopo==='following'){
      // "Este e os seguintes": trunca a série no dia anterior e cria nova série a partir daqui
      // 1. Busca o evento mãe
      const maeR = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        headers:{ Authorization:'Bearer '+gcalToken }
      });
      const mae = await maeR.json();

      // 2. Trunca a série mãe: define UNTIL = 1 dia antes desta ocorrência
      const diaAntes = new Date(ev.start?.dateTime||ev.start?.date);
      diaAntes.setDate(diaAntes.getDate()-1);
      const until = diaAntes.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
      const recOld = (mae.recurrence||[]).map(r=>
        r.startsWith('RRULE:') ? r.replace(/UNTIL=[^;]*(;|$)/,'').replace(/COUNT=[^;]*(;|$)/,'')+'UNTIL='+until : r
      );
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        method:'PATCH',
        headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
        body: JSON.stringify({recurrence: recOld})
      });

      // 3. Cria nova série com os dados editados a partir desta data
      const novoEvento = {
        ...body,
        recurrence: mae.recurrence||['RRULE:FREQ=WEEKLY']
      };
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events`,{
        method:'POST',
        headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
        body: JSON.stringify(novoEvento)
      });

    } else if(escopo==='all'){
      // Edita a série inteira (evento mãe)
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        method:'PATCH',
        headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });
    }

    const escopoLabel = escopo==='this'?'esta ocorrência':escopo==='following'?'este e seguintes':'toda a série';
    await registrarLog('editou evento', 'google_agenda', titulo+' ('+escopoLabel+') em '+new Date(inicio).toLocaleDateString('pt-BR'));
    fecharModal();
    carregarSemana(gcalViewDate);
  } catch(e){
    btn.disabled=false; btn.textContent='Salvar';
    alert('Erro ao salvar: '+e.message);
  }
}

async function excluirEvento(){
  const ev = window._evEditando;
  if(!ev) return;
  const isRecorrente = !!(ev.recurrence || ev.recurringEventId);
  const calId = ev._calId||'primary';
  const baseId = ev.recurringEventId || ev.id;

  // Para recorrentes, pergunta o escopo
  let escopo = 'this';
  if(isRecorrente){
    const opcao = await new Promise(resolve=>{
      abrirModal(
        '<div class="mdt" style="color:#8B2E1A"><i class="ti ti-trash" style="margin-right:8px"></i>Excluir evento recorrente</div>'+
        '<div style="font-size:13px;color:var(--brown);margin-bottom:16px">Como deseja excluir <strong>"'+ev.summary+'"</strong>?</div>'+
        '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">'+
        '<button class="btn" style="text-align:left;padding:10px 14px" onclick="window._excluirEscopo=\'this\';fecharModal()">'+
          '<strong>Somente este evento</strong><div style="font-size:11px;color:var(--brown-light)">Remove apenas esta data</div></button>'+
        '<button class="btn" style="text-align:left;padding:10px 14px" onclick="window._excluirEscopo=\'following\';fecharModal()">'+
          '<strong>Este e os seguintes</strong><div style="font-size:11px;color:var(--brown-light)">Remove desta data em diante</div></button>'+
        '<button class="btn" style="text-align:left;padding:10px 14px" onclick="window._excluirEscopo=\'all\';fecharModal()">'+
          '<strong>Todos os eventos</strong><div style="font-size:11px;color:var(--brown-light)">Remove toda a série</div></button>'+
        '</div>'+
        '<div class="mdf"><button class="btn" onclick="window._excluirEscopo=\'cancel\';fecharModal()">Cancelar</button></div>'
      );
      // Aguarda fechamento do modal
      const check = setInterval(()=>{
        if(document.getElementById('ovlbg').style.display==='none'){
          clearInterval(check);
          resolve(window._excluirEscopo||'cancel');
        }
      }, 100);
    });
    if(opcao==='cancel') return;
    escopo = opcao;
  } else {
    if(!confirm('Excluir "'+ev.summary+'"?')) return;
  }

  try {
    if(escopo==='this'){
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${ev.id}`,{
        method:'DELETE', headers:{ Authorization:'Bearer '+gcalToken }
      });
    } else if(escopo==='following'){
      // Trunca a série no dia anterior
      const maeR = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        headers:{ Authorization:'Bearer '+gcalToken }
      });
      const mae = await maeR.json();
      const diaAntes = new Date(ev.start?.dateTime||ev.start?.date);
      diaAntes.setDate(diaAntes.getDate()-1);
      const until = diaAntes.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
      const recOld = (mae.recurrence||[]).map(r=>
        r.startsWith('RRULE:') ? r.replace(/UNTIL=[^;]*(;|$)/,'').replace(/COUNT=[^;]*(;|$)/,'')+'UNTIL='+until : r
      );
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        method:'PATCH',
        headers:{ Authorization:'Bearer '+gcalToken, 'Content-Type':'application/json' },
        body: JSON.stringify({recurrence: recOld})
      });
    } else if(escopo==='all'){
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${baseId}`,{
        method:'DELETE', headers:{ Authorization:'Bearer '+gcalToken }
      });
    }

    const escopoLabel = escopo==='this'?'esta ocorrência':escopo==='following'?'este e seguintes':'toda a série';
    await registrarLog('excluiu evento', 'google_agenda', ev.summary+' ('+escopoLabel+')');
    fecharModal();
    carregarSemana(gcalViewDate);
  } catch(e){ alert('Erro ao excluir: '+e.message); }
}

async function salvarEvento(){
  const titulo = document.getElementById('ev_titulo').value.trim();
  if(!titulo){ alert('Informe o título.'); return; }
  const btn = document.getElementById('ev_btn');
  btn.disabled=true; btn.textContent='Criando…';
  const inicio = document.getElementById('ev_inicio').value;
  const fim    = document.getElementById('ev_fim').value;
  const calId  = document.getElementById('ev_cal')?.value||'primary';
  const evento = {
    summary: titulo,
    location: document.getElementById('ev_local').value||undefined,
    description: document.getElementById('ev_desc').value||undefined,
    start: { dateTime: new Date(inicio).toISOString(), timeZone:'America/Sao_Paulo' },
    end:   { dateTime: new Date(fim||inicio).toISOString(), timeZone:'America/Sao_Paulo' },
  };
  try {
    await gcalCreateEvent(calId, evento);
    await registrarLog('criou evento', 'google_agenda', titulo+' em '+new Date(inicio).toLocaleDateString('pt-BR'));
    fecharModal();
    carregarSemana(gcalViewDate);
  } catch(e){
    btn.disabled=false; btn.textContent='Criar';
    alert('Erro: '+e.message);
  }
}

const DIAS=['Seg','Ter','Qua','Qui','Sex','Sáb'];
const HORAS=['07H','08H','09H','10H','15H','16H','17H','18H','19H'];
const CAP=4;
const SL_STATUS={'A':'Ativo','P':'Prospect','E':'Experimental','AV':'Avulso','PA':'Pausado'};

function buildGrade(){
  const g={};
  DIAS.forEach(d=>HORAS.forEach(h=>g[d+'-'+h]=[]));
  AL.filter(a=>a.s==='A').forEach(a=>{
    if(!a.h||a.h==='-'||a.h==='—') return;
    a.h.split(',').forEach(p=>{
      const m=p.trim().match(/^(SEG|TER|QUA|QUI|SEX|SAB)\s+(\d+H)/i);
      if(!m) return;
      const dm={SEG:'Seg',TER:'Ter',QUA:'Qua',QUI:'Qui',SEX:'Sex',SAB:'Sáb'};
      const k=dm[m[1].toUpperCase()]+'-'+m[2].toUpperCase();
      if(g[k]) g[k].push(a.n.split(' ').slice(0,2).map((w,i)=>i?w[0]+'.':w).join(' '));
    });
  });
  return g;
}
const GD=buildGrade();

function avcls(id){return 'a'+(Math.abs(parseInt(id)||0)%5);}
function ini(n){return (n||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');}
function sbadge(s){return '<span class="bdg '+(SL_BADGE[s]||'bx')+'">'+(SL_STATUS[s]||s)+'</span>';}
function fR(v){return v!=null?'R$ '+parseFloat(v).toFixed(2).replace('.',','):'—';}
function qtdN(q){if(typeof q==='number')return q;const m=String(q||0).match(/\d+/g);return m?m.reduce((s,n)=>s+parseInt(n),0):0;}
function marcaBdg(m){
  const mp={'Rosa Imperial':'bpk','Camomila':'ba','Mnovo':'bb','Mantig':'bx','ALAD Amanda':'bg','Lm':'bx'};
  const k=Object.keys(mp).find(k=>m&&m.toLowerCase().includes(k.toLowerCase()));
  return k?mp[k]:'bx';
}

// Timeout helper — aborta se demorar mais de 6 segundos
function fetchWithTimeout(url, opts={}, ms=6000){
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, {...opts, signal:ctrl.signal}).finally(()=>clearTimeout(tid));
}

async function sbGet(table, order='id'){
  const r = await fetchWithTimeout(`${SB_URL}/rest/v1/${table}?order=${order}`, {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

    method:'POST',

}

  const now = new Date();

  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

async function pausarAluno(){
  const a = window._alunoAtual;
  if(!a) return;

  // Se Google conectado, busca eventos futuros com o nome do aluno
  let eventosFuturos = [];
  const primeiroNome = a.n.split(' ')[0].toLowerCase();

  if(gcalToken){
    try {
      const hoje = new Date(); hoje.setHours(0,0,0,0);
      const fim  = new Date(hoje); fim.setMonth(fim.getMonth()+3);
      // Busca em todos os calendários visíveis
      const promises = gcalCals.filter(c=>c.selected!==false).map(c=>
        gcalListEvents(c.id, hoje.toISOString(), fim.toISOString())
          .then(evs=>evs.map(e=>({...e,_calId:c.id,_calNome:c.summary})))
          .catch(()=>[])
      );
      const todos = (await Promise.all(promises)).flat();
      // Filtra eventos que contêm o primeiro nome do aluno (case insensitive)
      eventosFuturos = todos.filter(e=>(e.summary||'').toLowerCase().includes(primeiroNome));
    } catch(err){ console.warn('Busca agenda:', err.message); }
  }

  // Monta o modal com aviso + eventos encontrados
  const temEventos = eventosFuturos.length > 0;

  function fmtEvento(ev){
    const s = ev.start?.dateTime||ev.start?.date||'';
    const d = s ? new Date(s) : null;
    const dataStr = d ? d.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'})+
      (ev.start?.dateTime?' · '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'') : '—';
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500;color:var(--brown)">${ev.summary}</div>
        <div style="font-size:11px;color:var(--brown-light)">${dataStr} · ${ev._calNome}</div>
      </div>
      <a href="https://calendar.google.com/calendar/r/eventedit/${ev.id}" target="_blank"
        style="font-size:11px;color:#4285F4;text-decoration:none;white-space:nowrap">
        <i class="ti ti-external-link"></i> Editar
      </a>
    </div>`;
  }

  abrirModal(
    '<div class="mdt"><i class="ti ti-pause-circle" style="color:var(--gold-dark);margin-right:8px"></i>Pausar aluno — '+a.n.split(' ')[0]+'</div>'+

    '<div style="background:rgba(184,146,74,.08);border:1px solid rgba(184,146,74,.25);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--brown)">'+
    '<strong>'+a.n+'</strong> será marcado como pausado e sairá dos financeiros e métricas do sistema.</div>'+

    '<label class="fl">Motivo da pausa (opcional)</label>'+
    '<input class="fi" id="pause_motivo" placeholder="Ex: Viagem, problema de saúde, férias…">'+

    (temEventos?
      '<div style="margin-bottom:8px">'+
      '<div style="font-size:11px;font-weight:600;color:#4285F4;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
      '<i class="ti ti-calendar-event"></i> '+eventosFuturos.length+' evento(s) futuros encontrados na agenda</div>'+
      '<div style="font-size:12px;color:var(--brown-light);margin-bottom:10px">Clique em "Editar" para abrir o evento no Google e remover o nome manualmente:</div>'+
      '<div style="max-height:220px;overflow-y:auto;padding-right:4px">'+
      eventosFuturos.map(fmtEvento).join('')+
      '</div>'+
      '<div style="font-size:11px;color:var(--brown-light);margin-top:10px;padding:8px;background:rgba(66,133,244,.06);border-radius:8px">'+
      '<i class="ti ti-info-circle"></i> Os eventos não são alterados automaticamente. Edite cada um no Google Agenda para remover o nome da pessoa.'+
      '</div></div>'
    :
      gcalToken?
      '<div style="font-size:12px;color:var(--brown-light);margin-bottom:12px"><i class="ti ti-calendar-check"></i> Nenhum evento futuro encontrado com o nome desta pessoa na agenda.</div>'
      :
      '<div style="font-size:12px;color:var(--brown-light);margin-bottom:12px"><i class="ti ti-calendar-off"></i> Conecte o Google Agenda para ver os eventos futuros desta pessoa.</div>'
    )+

    '<div class="mdf">'+
    '<button class="btn" onclick="fecharModal()">Cancelar</button>'+
    '<button class="btn" style="color:var(--gold-dark);border-color:rgba(184,146,74,.4)" id="pause_btn" onclick="confirmarPausa()">'+
    '<i class="ti ti-pause-circle"></i> Confirmar pausa</button>'+
    '</div>'
  );

  // Guarda eventos para referência
  window._eventosPausa = eventosFuturos;
}

async function confirmarPausa(){
  const a = window._alunoAtual;
  if(!a) return;
  const motivo = document.getElementById('pause_motivo')?.value||'';
  const btn = document.getElementById('pause_btn');
  btn.disabled=true; btn.textContent='Pausando…';
  try {
    await garantirAlunoBanco(a);
    const r = await fetchWithTimeout(
      `${SB_URL}/rest/v1/alunos?nome=eq.${encodeURIComponent(a.n)}&limit=1`,
      { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
    );
    const lista = await r.json();
    const pac = lista[0];
    if(pac) await sbUpdate('alunos', pac.id, {status:'PA'});
    a.s = 'PA';
    atualizarCacheAluno(a.n, {s:'PA'});
    await registrarLog('pausou aluno','alunos', a.n+(motivo?' — '+motivo:''));
    fecharModal();
    verAlunoDetalhe(a);
  } catch(e){ btn.disabled=false; btn.textContent='Confirmar pausa'; alert('Erro: '+e.message); }
}

async function reativarAluno(){
  const a = window._alunoAtual;
  if(!a) return;
  if(!confirm('Reativar '+a.n+'?')) return;
  try {
    const r = await fetchWithTimeout(
      `${SB_URL}/rest/v1/alunos?nome=eq.${encodeURIComponent(a.n)}&limit=1`,
      { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
    );
    const lista = await r.json();

}

// Atualiza aluno no cache local por nome
function atualizarCacheAluno(nome, dados){
  [AL, window._alunosDB||[]].forEach(lista=>{
    const a = lista.find(x=>x.n===nome);
    if(a) Object.assign(a, dados);
  });
}

// Garante que o aluno existe no banco (insere se necessário)
async function garantirAlunoBanco(a){
  const r = await fetchWithTimeout(
    `${SB_URL}/rest/v1/alunos?nome=eq.${encodeURIComponent(a.n)}&limit=1`,
    { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
  );
  const lista = await r.json();
  if(!lista[0]){
    await sbInsert('alunos',{
      status:a.s||'A', nome:a.n, telefone:a.tel||null,
      plano:a.pl||null, horario:a.h||null, valor:parseFloat(a.v)||0,
      ultimo_pagto:a.pg||null, prox_vencto:a.px||null,
    });
  }
}

async function converterAtivoObj(){
  const a = window._alunoAtual;
  if(!a) return;
  if(!confirm('Converter '+a.n+' para Ativo?')) return;
  try {
    if(a.id && typeof a.id==='number' && a.id>1000){
      await sbUpdate('alunos', a.id, {status:'A'});
    }
    a.s='A';
    const idx=AL.findIndex(x=>x.n===a.n); if(idx>=0) AL[idx].s='A';
    if(window._alunosDB){ const i=window._alunosDB.findIndex(x=>x.n===a.n); if(i>=0) window._alunosDB[i].s='A'; }
    verAlunoDetalhe(a);
  } catch(e){ alert('Erro: '+e.message); }
}

function renderPFin(at, pags){
  const permF = usuarioAtual ? (PERMISSOES[usuarioAtual.perfil]||PERMISSOES.recepcao) : PERMISSOES.admin;
  const rec   = at.reduce((s,a)=>s+(parseFloat(a.v)||0),0);
  const sd    = at.filter(a=>!a.px||a.px==='parceria').length;

  // Mês/ano atual
  const agora   = new Date();
  const mesAtual = agora.getMonth()+1;
  const anoAtual = agora.getFullYear();
  const mesStr   = String(mesAtual).padStart(2,'0');
  const anoStr   = String(anoAtual).slice(2);

  // Verifica se aluno já pagou neste mês
  // Critério: ultimo_pagto no formato dd/mm/aa e mês/ano batem com o atual
  function jaPagouEsteMes(a){
    if(!a.pg) return false;
    const partes = a.pg.split('/');
    if(partes.length<3) return false;
    const mm = partes[1]; const yy = partes[2];
    return mm===mesStr && yy===anoStr;
  }

  // Separa pagos e pendentes
  const pagos    = at.filter(a=>jaPagouEsteMes(a));
  const pendentes = at.filter(a=>!jaPagouEsteMes(a));

  // Ordena pendentes por vencimento mais próximo
  const pendOrdenados = pendentes.sort((a,b)=>{
    if(!a.px||a.px==='parceria') return 1;
    if(!b.px||b.px==='parceria') return -1;
    const[da,ma]=(a.px).split('/').map(Number);
    const[db,mb]=(b.px).split('/').map(Number);
    return(ma*100+da)-(mb*100+db);
  });

  set(
    '<div class="pt">Financeiro — Pilates</div>'+
    '<div class="ps">Controle de mensalidades · '+mesAtual+'/'+anoAtual+'</div>'+

    '<div class="metrics3">'+
    (permF.verFinGeral ? mc('Receita estimada/mês','vg','R$ '+rec.toLocaleString('pt-BR'),at.length+' ativos') : '')+
    mc('Pagos este mês','vg',pagos.length,'de '+at.length+' ativos')+
    mc('Pendentes','va',pendentes.length, sd>0?sd+' sem data':'')+
    '</div>'+

    // Botão registrar
    '<div class="tb"><button class="btn btnb" onclick="abrirPagPilates(null,null)">'+
    '<i class="ti ti-plus"></i> Registrar pagamento</button></div>'+

    // Últimos pagamentos registrados
    (pags&&pags.length?
    '<div style="font-size:11px;font-weight:600;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
    '<i class="ti ti-cash"></i> Últimos pagamentos registrados</div>'+
    '<div class="tw" style="margin-bottom:18px"><table><thead><tr>'+
    '<th>Aluno</th><th>Referência</th><th>Valor</th><th>Forma</th><th>Data pgto</th>'+
    '</tr></thead><tbody>'+
    pags.slice(-15).reverse().map(p=>
      '<tr style="background:rgba(22,163,74,.03)">'+
      '<td style="font-weight:500">'+p.aluno_nome+'</td>'+
      '<td style="color:var(--brown-light)">'+p.referencia+'</td>'+
      '<td style="color:#3D5C1A;font-weight:600">'+fR(p.valor)+'</td>'+
      '<td style="color:var(--brown-light)">'+p.forma_pgto+'</td>'+
      '<td style="color:var(--brown-light)">'+p.data_pgto+'</td>'+
      '</tr>'
    ).join('')+'</tbody></table></div>':'')+ 

    // Pendentes de pagamento
    '<div style="font-size:11px;font-weight:600;color:#8B2E1A;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
    '<i class="ti ti-alert-circle"></i> Pendentes este mês ('+pendentes.length+')</div>'+
    '<div class="tw" style="margin-bottom:18px"><table><thead><tr>'+
    '<th>Aluno</th><th>Plano</th><th>Último pgto</th><th>Próx. vencto</th><th>Valor</th><th></th>'+
    '</tr></thead><tbody>'+
    (pendOrdenados.length?
    pendOrdenados.map(a=>
      '<tr>'+
      '<td>'+ncell(a)+'</td>'+
      '<td style="color:var(--brown-light)">'+a.pl+'</td>'+
      '<td style="color:var(--brown-light)">'+(a.pg||'—')+'</td>'+
      '<td>'+(a.px&&a.px!=='parceria'?'<span style="color:#8B2E1A;font-weight:500">'+a.px+'</span>':'<span style="color:var(--brown-light)">'+( a.px||'—')+'</span>')+'</td>'+
      '<td style="font-weight:500">R$ '+a.v+'</td>'+
      '<td><button class="btn btns btnb" onclick="abrirPagPilates(\''+esc(a.n)+'\','+(a.v||0)+')">✓ Pago</button></td>'+
      '</tr>'
    ).join(''):
    '<tr><td colspan="6" style="text-align:center;padding:20px;color:#3D5C1A">'+
    '<i class="ti ti-circle-check" style="font-size:18px;display:block;margin-bottom:4px"></i>'+
    'Todos pagaram este mês!</td></tr>')+
    '</tbody></table></div>'+

    // Já pagaram este mês
    (pagos.length?
    '<div style="font-size:11px;font-weight:600;color:#3D5C1A;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
    '<i class="ti ti-circle-check"></i> Pagos este mês ('+pagos.length+')</div>'+
    '<div class="tw"><table><thead><tr>'+
    '<th>Aluno</th><th>Plano</th><th>Pagou em</th><th>Próx. vencto</th><th>Valor</th>'+
    '</tr></thead><tbody>'+
    pagos.map(a=>
      '<tr style="background:rgba(22,163,74,.03)">'+
      '<td>'+ncell(a)+'</td>'+
      '<td style="color:var(--brown-light)">'+a.pl+'</td>'+
      '<td style="color:#3D5C1A;font-weight:500">'+a.pg+'</td>'+
      '<td style="color:var(--brown-light)">'+(a.px||'—')+'</td>'+
      '<td style="color:var(--brown-light)">R$ '+a.v+'</td>'+
      '</tr>'
    ).join('')+'</tbody></table></div>':'')
  );
}

async function navFDash(){
  renderFDash(FISIO);
  try {
    const rows = await sbGet('pacientes_fisio','nome');
    const merged = rows.length > 0 ? rows.map(r=>({id:r.id,n:r.nome,sessoes:r.sessoes_contratadas,realizadas:r.sessoes_realizadas||0,datas:[]})) : FISIO;
    renderFDash(merged);

function renderFDash(dados){
  const total=dados.length, conc=dados.filter(p=>p.sessoes&&p.realizadas>=p.sessoes).length;
  const totalS=dados.reduce((s,p)=>s+p.realizadas,0);
  set('<div class="pt">Fisioterapia — Dashboard</div><div class="ps">Controle de sessões · <span style="color:#16a34a;font-weight:500">● banco conectado</span></div>'+
  '<div class="metrics3">'+mc('Pacientes','ve',total,'cadastrados')+mc('Sessões realizadas','ve',totalS,'total')+mc('Concluídos','vg',conc,'de '+total)+'</div>'+
  '<div class="tw"><table><thead><tr><th>Paciente</th><th>Contratadas</th><th>Realizadas</th><th>Progresso</th><th>Status</th></tr></thead><tbody>'+
  dados.map((p,i)=>{
    const pct=p.sessoes?Math.min(100,Math.round(p.realizadas/p.sessoes*100)):null;
    const ok=p.sessoes&&p.realizadas>=p.sessoes;
    return '<tr onclick="navFPacienteDetalhe('+i+','+JSON.stringify(dados).replace(/</g,'&lt;').split('').map(c=>c).join('')+')">'+
    '<td><strong>'+p.n+'</strong></td><td style="color:#666">'+(p.sessoes||'—')+'</td><td>'+p.realizadas+'</td>'+
    '<td style="min-width:120px"><div style="display:flex;align-items:center;gap:8px">'+
    (pct!=null?'<div style="flex:1;height:6px;border-radius:3px;background:#f1f0e8"><div style="width:'+pct+'%;height:100%;border-radius:3px;background:'+(ok?'#16a34a':'#059669')+'"></div></div><span style="font-size:11px;color:#666">'+pct+'%</span>':'<span style="color:#aaa;font-size:11px">livre</span>')+
    '</div></td><td><span class="bdg '+(ok?'bg':p.realizadas>0?'ba':'bx')+'">'+(ok?'Concluído':p.realizadas>0?'Em andamento':'Aguardando')+'</span></td></tr>';
  }).join('')+'</tbody></table></div>');
}

async function navFPacientes(){
  // Mostra imediatamente do cache ou local
  const cacheAtual = (window._fisioCache||FISIO).filter(p=>p.status!=='alta');
  renderFPacientes(cacheAtual);
  try {
    const rows = await sbGet('pacientes_fisio','nome');
    // Merge banco + FISIO local (sem duplicar)
    const dbNomes = new Set(rows.map(r=>r.nome));
    const merged = [
      ...rows.map(r=>({id:r.id,n:r.nome,sessoes:r.sessoes_contratadas,realizadas:r.sessoes_realizadas||0,status:r.status||'ativo',datas:[]})),
      ...FISIO.filter(p=>!dbNomes.has(p.n)).map(p=>({...p,status:'ativo'}))
    ];
    window._fisioCache = merged;
    const ativos = merged.filter(p=>p.status!=='alta');
    renderFPacientes(ativos);
  } catch(e){ console.warn('Supabase pacientes:', e.message); }
}

function renderFPacientes(dados){
  const total = (window._fisioCache||dados).length;
  const altas  = (window._fisioCache||dados).filter(p=>p.status==='alta').length;
  set(
    '<div class="pt">Pacientes</div>'+

    '<div class="tabs">'+

function verPaciente(idx){
  const cache = window._fisioListaAtual || window._fisioCache || FISIO;
  const p = cache[idx];
  if(!p) return;
  window._pacienteAtual = p;
  const ok=p.sessoes&&p.realizadas>=p.sessoes;
  const faltam=p.sessoes?Math.max(0,p.sessoes-p.realizadas):null;
  set(
    '<div class="tb"><button class="btn" onclick="navFPacientes()"><i class="ti ti-arrow-left"></i> Voltar</button></div>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+
    '<div style="width:44px;height:44px;border-radius:50%;background:rgba(74,107,46,.15);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#3D5C3A">'+
    p.n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('')+'</div>'+
    '<div><div style="font-size:15px;font-weight:500;color:var(--brown)">'+p.n+'</div></div>'+
    '<span style="margin-left:auto"><span class="bdg '+(ok?'bg':p.realizadas>0?'ba':'bx')+'">'+(ok?'Concluído':p.realizadas>0?'Em andamento':'Aguardando')+'</span></span>'+
    '</div>'+
    '<div class="dp"><h3>Sessões</h3>'+
    dr('Sessões contratadas',p.sessoes||'Sem contrato fixo')+
    dr('Sessões realizadas',p.realizadas)+
    (faltam!=null?dr('Faltam',faltam+' sessão(ões)'):'')+
    '</div>'+
    (p.datas&&p.datas.length?'<div class="dp"><h3>Datas realizadas</h3>'+
    '<div style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 0">'+
    p.datas.map(d=>'<span style="background:rgba(74,107,46,.1);color:#3D5C3A;padding:3px 8px;border-radius:6px;font-size:11px">'+(d||'—')+'</span>').join('')+
    '</div></div>':'')+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
    '<button class="btn btne" onclick="abrirRegistrarSessao(\''+esc(p.n)+'\')"><i class="ti ti-plus"></i> Registrar sessão</button>'+
    '<button class="btn" style="color:#8B2E1A;border-color:rgba(139,46,26,.3)" onclick="darAlta()"><i class="ti ti-user-check"></i> Dar alta</button>'+
    '</div>'
  );
}

async function darAlta(){
  const p = window._pacienteAtual;
  if(!p) return;
  if(!confirm('Dar alta para '+p.n+'? O paciente será movido para o relatório de altas.')) return;
  try {
    if(p.id) await sbUpdate('pacientes_fisio', p.id, {status:'alta'});
    // Atualiza cache
    if(window._fisioCache){
      const i = window._fisioCache.findIndex(x=>x.n===p.n);
      if(i>=0) window._fisioCache[i].status='alta';
    }
    await registrarLog('deu alta', 'pacientes_fisio', 'Alta: '+p.n);
    navFPacientes();
  } catch(e){ alert('Erro: '+e.message); }
}

async function navLDash(){
  window._lojaCache={v:VENDAS,e:ESTOQUE,enc:ENCOMENDAS};
  renderLDash(VENDAS, ESTOQUE, ENCOMENDAS);
  try {
    const [vRows, eRows, encRows] = await Promise.all([sbGet('vendas','criado_em'), sbGet('estoque','item'), sbGet('encomendas','criado_em')]);
    const dbVIds = new Set(vRows.map(r=>r.id));
    const allV = vRows.length > 0 ? [...vRows.map(r=>({id:r.id,item:r.item,marca:r.marca,custo:r.custo,preco:r.preco,cliente:r.cliente,data:r.data_venda||'—',pgto:r.forma_pgto||'—'})), ...VENDAS.filter(v=>!dbVIds.has(v.id))] : VENDAS;
    const dbEItems = new Set(eRows.map(r=>r.item));
    const allE = eRows.length > 0 ? [...eRows.map(r=>({item:r.item,tam:r.tamanho,qtd:r.quantidade})), ...ESTOQUE.filter(e=>!dbEItems.has(e.item))] : ESTOQUE;
    const dbEncIds = new Set(encRows.map(r=>r.id));
    const allEnc = encRows.length > 0 ? [...encRows.map(r=>({id:r.id,item:r.item,tam:r.tamanho,custo:r.custo,preco:r.preco_tabela,pgto:r.forma_pgto,vf:r.valor_final,cliente:r.cliente,data:r.data_pedido||'—'})), ...ENCOMENDAS.filter(e=>!dbEncIds.has(e.id))] : ENCOMENDAS;
    window._lojaCache={v:allV,e:allE,enc:allEnc};
    renderLDash(allV, allE, allEnc);
  } catch(e){ console.warn('Supabase loja:', e.message); }
