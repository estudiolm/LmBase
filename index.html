function renderLDash(allV, allE, allEnc){
  const totalV=allV.reduce((s,v)=>s+(parseFloat(v.preco)||0),0);
  const totalC=allV.filter(v=>v.custo).reduce((s,v)=>s+(parseFloat(v.custo)||0),0);
  const mg=totalC>0?((totalV-totalC)/totalV*100):null;
  const emEst=allE.reduce((s,e)=>s+qtdN(e.qtd),0);
  const semEst=allE.filter(e=>qtdN(e.qtd)===0).length;
  const encPend=allEnc.filter(e=>!e.vf).length;
  const porMarca={};
  allV.forEach(v=>{const m=v.marca||'Outras';porMarca[m]=(porMarca[m]||0)+(parseFloat(v.preco)||0);});
  const top=Object.entries(porMarca).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxV=top[0]?top[0][1]:1;
  set('<div class="pt">Loja — Dashboard</div><div class="ps">LmSTORE · <span style="color:#16a34a;font-weight:500">● banco conectado</span></div>'+
  '<div class="metrics">'+
  mc('Faturamento total','vp','R$ '+Math.round(totalV).toLocaleString('pt-BR'),allV.length+' itens vendidos')+
  mc('Margem estimada','vg',mg?mg.toFixed(1)+'%':'—','onde há custo')+
  mc('Em estoque','vi',emEst,semEst+' peças zeradas')+
  mc('Encomendas s/ pgto','va',encPend,'a receber')+
  '</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'+
  '<div><div style="font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Por marca</div>'+
  '<div class="dp" style="padding:12px">'+top.map(([m,v])=>
    '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>'+m+'</span><span style="font-weight:500">'+fR(v)+'</span></div>'+
    '<div class="chart-bar"><div class="chart-fill-l" style="width:'+Math.round(v/maxV*100)+'%"></div></div></div>'
  ).join('')+'</div></div>'+
  '<div><div style="font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Últimas vendas</div>'+
  '<div class="tw"><table><thead><tr><th>Item</th><th>Cliente</th><th>Valor</th></tr></thead><tbody>'+
  allV.slice(-8).reverse().map(v=>'<tr><td>'+v.item+'</td><td>'+v.cliente+'</td><td style="color:#db2777;font-weight:500">'+fR(v.preco)+'</td></tr>').join('')+
  '</tbody></table></div></div></div>');
}

async function salvarAluno(){
  const nome = document.getElementById('ca_nome').value.trim();
  if(!nome){ document.getElementById('ca_erro').style.display='block'; document.getElementById('ca_nome').focus(); return; }
  const btn = document.querySelector('#mdl .btnb');
  if(btn){ btn.disabled=true; btn.textContent='Salvando…'; }
  try {
    await sbInsert('alunos',{
      status: document.getElementById('ca_status').value,
      nome,
      telefone: document.getElementById('ca_tel').value.trim()||null,
      plano: document.getElementById('ca_plano').value,
      horario: document.getElementById('ca_h').value.trim()||null,
      valor: parseFloat(document.getElementById('ca_v').value)||0,
      ultimo_pagto: document.getElementById('ca_pg').value.trim()||null,
      prox_vencto: document.getElementById('ca_px').value.trim()||null,
    });
    await registrarLog('cadastrou aluno', 'alunos', 'Novo aluno: '+nome);
    fecharModal();
    navPAlunos();
  } catch(e){
    if(btn){ btn.disabled=false; btn.textContent='Salvar aluno'; }
    document.getElementById('ca_erro').textContent='Erro ao salvar: '+e.message;
    document.getElementById('ca_erro').style.display='block';
  }
}

// ── REGISTRAR PAGAMENTO NO BANCO ──────────────────────────
async function confirmarPagamento(){
  const aluno = document.getElementById('pg_aluno').value;
  const ref   = document.getElementById('pg_ref').value;
  const valor = parseFloat(document.getElementById('pg_val').value)||0;
  const forma = document.getElementById('pg_forma').value;
  if(!aluno||!valor){ alert('Preencha aluno e valor.'); return; }
  const btn=document.getElementById('pg_btn');
  btn.disabled=true; btn.textContent='Salvando…';

  const hoje = new Date();
  const pad  = n=>String(n).padStart(2,'0');
  const dataStr = pad(hoje.getDate())+'/'+pad(hoje.getMonth()+1)+'/'+String(hoje.getFullYear()).slice(2);

  try {
    // 1. Salva o pagamento
    await sbInsert('pagamentos',{aluno_nome:aluno,referencia:ref,valor,forma_pgto:forma,data_pgto:dataStr});

    // 2. Busca o aluno no banco (ou insere se não existir) e atualiza datas
    let novoProx = null;
    try {
      // Busca direto pelo nome exato
      const r = await fetchWithTimeout(
        `${SB_URL}/rest/v1/alunos?nome=eq.${encodeURIComponent(aluno)}&limit=1`,
        { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
      );
      let lista = await r.json();
      let pac = lista[0];

      // Se não achou no banco, insere a partir dos dados locais
      if(!pac){
        const local = (window._alunosDB||AL).find(a=>a.n===aluno);
        if(local){
          const ins = await sbInsert('alunos',{
            status: local.s||'A', nome: local.n,
            telefone: local.tel||null, plano: local.pl||null,
            horario: local.h||null, valor: parseFloat(local.v)||0,
            ultimo_pagto: local.pg||null, prox_vencto: local.px||null,
          });
          pac = ins[0];
          console.log('Aluno inserido no banco:', pac?.nome);
        }
      }

      if(pac){
        let diaVenc = 10;
        const fonteData = pac.prox_vencto || pac.ultimo_pagto;
        if(fonteData && fonteData !== 'parceria'){
          const partes = fonteData.split('/');
          if(partes.length >= 2){
            const diaParseado = parseInt(partes[0]);
            if(diaParseado > 0 && diaParseado <= 31) diaVenc = diaParseado;
          }
        }

        let mesProx, anoProx;
        if(pac.prox_vencto && pac.prox_vencto !== 'parceria'){
          const p = pac.prox_vencto.split('/');
          if(p.length >= 3){
            const mesVenc = parseInt(p[1]) - 1;
            const anoVenc = parseInt('20' + p[2]);
            const proxData = new Date(anoVenc, mesVenc + 1, 1);
            mesProx = proxData.getMonth();
            anoProx = proxData.getFullYear();
          }
        }
        if(mesProx === undefined){
          mesProx = (hoje.getMonth() + 1) % 12;
          anoProx = hoje.getMonth() === 11 ? hoje.getFullYear() + 1 : hoje.getFullYear();
        }

        const dataFinal = new Date(anoProx, mesProx, diaVenc);
        if(dataFinal.getMonth() !== mesProx) dataFinal.setDate(0);
        novoProx = pad(dataFinal.getDate())+'/'+pad(dataFinal.getMonth()+1)+'/'+String(dataFinal.getFullYear()).slice(2);

        await sbUpdate('alunos', pac.id, { ultimo_pagto: dataStr, prox_vencto: novoProx });
        console.log('Banco atualizado ✓ próx:', novoProx);
      }
    } catch(e2){ console.warn('Update aluno banco:', e2.message); }

    // 3. Atualiza cache local (AL e _alunosDB)
    const atualizarCache = (lista)=>{
      const a = lista.find(x=>x.n===aluno);
      if(a){
        a.pg = dataStr;
        if(novoProx) a.px = novoProx;
      }
    };
    atualizarCache(AL);
    if(window._alunosDB) atualizarCache(window._alunosDB);

    await registrarLog('registrou pagamento','pagamentos', aluno+' — '+fR(valor)+' ref. '+ref+' | próx: '+(novoProx||'—'));
    fecharModal();

    // 4. Recarrega a página atual com dados frescos do banco
    if(pg==='p_fin')   navPFin();
    else if(pg==='p_alunos') navPAlunos();
    else if(pg==='p_dash')   navPDash();
    else navPFin();

  } catch(e){ btn.disabled=false; btn.textContent='Confirmar'; alert('Erro: '+e.message); }
}

// ── AGENDA (grade local — usa dados em memória) ───────────
// Mapeia cor do Google Calendar para tipo
// Verde (10 = "sage", 2 = "basil") = Pilates
// Azul (1,7,9) = Fisio
// colorId null no calendário "Estudio Lm" = também Pilates
function tipoEvento(ev){
  const titulo = (ev.summary||'').toLowerCase();
  if(titulo.startsWith('fisio') || ev.colorId==='1'||ev.colorId==='7'||ev.colorId==='9') return 'fisio';
  return 'pilates';
}

// Converte horário do Google (ex: "2026-05-25T07:00:00-03:00") para chave da grade ("07H")
function horaParaChave(dateTimeStr){
  if(!dateTimeStr) return null;
  const d = new Date(dateTimeStr);
  return String(d.getHours()).padStart(2,'0')+'H';
}

// Converte dia da semana do Google para abreviação da grade
function diaParaChave(dateTimeStr){
  if(!dateTimeStr) return null;
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  return dias[new Date(dateTimeStr).getDay()];
}

// Extrai lista de nomes do título do evento
// "Ana G, Araci, Paula" → ["Ana G","Araci","Paula"]
function extrairNomes(titulo){
  return titulo
    .split(',')
    .map(n=>n.trim())
    .filter(n=>n.length>1 && !n.toLowerCase().startsWith('fisio'));
}

async function rPAgenda(){
  // Mostra grade local imediatamente
  renderGrade(GD, false);

  // Se Google conectado, tenta sincronizar
  if(!gcalToken){ return; }

  // Atualiza indicador
  const ps = document.querySelector('.ps');
  if(ps) ps.innerHTML = 'Sincronizando com Google Agenda <span style="color:var(--gold-dark)">⏳</span>';

  try {
    // Busca o calendário "Estudio Lm"
    const cals = await gcalListCalendars();
    const estudioCal = cals.find(c=>c.summary.toLowerCase().includes('estudio')||c.summary.toLowerCase().includes('estúdio')||c.summary.toLowerCase().includes('lm'));
    const calId = estudioCal ? estudioCal.id : 'primary';

    // Pega próxima semana completa (Seg a Sáb)
    const hoje = new Date();
    const seg = new Date(hoje);
    seg.setDate(hoje.getDate() - hoje.getDay() + 1); // próxima segunda
    seg.setHours(0,0,0,0);
    const sabado = new Date(seg);
    sabado.setDate(seg.getDate()+6);
    sabado.setHours(23,59,59,0);

    const eventos = await gcalListEvents(calId, seg.toISOString(), sabado.toISOString());

    // Monta grade a partir dos eventos
    const gdGoogle = {};
    DIAS.forEach(d=>HORAS.forEach(h=>gdGoogle[d+'-'+h]=[]));

    const eventosFisio = [];

    eventos.forEach(ev=>{
      const tipo = tipoEvento(ev);
      const inicio = ev.start?.dateTime||ev.start?.date;
      if(!inicio) return;

      const dia = diaParaChave(inicio);
      const hora = horaParaChave(inicio);
      if(!dia||!hora) return;

      const chaveHora = hora; // ex: "07H"
      const key = dia+'-'+chaveHora;

      if(tipo==='pilates'){
        const nomes = extrairNomes(ev.summary||'');
        if(nomes.length && gdGoogle[key]!==undefined){
          gdGoogle[key].push(...nomes);
        } else if(gdGoogle[key]!==undefined && ev.summary){
          // evento sem vírgula = nome único
          gdGoogle[key].push(ev.summary.trim());
        }
      } else if(tipo==='fisio'){
        eventosFisio.push({
          nome: (ev.summary||'').replace(/fisio\s*/i,'').trim(),
          inicio, dia, hora: chaveHora,
          titulo: ev.summary
        });
      }
    });

    // Merge: para células que a Google não cobriu, usa dados da planilha
    DIAS.forEach(d=>HORAS.forEach(h=>{
      const key=d+'-'+h;
      if(gdGoogle[key]===undefined) gdGoogle[key]=[];
      if(gdGoogle[key].length===0 && GD[key] && GD[key].length>0){
        gdGoogle[key] = [...GD[key]]; // fallback para dados da planilha
      }
    }));

    // Guarda fisio da agenda globalmente
    window._fisioAgenda = eventosFisio;

    renderGrade(gdGoogle, true, estudioCal?.summary||'Estudio Lm', eventos.length, eventosFisio.length);

  } catch(e){
    console.warn('Google Agenda erro:', e.message);
    renderGrade(GD, false);
    const ps2 = document.querySelector('.ps');
    if(ps2) ps2.innerHTML = 'Dados locais · <span style="color:#8B2E1A;font-size:11px">Google Agenda indisponível</span>';
  }
}

function renderGrade(gradeData, fromGoogle, calNome, totalEv, totalFisio){
  const fonte = fromGoogle
    ? '● Google Agenda <span style="color:var(--brown-light);font-size:11px">— '+calNome+' · '+totalEv+' eventos · '+totalFisio+' fisio</span>'
    : '● Dados da planilha <span style="color:var(--brown-light);font-size:11px">— conecte o Google para sincronizar</span>';

  let h='<div class="pt">Grade de Aulas</div>'+
  '<div class="ps">'+fonte+'</div>'+
  '<div style="display:flex;gap:14px;font-size:11px;margin-bottom:14px;flex-wrap:wrap;align-items:center">'+
  '<span style="display:flex;gap:5px;align-items:center"><span style="width:10px;height:10px;border-radius:2px;background:rgba(92,122,46,.15);border:1px solid rgba(92,122,46,.3);display:inline-block"></span>Turma cheia</span>'+
  '<span style="display:flex;gap:5px;align-items:center"><span style="width:10px;height:10px;border-radius:2px;background:rgba(201,169,110,.12);border:1px solid rgba(201,169,110,.3);display:inline-block"></span>Com vaga</span>'+
  '<span style="display:flex;gap:5px;align-items:center"><span style="width:10px;height:10px;border-radius:2px;background:var(--cream-dark);border:1px solid var(--border);display:inline-block"></span>Sem aula</span>'+
  (fromGoogle?'<button class="btn btns" style="margin-left:auto" onclick="rPAgenda()"><i class="ti ti-refresh"></i> Atualizar da agenda</button>':

  // Seção Fisio da agenda
  (fromGoogle && window._fisioAgenda && window._fisioAgenda.length ?

  : '')
  );

function verTurmaGoogle(d, hr, alunosEnc){
  const aula = JSON.parse(decodeURIComponent(alunosEnc));
  const livre = CAP - aula.length;
  abrirModal(
    '<div class="mdt">'+d+' – '+hr+'</div>'+
    '<div style="margin-bottom:12px"><span class="bdg '+(livre===0?'bg':'ba')+'">'+aula.length+'/'+CAP+' alunos</span>'+
    (livre>0?' <span style="font-size:11px;color:var(--gold-dark)">'+livre+' vaga(s) livre</span>':'')+
    (gcalToken?' <span style="font-size:10px;color:rgba(66,133,244,.8)">● Google Agenda</span>':'')+
    '</div>'+
    aula.map(nm=>'<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--brown)">'+nm+'</div>').join('')+
    (livre>0?'<div style="font-size:12px;color:var(--gold-dark);margin-top:10px"><i class="ti ti-circle-check"></i> Disponível para reposição</div>':'')+
    '<div class="mdf">'+

  );
}

function verTurma(d,hr){
  const aula=GD[d+'-'+hr]||[], livre=CAP-aula.length;
  verTurmaGoogle(d,hr,encodeURIComponent(JSON.stringify(aula)));
}

function verPaciente(idx){
  const cache=window._fisioCache||FISIO;
  const p=cache[idx];
  if(!p) return;
  const ok=p.sessoes&&p.realizadas>=p.sessoes;
  const faltam=p.sessoes?Math.max(0,p.sessoes-p.realizadas):null;
  set('<div class="tb"><button class="btn" onclick="nav(\'f_pacientes\')"><i class="ti ti-arrow-left"></i> Voltar</button></div>'+

async function rFinGeral(){
  set('<div class="pt">Financeiro Geral</div><div class="ps">Consolidado de todas as receitas — Pilates · Fisioterapia · Loja</div>'+
  '<div style="display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:10px;color:#7A5230">'+
  '<div style="width:28px;height:28px;border:3px solid #EDE0CC;border-top-color:#B8924A;border-radius:50%;animation:spin 0.8s linear infinite"></div>'+
  '<span style="font-size:12px">Consolidando dados…</span></div>');

  // Busca pagamentos do banco em paralelo com dados locais
  let pagsBanco = [];
  try { pagsBanco = await sbGet('pagamentos','criado_em'); } catch(e){}
  let vendasBanco = [];
  try { vendasBanco = await sbGet('vendas','criado_em'); } catch(e){}

  // ── PILATES ──────────────────────────────────────────────
  const ativos = AL.filter(a=>a.s==='A');
  const recMensal = ativos.reduce((s,a)=>s+(parseFloat(a.v)||0),0);
  const vMaio = ativos.filter(a=>{if(!a.px||a.px==='parceria')return false;const p=(a.px||'').split('/');return parseInt(p[1])===5;});
  const vJun  = ativos.filter(a=>{if(!a.px||a.px==='parceria')return false;const p=(a.px||'').split('/');return parseInt(p[1])===6;});
  const semData = ativos.filter(a=>!a.px||a.px==='parceria').length;

  // Distribuição por plano
  const porPlano={};
  ativos.forEach(a=>{
    const pl=(a.pl||'—').split(' ').slice(0,2).join(' ');
    if(!porPlano[pl]) porPlano[pl]={n:0,rec:0};
    porPlano[pl].n++; porPlano[pl].rec+=(parseFloat(a.v)||0);
  });
  const planosTop=Object.entries(porPlano).sort((a,b)=>b[1].rec-a[1].rec);

  // Pagamentos registrados no banco
  const pagReg = pagsBanco.length;
  const pagTotal = pagsBanco.reduce((s,p)=>s+(parseFloat(p.valor)||0),0);

  // ── FISIOTERAPIA ─────────────────────────────────────────
  const PRECO_SESSAO = 120; // valor médio estimado por sessão
  const totalSessoes = FISIO.reduce((s,p)=>s+p.realizadas,0);
  const recFisio = totalSessoes * PRECO_SESSAO;
  const pacConc = FISIO.filter(p=>p.sessoes&&p.realizadas>=p.sessoes).length;

  // ── LOJA ─────────────────────────────────────────────────
  // Mescla banco + locais
  const dbVIds = new Set(vendasBanco.map(r=>r.id));
  const todasVendas = [
    ...vendasBanco.map(r=>({item:r.item,marca:r.marca,preco:parseFloat(r.preco)||0,custo:parseFloat(r.custo)||0,data:r.data_venda})),
    ...VENDAS.filter(v=>!dbVIds.has(v.id)).map(v=>({item:v.item,marca:v.marca,preco:parseFloat(v.preco)||0,custo:parseFloat(v.custo)||0,data:v.data}))
  ];
  const recLoja = todasVendas.reduce((s,v)=>s+v.preco,0);
  const custoLoja = todasVendas.filter(v=>v.custo>0).reduce((s,v)=>s+v.custo,0);
  const margemLoja = custoLoja>0?((recLoja-custoLoja)/recLoja*100):null;

  const recEnc = ENCOMENDAS.filter(e=>e.vf).reduce((s,e)=>s+(parseFloat(e.vf)||0),0);
  const encPend = ENCOMENDAS.filter(e=>!e.vf).length;

  // Por marca
  const porMarca={};
  todasVendas.forEach(v=>{const m=v.marca||'Outras';if(!porMarca[m])porMarca[m]=0;porMarca[m]+=v.preco;});
  const marcasTop=Object.entries(porMarca).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxM=marcasTop[0]?marcasTop[0][1]:1;

  // ── TOTAL GERAL ───────────────────────────────────────────
  const totalGeral = recMensal + recFisio + recLoja + recEnc;
  const maxBar = Math.max(recMensal, recFisio, recLoja+recEnc);

  function barraH(val, max, cor){
    const pct = Math.round(val/max*100);
    return `<div style="height:8px;border-radius:4px;background:#EDE0CC;margin-top:4px"><div style="width:${pct}%;height:100%;border-radius:4px;background:${cor}"></div></div>`;
  }

  set(
  '<div class="pt">Financeiro Geral</div>'+
  '<div class="ps">Consolidado de todas as receitas — Pilates · Fisioterapia · Loja</div>'+

  // ── TOTAIS ────────────────────────────────────────────────
  '<div style="background:#FDF8F2;border:.5px solid rgba(184,146,74,.3);border-radius:14px;padding:18px;margin-bottom:16px;display:flex;align-items:center;gap:20px">'+
  '<div style="flex:1"><div style="font-size:11px;color:#7A5230;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Receita total estimada/mês</div>'+
  '<div style="font-size:32px;font-weight:700;color:#B8924A">R$ '+Math.round(recMensal+recFisio).toLocaleString('pt-BR')+'</div>'+
  '<div style="font-size:11px;color:#7A5230;margin-top:2px">Pilates + Fisioterapia (recorrente)</div></div>'+
  '<div style="text-align:right"><div style="font-size:11px;color:#7A5230;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Loja (acumulado)</div>'+
  '<div style="font-size:20px;font-weight:700;color:#7A5230">R$ '+Math.round(recLoja+recEnc).toLocaleString('pt-BR')+'</div>'+
  '<div style="font-size:11px;color:#7A5230;margin-top:2px">Vendas + encomendas recebidas</div></div>'+
  '</div>'+

  // ── 3 BLOCOS ──────────────────────────────────────────────
  '<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px">'+

  // PILATES
  '<div style="background:#FDF8F2;border:.5px solid rgba(184,146,74,.25);border-radius:12px;padding:14px">'+
  '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'+

  '<div style="font-size:13px;font-weight:600;color:#4A2E1A">Pilates</div></div>'+
  '<div style="font-size:22px;font-weight:700;color:#B8924A;margin-bottom:2px">R$ '+recMensal.toLocaleString('pt-BR')+'</div>'+
  '<div style="font-size:11px;color:#7A5230;margin-bottom:12px">estimativa mensal · '+ativos.length+' alunos ativos</div>'+
  barraH(recMensal,maxBar,'#B8924A')+
  '<div style="margin-top:12px;display:flex;flex-direction:column;gap:5px">'+
  '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7A5230">Vencem em maio</span><span style="font-weight:600;color:#4A2E1A">'+vMaio.length+' alunos</span></div>'+
  '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7A5230">Vencem em junho</span><span style="font-weight:600;color:#4A2E1A">'+vJun.length+' alunos</span></div>'+
  '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7A5230">Sem data cadastrada</span><span style="font-weight:600;color:#8B2E1A">'+semData+' alunos</span></div>'+
  (pagReg>0?'<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7A5230">Pgtos registrados</span><span style="font-weight:600;color:#3D5C1A">'+pagReg+' · R$ '+Math.round(pagTotal).toLocaleString('pt-BR')+'</span></div>':'')+
  '</div></div>'+

  // FISIOTERAPIA
  '<div style="background:#FDF8F2;border:.5px solid rgba(184,146,74,.25);border-radius:12px;padding:14px">'+
  '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'+
  '<div style="width:32px;height:32px;border-radius:8px;background:#6B7A2E22;display:flex;align-items:center;justify-content:center">'+
  '<i class="ti ti-heart-rate-monitor" style="font-size:16px;color:#6B7A2E"></i></div>'+
  '<div style="font-size:13px;font-weight:600;color:#4A2E1A">Fisioterapia</div></div>'+
  '<div style="font-size:22px;font-weight:700;color:#6B7A2E;margin-bottom:2px">R$ '+recFisio.toLocaleString('pt-BR')+'</div>'+
  '<div style="font-size:11px;color:#7A5230;margin-bottom:12px">estimado · R$ '+PRECO_SESSAO+'/sessão</div>'+
  barraH(recFisio,maxBar,'#6B7A2E')+
  '<div style="margin-top:12px;display:flex;flex-direction:column;gap:5px">'+
  '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7A5230">Total de sessões</span><span style="font-weight:600;color:#4A2E1A">'+totalSessoes+' sessões</span></div>'+
  '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7A5230">Pacientes ativos</span><span style="font-weight:600;color:#4A2E1A">'+FISIO.length+'</span></div>'+
  '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7A5230">Tratamentos concluídos</span><span style="font-weight:600;color:#3D5C1A">'+pacConc+'</span></div>'+
  '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7A5230">Em andamento</span><span style="font-weight:600;color:#4A2E1A">'+(FISIO.length-pacConc)+'</span></div>'+
  '</div></div>'+

  // LOJA
  '<div style="background:#FDF8F2;border:.5px solid rgba(184,146,74,.25);border-radius:12px;padding:14px">'+
  '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'+
  '<div style="width:32px;height:32px;border-radius:8px;background:#7A523022;display:flex;align-items:center;justify-content:center">'+

  '<div style="font-size:22px;font-weight:700;color:#7A5230;margin-bottom:2px">R$ '+Math.round(recLoja).toLocaleString('pt-BR')+'</div>'+

  '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7A5230">Encomendas recebidas</span><span style="font-weight:600;color:#3D5C1A">R$ '+Math.round(recEnc).toLocaleString('pt-BR')+'</span></div>'+

  (margemLoja?'<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#7A5230">Margem estimada</span><span style="font-weight:600;color:#3D5C1A">'+margemLoja.toFixed(1)+'%</span></div>':'')+

  '<div><div style="font-size:11px;font-weight:600;color:#B8924A;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Próximos vencimentos</div>'+
  '<div class="tw"><table><thead><tr><th>Aluno</th><th>Plano</th><th>Vence</th><th>Valor</th></tr></thead><tbody>'+
  [...vMaio,...vJun].sort((a,b)=>{
    const[da,ma]=(a.px||'').split('/').map(Number);
    const[db,mb]=(b.px||'').split('/').map(Number);
    return(ma*100+da)-(mb*100+db);
  }).slice(0,10).map(a=>'<tr><td>'+a.n.split(' ').slice(0,2).join(' ')+'</td><td style="color:#7A5230">'+a.pl+'</td><td>'+a.px+'</td><td style="color:#B8924A;font-weight:600">R$ '+a.v+'</td></tr>').join('')+
  '</tbody></table></div></div>'+

  // Receita por plano
  '<div><div style="font-size:11px;font-weight:600;color:#B8924A;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Receita por plano</div>'+
  '<div class="dp" style="padding:12px">'+
  planosTop.map(([pl,{n,rec}])=>
    '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">'+
    '<span style="color:#4A2E1A">'+pl+'</span>'+
    '<span style="color:#7A5230;font-size:11px">'+n+' alunos · <strong style="color:#B8924A">R$ '+rec.toLocaleString('pt-BR')+'</strong></span></div>'+
    '<div style="height:6px;border-radius:3px;background:#EDE0CC"><div style="width:'+Math.round(rec/recMensal*100)+'%;height:100%;border-radius:3px;background:#B8924A"></div></div></div>'
  ).join('')+'</div></div>'+
  '</div>'+

  // ── LOJA POR MARCA ────────────────────────────────────────
  '<div style="font-size:11px;font-weight:600;color:#B8924A;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Faturamento loja por marca</div>'+
  '<div class="dp" style="padding:14px;margin-bottom:16px">'+
  marcasTop.map(([m,v])=>
    '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">'+
    '<span style="color:#4A2E1A">'+m+'</span><span style="font-weight:600;color:#7A5230">R$ '+Math.round(v).toLocaleString('pt-BR')+'</span></div>'+
    '<div style="height:6px;border-radius:3px;background:#EDE0CC"><div style="width:'+Math.round(v/maxM*100)+'%;height:100%;border-radius:3px;background:#7A5230"></div></div></div>'
  ).join('')+'</div>'+

  // ── ALUNOS SEM DATA ────────────────────────────────────────
  (semData>0?
  '<div style="font-size:11px;font-weight:600;color:#8B2E1A;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">⚠ Alunos sem data de vencimento</div>'+
  '<div class="tw"><table><thead><tr><th>Aluno</th><th>Plano</th><th>Horário</th><th>Valor</th></tr></thead><tbody>'+
  ativos.filter(a=>!a.px||a.px==='parceria').map(a=>'<tr><td>'+ncell(a)+'</td><td>'+a.pl+'</td><td style="color:#7A5230">'+(a.h||'—')+'</td><td style="color:#B8924A;font-weight:600">R$ '+a.v+'</td></tr>').join('')+
  '</tbody></table></div>':'')
  );
}

// ═══════════════════════════════════════════════════════════
// HISTÓRICO DE ALTERAÇÕES
// ═══════════════════════════════════════════════════════════
async function rLogs(){
  set(
    '<div class="pt">Histórico de Alterações</div>'+
    '<div class="ps">Registro de ações · foco em pagamentos e alterações de aulas</div>'+
    '<div style="display:flex;align-items:center;justify-content:center;height:180px;flex-direction:column;gap:10px;color:var(--brown-light)">'+
    '<div style="width:28px;height:28px;border:3px solid var(--cream-dark);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite"></div>'+
    '<span style="font-size:13px">Carregando histórico…</span></div>'
  );

  let rows = [];
  try { rows = await sbGet('logs_alteracoes','id'); } catch(e){}
  rows.sort((a,b)=>new Date(b.criado_em)-new Date(a.criado_em));
  window._logsCache = rows;

  renderLogsView(rows);
}

function renderLogsView(rows){
  const hoje     = new Date(); hoje.setHours(0,0,0,0);
  const ontem    = new Date(hoje); ontem.setDate(hoje.getDate()-1);
  const semana   = new Date(hoje); semana.setDate(hoje.getDate()-7);

  function fmtDt(dt){
    if(!dt) return '—';
    const d = new Date(dt);
    const dHoje  = d.toDateString()===hoje.toDateString();
    const dOntem = d.toDateString()===ontem.toDateString();
    const hora   = d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    if(dHoje)  return '<span style="color:var(--gold-dark);font-weight:500">Hoje '+hora+'</span>';
    if(dOntem) return '<span style="color:var(--brown-light)">Ontem '+hora+'</span>';
    return d.toLocaleDateString('pt-BR')+' '+hora;
  }

  function icone(tab, acao){
    if(tab==='pagamentos') return {i:'ti-cash',c:'#16a34a',bg:'rgba(22,163,74,.1)'};
    if(tab==='google_agenda'||acao?.includes('evento')) return {i:'ti-calendar-event',c:'#4285F4',bg:'rgba(66,133,244,.1)'};
    if(tab==='alunos') return {i:'ti-users',c:'#B8924A',bg:'rgba(184,146,74,.1)'};
    if(tab==='vendas') return {i:'ti-receipt',c:'#7A5230',bg:'rgba(122,82,48,.1)'};
    if(tab==='estoque') return {i:'ti-package',c:'#6B7A2E',bg:'rgba(107,122,46,.1)'};
    if(tab==='encomendas') return {i:'ti-truck-delivery',c:'#8B6914',bg:'rgba(139,105,20,.1)'};
    if(tab==='pacientes_fisio'||tab==='sessoes_fisio') return {i:'ti-heart-rate-monitor',c:'#4A6B2E',bg:'rgba(74,107,46,.1)'};
    if(tab==='sistema') return {i:'ti-login',c:'#888',bg:'rgba(128,128,128,.08)'};
    return {i:'ti-database',c:'#888',bg:'rgba(128,128,128,.08)'};
  }

  // Usuários únicos
  const usuarios = [...new Set(rows.map(r=>r.usuario))].sort();
  const tabelas  = [...new Set(rows.map(r=>r.tabela))].sort();

  // Stats
  const hojeCount  = rows.filter(r=>new Date(r.criado_em)>=hoje).length;
  const pgtos      = rows.filter(r=>r.tabela==='pagamentos');
  const agendaEv   = rows.filter(r=>r.tabela==='google_agenda');
  const vitoria    = rows.filter(r=>r.perfil==='recepcao');

  // Últimos pagamentos registrados pela Vitória
  const ultPgtos = pgtos.filter(r=>r.perfil==='recepcao').slice(0,5);
  // Últimas alterações de agenda
  const ultAgenda = agendaEv.filter(r=>r.perfil==='recepcao').slice(0,5);

  set(
    '<div class="pt">Histórico de Alterações</div>'+
    '<div class="ps">Ações registradas no sistema · <span style="color:var(--gold-dark);font-weight:500">'+rows.length+' registros</span></div>'+

    // ── CARDS RESUMO ──────────────────────────────────────
    '<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px">'+
    cardLog('Total de ações','vi',rows.length,'desde o início','ti-list')+
    cardLog('Hoje','va',hojeCount,new Date().toLocaleDateString('pt-BR'),'ti-calendar-today')+
    cardLog('Pagamentos registrados','vg',pgtos.length,'pela recepção: '+pgtos.filter(r=>r.perfil==='recepcao').length,'ti-cash')+
    cardLog('Alterações de agenda','vi',agendaEv.length,'eventos criados/editados','ti-calendar-event')+
    '</div>'+

    // ── DESTAQUES ────────────────────────────────────────
    (vitoria.length>0?
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">'+

    // Últimos pagamentos pela Vitória
    '<div><div style="font-size:11px;font-weight:600;color:#16a34a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
    '<i class="ti ti-cash"></i> Últimos pagamentos — Vitória</div>'+
    (ultPgtos.length?
    '<div style="background:var(--glass);border:1px solid rgba(22,163,74,.2);border-radius:12px;overflow:hidden">'+
    ultPgtos.map(r=>'<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(22,163,74,.08)">'+
      '<div style="width:32px;height:32px;border-radius:8px;background:rgba(22,163,74,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
      '<i class="ti ti-cash" style="color:#16a34a;font-size:15px"></i></div>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--brown)">'+r.descricao+'</div>'+
      '<div style="font-size:11px;color:var(--brown-light);margin-top:1px">'+fmtDt(r.criado_em)+'</div></div>'+
      '</div>').join('')+
    '</div>':
    '<div style="padding:20px;text-align:center;color:var(--brown-light);font-size:12px;background:var(--glass);border:1px solid var(--border);border-radius:12px">Nenhum pagamento registrado</div>')+
    '</div>'+

    // Últimas alterações de agenda
    '<div><div style="font-size:11px;font-weight:600;color:#4285F4;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+
    '<i class="ti ti-calendar-event"></i> Últimas alterações de agenda — Vitória</div>'+
    (ultAgenda.length?
    '<div style="background:var(--glass);border:1px solid rgba(66,133,244,.2);border-radius:12px;overflow:hidden">'+
    ultAgenda.map(r=>'<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(66,133,244,.08)">'+
      '<div style="width:32px;height:32px;border-radius:8px;background:rgba(66,133,244,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
      '<i class="ti ti-calendar-event" style="color:#4285F4;font-size:15px"></i></div>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--brown)">'+r.acao+': '+r.descricao+'</div>'+
      '<div style="font-size:11px;color:var(--brown-light);margin-top:1px">'+fmtDt(r.criado_em)+'</div></div>'+
      '</div>').join('')+
    '</div>':
    '<div style="padding:20px;text-align:center;color:var(--brown-light);font-size:12px;background:var(--glass);border:1px solid var(--border);border-radius:12px">Nenhuma alteração de agenda</div>')+
    '</div>'+
    '</div>':'')+ // fim destaques

    // ── FILTROS ───────────────────────────────────────────
    '<div class="tb" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">'+
    '<input class="srch" id="logFt" placeholder="Buscar…" oninput="filtrarLogs()" style="width:200px">'+
    '<select class="sel" id="logUser" onchange="filtrarLogs()">'+
      '<option value="">Todos os usuários</option>'+
      usuarios.map(u=>'<option>'+u+'</option>').join('')+
    '</select>'+
    '<select class="sel" id="logTab" onchange="filtrarLogs()">'+
      '<option value="">Todas as seções</option>'+
      '<option value="pagamentos">💰 Pagamentos</option>'+
      '<option value="google_agenda">📅 Agenda</option>'+
      '<option value="alunos">👥 Alunos</option>'+
      tabelas.filter(t=>!['pagamentos','google_agenda','alunos'].includes(t)).map(t=>'<option>'+t+'</option>').join('')+
    '</select>'+
    '<select class="sel" id="logPeriodo" onchange="filtrarLogs()">'+
      '<option value="">Todo período</option>'+
      '<option value="hoje">Hoje</option>'+
      '<option value="semana">Esta semana</option>'+
      '<option value="mes">Este mês</option>'+
    '</select>'+
    '<span style="margin-left:auto;font-size:12px;color:var(--brown-light)" id="logCount">'+rows.length+' registros</span>'+
    '</div>'+

    // ── TABELA COMPLETA ───────────────────────────────────
    '<div class="tw"><table><thead><tr>'+
    '<th>Data / Hora</th><th>Usuário</th><th>Tipo</th><th>Ação</th><th>Detalhes</th>'+
    '</tr></thead><tbody id="logBody">'+
    renderLogRows(rows)+
    '</tbody></table></div>'
  );

  window._logsCache = rows;
}

function cardLog(lb,cor,vl,s2,icon){
  return '<div class="mc" style="display:flex;align-items:center;gap:12px">'+
    '<div style="width:36px;height:36px;border-radius:10px;background:rgba(184,146,74,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
    '<i class="ti '+icon+'" style="font-size:18px;color:var(--gold-dark)"></i></div>'+
    '<div><div class="lb">'+lb+'</div><div class="vl '+cor+'" style="font-size:22px">'+vl+'</div><div class="s2">'+s2+'</div></div></div>';
}

function renderLogRows(rows){
  function fmtDt(dt){
    if(!dt) return '—';
    const d = new Date(dt);
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const ontem = new Date(hoje); ontem.setDate(hoje.getDate()-1);
    const hora = d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    if(d.toDateString()===hoje.toDateString()) return '<span style="color:var(--gold-dark);font-weight:500">Hoje '+hora+'</span>';
    if(d.toDateString()===ontem.toDateString()) return 'Ontem '+hora;
    return d.toLocaleDateString('pt-BR')+' '+hora;
  }

  function iconeInfo(tab,acao){
    if(tab==='pagamentos') return {i:'ti-cash',c:'#16a34a',bg:'rgba(22,163,74,.1)',label:'Pagamento'};
    if(tab==='google_agenda') return {i:'ti-calendar-event',c:'#4285F4',bg:'rgba(66,133,244,.1)',label:'Agenda'};
    if(tab==='alunos') return {i:'ti-users',c:'#B8924A',bg:'rgba(184,146,74,.1)',label:'Aluno'};
    if(tab==='vendas') return {i:'ti-receipt',c:'#7A5230',bg:'rgba(122,82,48,.1)',label:'Venda'};
    if(tab==='estoque') return {i:'ti-package',c:'#6B7A2E',bg:'rgba(107,122,46,.1)',label:'Estoque'};
    if(tab==='encomendas') return {i:'ti-truck-delivery',c:'#8B6914',bg:'rgba(139,105,20,.1)',label:'Encomenda'};
    if(tab==='sessoes_fisio'||tab==='pacientes_fisio') return {i:'ti-heart-rate-monitor',c:'#4A6B2E',bg:'rgba(74,107,46,.1)',label:'Fisio'};
    if(tab==='sistema') return {i:'ti-login',c:'#888',bg:'rgba(128,128,128,.08)',label:'Sistema'};
    return {i:'ti-database',c:'#888',bg:'rgba(128,128,128,.08)',label:tab};
  }

  if(!rows.length) return '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--brown-light)">'+
    '<i class="ti ti-inbox" style="font-size:28px;opacity:.3;display:block;margin-bottom:8px"></i>Nenhum registro encontrado</td></tr>';

  return rows.map(r=>{
    const info = iconeInfo(r.tabela, r.acao);
    const isVitoria = r.perfil==='recepcao';
    const isPgto    = r.tabela==='pagamentos';
    const isAgenda  = r.tabela==='google_agenda';
    const rowStyle  = isPgto ? 'background:rgba(22,163,74,.04)' : isAgenda ? 'background:rgba(66,133,244,.04)' : '';

    return '<tr style="'+rowStyle+'">'+
    '<td style="font-size:12px;white-space:nowrap">'+fmtDt(r.criado_em)+'</td>'+
    '<td>'+
      '<div style="display:flex;align-items:center;gap:6px">'+
      '<div style="width:22px;height:22px;border-radius:50%;background:'+(isVitoria?'rgba(74,107,46,.2)':'rgba(184,146,74,.2)')+
      ';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:'+(isVitoria?'#3D5C3A':'#7A5230')+'">'+
      r.usuario.slice(0,2).toUpperCase()+'</div>'+
      '<span style="font-size:12px;font-weight:500;color:var(--brown)">'+r.usuario+'</span>'+
      '</div>'+
    '</td>'+
    '<td>'+
      '<div style="display:inline-flex;align-items:center;gap:5px;background:'+info.bg+';padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;color:'+info.c+'">'+
      '<i class="ti '+info.i+'" style="font-size:12px"></i>'+info.label+'</div>'+
    '</td>'+
    '<td style="font-size:12px;color:var(--brown)">'+r.acao+'</td>'+
    '<td style="font-size:12px;color:var(--brown-light);max-width:280px;overflow:hidden;text-overflow:ellipsis">'+(r.descricao||'—')+'</td>'+
    '</tr>';
  }).join('');
}

function filtrarLogs(){
  const ft      = (document.getElementById('logFt')?.value||'').toLowerCase();
  const usr     = document.getElementById('logUser')?.value||'';
  const tab     = document.getElementById('logTab')?.value||'';
  const periodo = document.getElementById('logPeriodo')?.value||'';
  const all     = window._logsCache||[];

  const hoje   = new Date(); hoje.setHours(0,0,0,0);
  const semana = new Date(hoje); semana.setDate(hoje.getDate()-7);
  const mes    = new Date(hoje); mes.setDate(1);

  const filtrado = all.filter(r=>{
    const dt = new Date(r.criado_em);
    const okFt  = !ft  || (r.descricao||'').toLowerCase().includes(ft) || (r.acao||'').toLowerCase().includes(ft) || (r.usuario||'').toLowerCase().includes(ft);
    const okUsr = !usr || r.usuario===usr;
    const okTab = !tab || r.tabela===tab;
    const okPer = !periodo ||
      (periodo==='hoje'  && dt>=hoje) ||
      (periodo==='semana'&& dt>=semana) ||
      (periodo==='mes'   && dt>=mes);
    return okFt && okUsr && okTab && okPer;
  });

  const body = document.getElementById('logBody');
  const cnt  = document.getElementById('logCount');
  if(body) body.innerHTML = renderLogRows(filtrado);
  if(cnt)  cnt.textContent = filtrado.length+' registros';
}

// ═══════════════════════════════════════════════════════════
// UTILITÁRIOS
// ═══════════════════════════════════════════════════════════
function set(h){document.getElementById('mn').innerHTML=h;}
function mc(lb,cor,vl,s2){return '<div class="mc"><div class="lb">'+lb+'</div><div class="vl '+cor+'">'+vl+'</div><div class="s2">'+s2+'</div></div>';}
function fs(n,cor,lb){return '<div class="fs"><div class="fn" style="color:'+cor+'">'+n+'</div><div class="fl">'+lb+'</div></div>';}
function dr(lb,val){return '<div class="dr"><span class="dl">'+lb+'</span><span>'+val+'</span></div>';}
function ncell(a){const id=a&&a.id?a.id:0;const n=a&&a.n?a.n:'?';return '<span style="display:flex;align-items:center"><span class="av '+avcls(id)+'">'+ini(n)+'</span>'+n+'</span>';}
function esc(s){return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

nav('home');
</script>
